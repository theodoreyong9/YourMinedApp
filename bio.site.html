<!-- bio.site.html — YourMine · Bio / Identity page demo
     Demonstrates superpersonalization: site reads userData from YM profile,
     displays a personal identity page styled with the YourMine theme.
     Access at: yourmine.app/bio  (routes to bio.site.html)
-->
<style>
.bio-wrap{padding:24px;max-width:600px;margin:0 auto}
.bio-hero{display:flex;align-items:center;gap:20px;padding:32px 0 24px}
.bio-avatar{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,rgba(200,240,160,.2),rgba(126,212,255,.2));border:2px solid rgba(200,240,160,.3);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:28px;font-weight:900;color:var(--accent);flex-shrink:0}
.bio-info{flex:1;min-width:0}
.bio-name{font-family:var(--font-display);font-size:1.5rem;font-weight:900;letter-spacing:-.5px;color:var(--text)}
.bio-handle{font-family:var(--font-mono);font-size:11px;color:var(--text3);margin-top:2px;word-break:break-all}
.bio-bio{font-size:.85rem;color:var(--text2);line-height:1.7;margin-top:8px}

.bio-section{margin-bottom:24px}
.bio-section-title{font-family:var(--font-display);font-size:9px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--text3);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.bio-section-title::after{content:'';flex:1;height:1px;background:var(--border)}

.bio-links{display:flex;flex-direction:column;gap:7px}
.bio-link{display:flex;align-items:center;gap:12px;padding:11px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);text-decoration:none;transition:all .2s;cursor:pointer}
.bio-link:hover{background:var(--surface2);border-color:var(--border2);transform:translateX(4px)}
.bio-link-icon{width:32px;height:32px;border-radius:10px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.bio-link-body{flex:1;min-width:0}
.bio-link-name{font-family:var(--font-display);font-size:13px;font-weight:600;color:var(--text)}
.bio-link-handle{font-family:var(--font-mono);font-size:10px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bio-link-arrow{color:var(--text3);font-size:16px;flex-shrink:0}

.bio-stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.bio-stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:14px;text-align:center;transition:border-color .2s}
.bio-stat:hover{border-color:var(--border2)}
.bio-stat-val{font-family:var(--font-display);font-size:1.3rem;font-weight:800;color:var(--accent)}
.bio-stat-lbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-top:3px}

.bio-wallet{background:var(--bg2);border:1px solid rgba(200,240,160,.15);border-radius:var(--r2);padding:16px;display:flex;align-items:center;gap:14px}
.bio-wallet-icon{font-size:22px;flex-shrink:0}
.bio-wallet-body{flex:1;min-width:0}
.bio-wallet-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.bio-wallet-addr{font-family:var(--font-mono);font-size:10px;color:var(--accent);word-break:break-all}
.bio-wallet-yrm{font-family:var(--font-display);font-size:1rem;font-weight:700;color:var(--gold);margin-top:4px}

.bio-edit-notice{margin-top:24px;padding:12px 14px;border-radius:var(--r);background:rgba(126,212,255,.05);border:1px solid rgba(126,212,255,.12);font-size:11px;color:var(--accent2);line-height:1.6;text-align:center}

/* Empty state */
.bio-empty{text-align:center;padding:40px 0}
.bio-empty-title{font-family:var(--font-display);font-size:1.1rem;font-weight:700;color:var(--text2);margin-bottom:8px}
.bio-empty-sub{font-size:.85rem;color:var(--text3);line-height:1.7}
</style>

<div class="bio-wrap" id="bio-root"></div>

<script>
(function(){
  const root=document.getElementById('bio-root');

  // Social network icons
  const NET_ICONS={twitter:'𝕏',instagram:'📸',youtube:'▶',tiktok:'♪',github:'⬡',linkedin:'in',twitch:'🎮',mastodon:'🐘',bluesky:'🦋',farcaster:'⬡',lens:'🌿',default:'◎'};

  function render(){
    // Get profile from YM context
    const profile=window.YM?.getState?.()?.userData||{};
    const social=profile.socialNetworks||[];
    const mineState=window.YM_S?.['mine.sphere.js']?._mineState||null;

    // Generate initials from first social handle or uuid
    const initials=(social[0]?.handle||profile.uuid||'?')[0].toUpperCase();

    root.innerHTML=`
      <div class="bio-hero">
        <div class="bio-avatar">${profile.avatarEmoji||initials}</div>
        <div class="bio-info">
          <div class="bio-name">${profile.displayName||'Anon Miner'}</div>
          <div class="bio-handle">${profile.uuid?profile.uuid.slice(0,8)+'…'+profile.uuid.slice(-6):'No UUID yet'}</div>
          ${profile.bio?`<div class="bio-bio">${profile.bio}</div>`:''}
        </div>
      </div>

      ${mineState||profile.pubkey?`
        <div class="bio-section">
          <div class="bio-section-title">Wallet</div>
          <div class="bio-wallet">
            <div class="bio-wallet-icon">⛏</div>
            <div class="bio-wallet-body">
              <div class="bio-wallet-label">Solana Address</div>
              <div class="bio-wallet-addr">${profile.pubkey||mineState?.pubkey||'—'}</div>
              ${mineState?.ym?`<div class="bio-wallet-yrm">${parseFloat(mineState.ym).toFixed(4)} YRM</div>`:''}
            </div>
          </div>
        </div>
      `:''}

      ${social.length?`
        <div class="bio-section">
          <div class="bio-section-title">Social Networks</div>
          <div class="bio-links">
            ${social.filter(n=>n.handle).map(n=>`
              <div class="bio-link" onclick="window.open('${buildURL(n)}','_blank')">
                <div class="bio-link-icon">${NET_ICONS[n.network]||NET_ICONS.default}</div>
                <div class="bio-link-body">
                  <div class="bio-link-name">${n.network}</div>
                  <div class="bio-link-handle">${n.handle}</div>
                </div>
                <div class="bio-link-arrow">→</div>
              </div>`).join('')}
          </div>
        </div>
      `:''}

      <div class="bio-edit-notice">
        This page reflects your YourMine profile.<br>
        Edit via <strong style="color:var(--text)">Profile ↗</strong> in the top bar.
      </div>
    `;
  }

  function buildURL(n){
    const h=n.handle.replace(/^@/,'');
    const map={twitter:`https://x.com/${h}`,instagram:`https://instagram.com/${h}`,youtube:`https://youtube.com/@${h}`,tiktok:`https://tiktok.com/@${h}`,github:`https://github.com/${h}`,linkedin:`https://linkedin.com/in/${h}`,twitch:`https://twitch.tv/${h}`,mastodon:n.handle.includes('@')?`https://mastodon.social/@${h}`:`https://mastodon.social/@${h}`,bluesky:`https://bsky.app/profile/${h}`,farcaster:`https://warpcast.com/${h}`,lens:`https://hey.xyz/u/${h}`};
    return map[n.network]||`#`;
  }

  // Render immediately and re-render if YM profile loads later
  render();
  let attempts=0;
  const poll=setInterval(()=>{
    if(++attempts>20)clearInterval(poll);
    const p=window.YM?.getState?.()?.userData;
    if(p&&(p.displayName||p.socialNetworks?.length)){render();clearInterval(poll)}
  },400);
})();
</script>

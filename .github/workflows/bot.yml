name: Bot — Validate & Merge Sphere
on:
  push:
    branches:
      - 'user/**'
jobs:
  validate-and-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Git
        run: |
          git config user.name "YourMine Bot"
          git config user.email "bot@yourmine.xyz"
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        # npm install au lieu de npm ci (pas besoin de package-lock.json)
        run: npm install
      - name: Validate signature + score
        # FIX: scripts à la racine, pas dans scripts/
        run: node validate.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH_NAME: ${{ github.ref_name }}
      - name: Merge to main + update JSON
        run: node merge.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH_NAME: ${{ github.ref_name }}

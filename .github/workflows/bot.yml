name: Bot — Validate & Merge Sphere
on:
  pull_request_target:
    types: [opened, synchronize]
    branches:
      - main

jobs:
  validate-and-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      # Checkout du repo principal (main) — scripts + files.json
      - name: Checkout main repo
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # Checkout du contenu de la PR (fork) dans _pr_content/
      - name: Checkout PR content
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          path: _pr_content
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Validate signature + score
        run: node validate.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.event.pull_request.user.login }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
          BASE_REPO: ${{ github.repository }}
          PR_CONTENT_DIR: _pr_content

      - name: Merge + update files.json
        run: node merge.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.event.pull_request.user.login }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_REPO: ${{ github.repository }}
          PR_CONTENT_DIR: _pr_content

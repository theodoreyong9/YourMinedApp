<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
:root{--bg:#020408;--surface:#070d14;--surface2:#0d1520;--text:#c8e6ff;--text2:rgba(200,230,255,.55);--text3:rgba(200,230,255,.25);--accent:#4fc3f7;--gold:#f0a830;--red:#ff5252;--green:#69f0ae;--border:rgba(79,195,247,.1);--border2:rgba(79,195,247,.05);--font-d:'Orbitron',monospace;--font-b:'Space Grotesk',sans-serif;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font-b)}
#ym-wp,#ym-bg,#ym-loader,#desktop,#drag-ghost,#page-dots,#nav-bar,#panel-overlay,#panel-switcher,#ym-sign-dlg,#pwa-install-btn,#toasts,.ym-panel,.dlg,[id^="ym-"][id$="-widget"],.ym-widget,#ym-radio-widget,#desktop-slider .icon-wrap,.icon-wrap,.icon-body,.icon-label{display:none!important;visibility:hidden!important;opacity:0!important;pointer-events:none!important}
.ym-overlay,.ym-tabs,.ym-tab,.ym-input,.ym-btn,.ym-card,.ym-notice,.pill{display:none!important}
body::before{content:'';position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse at 20% 50%,rgba(79,195,247,.04) 0%,transparent 50%)}
#nasa-root{position:fixed;inset:0;display:flex;flex-direction:column;z-index:10}
#nasa-content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;min-height:0}
#nasa-content::-webkit-scrollbar{width:2px}
#nasa-content::-webkit-scrollbar-thumb{background:var(--border)}

/* APOD */
.nasa-apod-img{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;background:var(--surface2)}
.nasa-apod-body{padding:16px 16px 8px}
.nasa-apod-date{font-family:var(--font-d);font-size:8px;color:var(--accent);letter-spacing:.2em;text-transform:uppercase;margin-bottom:8px}
.nasa-apod-title{font-family:var(--font-d);font-size:17px;font-weight:700;color:var(--text);line-height:1.2;margin-bottom:10px}
.nasa-apod-explain{font-size:13px;color:var(--text2);line-height:1.8;font-weight:300}
.nasa-apod-credit{font-size:10px;color:var(--text3);margin-top:6px;font-style:italic}

/* Grid */
.nasa-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:2px;padding:2px}
.nasa-grid-item{position:relative;aspect-ratio:1;overflow:hidden;cursor:pointer;background:var(--surface2)}
.nasa-grid-item img{width:100%;height:100%;object-fit:cover;transition:transform .3s}
.nasa-grid-item:hover img{transform:scale(1.05)}
.nasa-grid-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.8) 0%,transparent 50%);opacity:0;transition:opacity .2s;display:flex;align-items:flex-end;padding:10px}
.nasa-grid-item:hover .nasa-grid-overlay{opacity:1}
.nasa-grid-title{font-size:11px;color:#fff;font-weight:500;line-height:1.3}

/* Mars rover tabs */
.nasa-rover-tabs{display:flex;gap:6px;padding:10px 16px;border-bottom:1px solid var(--border2)}
.nasa-rover-tab{font-family:var(--font-d);font-size:8px;letter-spacing:.1em;padding:5px 12px;border:1px solid var(--border);border-radius:20px;cursor:pointer;color:var(--text3);transition:all .15s}
.nasa-rover-tab.active{color:var(--gold);border-color:rgba(240,168,48,.3);background:rgba(240,168,48,.06)}

/* Asteroid */
.nasa-asteroid-item{padding:12px 16px;border-bottom:1px solid var(--border2);display:flex;align-items:center;gap:12px;cursor:pointer}
.nasa-asteroid-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.nasa-asteroid-dot.danger{background:#ff5252;box-shadow:0 0 8px rgba(255,82,82,.5)}
.nasa-asteroid-dot.watch{background:var(--gold)}
.nasa-asteroid-dot.safe{background:var(--green)}

/* Detail overlay */
#nasa-detail{position:fixed;inset:0;z-index:600;background:rgba(2,4,8,.97);overflow-y:auto;-webkit-overflow-scrolling:touch;display:none;flex-direction:column}
#nasa-detail-inner{padding:16px 16px 20px;flex:1;overflow-y:auto}
#nasa-detail-close-wrap{flex-shrink:0;padding:12px;display:flex;justify-content:center;border-top:1px solid rgba(79,195,247,.1)}
#nasa-detail-close{background:rgba(79,195,247,.08);border:1px solid rgba(79,195,247,.2);color:var(--text2);font-size:18px;width:48px;height:48px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center}

.nasa-loading{padding:40px;text-align:center;font-family:var(--font-d);font-size:10px;color:var(--text3);letter-spacing:.2em;animation:blink 1.5s step-end infinite}
@keyframes blink{0%,100%{opacity:.3}50%{opacity:1}}
.nasa-section-hd{padding:12px 16px;border-bottom:1px solid var(--border2);font-family:var(--font-d);font-size:9px;letter-spacing:.15em;color:var(--accent);text-transform:uppercase}

/* Bottom bar — fixed */
#nasa-bottom{flex-shrink:0;display:flex;flex-direction:column;gap:6px;padding:8px 12px calc(8px + env(safe-area-inset-bottom,0px));border-top:1px solid var(--border);background:rgba(7,13,20,.95);backdrop-filter:blur(16px)}
#nasa-tabs{display:flex;gap:4px}
.nasa-tab{font-family:var(--font-d);font-size:9px;letter-spacing:.08em;flex:1;text-align:center;padding:7px 4px;border-radius:6px;cursor:pointer;color:var(--text3);transition:all .15s;border:1px solid transparent}
.nasa-tab.active{color:var(--accent);border-color:rgba(79,195,247,.2);background:rgba(79,195,247,.05)}
#nasa-search-wrap{display:flex;gap:6px;align-items:center}
#nasa-search{flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:var(--font-d);font-size:10px;padding:8px 12px;border-radius:6px;outline:none;transition:border-color .15s}
#nasa-search:focus{border-color:rgba(79,195,247,.3)}
#nasa-search::placeholder{color:var(--text3)}
#nasa-apod-nav{display:flex;gap:6px;align-items:center}
.nasa-nav-btn{background:rgba(79,195,247,.08);border:1px solid rgba(79,195,247,.15);color:var(--accent);font-family:var(--font-d);font-size:9px;padding:6px 14px;border-radius:6px;cursor:pointer;letter-spacing:.08em;transition:all .15s;flex-shrink:0}
.nasa-nav-btn:hover{background:rgba(79,195,247,.15)}
.nasa-apod-date-input{flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:var(--font-d);font-size:9px;padding:6px 8px;border-radius:6px;outline:none}

/* Theme Nav */
#theme-nav{flex-shrink:0;display:flex;align-items:center;height:48px;background:rgba(0,0,0,.75);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid rgba(255,255,255,.06);z-index:50}
.tnav-btn{width:56px;height:100%;background:none;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.35);font-size:20px;transition:color .15s;flex-shrink:0}
.tnav-btn:hover,.tnav-btn:active{color:rgba(255,255,255,.85)}
.tnav-btn.tnav-disabled{opacity:.2;pointer-events:none}
#tnav-center{flex:1;height:100%;display:flex;align-items:center;justify-content:center;cursor:pointer;gap:6px;color:rgba(255,255,255,.3);transition:color .15s}
#tnav-center:hover{color:rgba(255,255,255,.7)}
#tnav-center-lbl{font-size:10px;letter-spacing:.08em}
#tnav-picker{position:fixed;inset:0;z-index:900;background:rgba(0,0,0,.92);backdrop-filter:blur(24px);display:none;flex-direction:column}
#tnav-picker-hd{flex-shrink:0;padding:14px 16px 10px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.06)}
#tnav-picker-title{font-size:10px;color:rgba(255,255,255,.3);letter-spacing:.15em;flex:1}
#tnav-picker-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:8px 8px 0}
#tnav-picker-search-wrap{flex-shrink:0;padding:10px 12px;border-top:1px solid rgba(255,255,255,.06);background:rgba(0,0,0,.4)}
#tnav-picker-q{width:100%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);color:#fff;font-size:14px;padding:12px 16px;border-radius:12px;outline:none}
#tnav-picker-q::placeholder{color:rgba(255,255,255,.2)}
.tnav-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:12px;cursor:pointer;transition:background .1s;margin-bottom:4px;border:1px solid transparent}
.tnav-item:hover{background:rgba(255,255,255,.06)}
.tnav-item.tnav-current{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.08)}
.tnav-icon{font-size:24px;flex-shrink:0;width:36px;text-align:center}
.tnav-info{flex:1;min-width:0}
.tnav-name{font-size:14px;font-weight:600;color:#fff;margin-bottom:2px}
.tnav-desc{font-size:11px;color:rgba(255,255,255,.35);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tnav-badge{font-size:9px;color:rgba(255,255,255,.25);flex-shrink:0;background:rgba(255,255,255,.06);padding:2px 8px;border-radius:20px}
#tnav-picker-close-wrap{flex-shrink:0;padding:10px 12px;border-top:1px solid rgba(255,255,255,.06);display:flex;justify-content:center}
#tnav-picker-close{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.6);font-size:18px;width:48px;height:48px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.nasa-reveal{animation:fadeUp .3s ease forwards}
</style>

<script>
(function(){
  var API_KEY = 'DEMO_KEY';
  var _tab = 'apod';
  var _apodDate = new Date().toISOString().slice(0,10);
  var _galleryQuery = 'nebula';
  var _marsRover = 'curiosity';
  var _searchTimer = null;
  var content = document.getElementById('nasa-content');
  var apodNav = document.getElementById('nasa-apod-nav');
  var searchWrap = document.getElementById('nasa-search-wrap');
  var apodDateInput = document.getElementById('nasa-apod-date');
  var searchInput = document.getElementById('nasa-search');

  var GALLERY_TOPICS = ['nebula','galaxy','earth from space','supernova','aurora','mars','saturn rings','astronaut','moon landing','exoplanet'];

  // Init APOD date
  apodDateInput.value = _apodDate;
  apodDateInput.max = new Date().toISOString().slice(0,10);
  apodDateInput.min = '1995-06-16';

  // Tab switching
  document.querySelectorAll('.nasa-tab').forEach(function(tab){
    tab.addEventListener('click', function(){
      document.querySelectorAll('.nasa-tab').forEach(function(t){t.classList.remove('active');});
      tab.classList.add('active');
      _tab = tab.dataset.tab;
      updateBottomBar();
      loadTab(_tab);
    });
  });

  function updateBottomBar(){
    apodNav.style.display = _tab === 'apod' ? 'flex' : 'none';
    searchWrap.style.display = (_tab === 'gallery' || _tab === 'mars') ? 'flex' : 'none';
    if(_tab === 'gallery') searchInput.placeholder = 'Search NASA images…';
    if(_tab === 'mars') searchInput.placeholder = 'Filter by camera (e.g. NAVCAM)…';
  }

  // APOD prev/next
  document.getElementById('nasa-apod-prev').addEventListener('click', function(){
    var d = new Date(_apodDate + 'T12:00:00');
    d.setDate(d.getDate() - 1);
    if(d < new Date('1995-06-16')) return;
    _apodDate = d.toISOString().slice(0,10);
    apodDateInput.value = _apodDate;
    loadAPOD(_apodDate);
  });
  document.getElementById('nasa-apod-next').addEventListener('click', function(){
    var d = new Date(_apodDate + 'T12:00:00');
    d.setDate(d.getDate() + 1);
    if(d > new Date()) return;
    _apodDate = d.toISOString().slice(0,10);
    apodDateInput.value = _apodDate;
    loadAPOD(_apodDate);
  });
  apodDateInput.addEventListener('change', function(){
    _apodDate = this.value;
    loadAPOD(_apodDate);
  });

  // Gallery/Mars search
  searchInput.addEventListener('input', function(){
    clearTimeout(_searchTimer);
    var q = this.value.trim();
    _searchTimer = setTimeout(function(){
      if(_tab === 'gallery' && q){ _galleryQuery = q; loadGallery(); }
      else if(_tab === 'mars' && q){ loadMars(_marsRover, q); }
    }, 500);
  });

  function loadTab(tab){
    content.innerHTML = '<div class="nasa-loading">LOADING…</div>';
    if(tab === 'apod') loadAPOD(_apodDate);
    else if(tab === 'gallery') loadGallery();
    else if(tab === 'mars') loadMars(_marsRover);
    else loadAsteroids();
  }

  // APOD
  async function loadAPOD(date){
    try{
      var r = await fetch('https://api.nasa.gov/planetary/apod?api_key='+API_KEY+'&date='+date);
      var item = await r.json();
      if(item.error) throw new Error(item.error.message||'Error');
      var wrap = document.createElement('div');
      wrap.className = 'nasa-reveal';
      if(item.media_type === 'image'){
        var img = document.createElement('img');
        img.className = 'nasa-apod-img';
        img.src = item.hdurl || item.url;
        img.addEventListener('click', function(){ showDetail('<img src="'+(item.hdurl||item.url)+'" style="width:100%;border-radius:8px;margin-bottom:16px;display:block">'); });
        wrap.appendChild(img);
      } else {
        var vid = document.createElement('div');
        vid.style.cssText = 'background:var(--surface2);aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;font-size:40px;color:var(--text3);cursor:pointer';
        vid.textContent = '▶';
        vid.addEventListener('click', function(){ window.open(item.url,'_blank'); });
        wrap.appendChild(vid);
      }
      var body = document.createElement('div');
      body.className = 'nasa-apod-body';
      body.innerHTML = '<div class="nasa-apod-date">'+item.date+' · Astronomy Picture of the Day</div>'+
        '<div class="nasa-apod-title">'+item.title+'</div>'+
        '<div class="nasa-apod-explain">'+item.explanation+'</div>'+
        (item.copyright ? '<div class="nasa-apod-credit">© '+item.copyright+'</div>' : '');
      wrap.appendChild(body);
      content.innerHTML = '';
      content.appendChild(wrap);
    }catch(e){
      content.innerHTML = '<div class="nasa-loading">'+esc(e.message||'ERROR')+'</div>';
    }
  }

  // Gallery
  async function loadGallery(query){
    var q = query || _galleryQuery;
    try{
      var r = await fetch('https://images-api.nasa.gov/search?q='+encodeURIComponent(q)+'&media_type=image&page_size=20');
      var d = await r.json(); var items = (d.collection && d.collection.items)||[];
      var wrap = document.createElement('div'); wrap.className = 'nasa-reveal';
      wrap.innerHTML = '<div class="nasa-section-hd">'+q.toUpperCase()+'</div>';
      var grid = document.createElement('div'); grid.className = 'nasa-grid';
      items.forEach(function(item){
        var links = item.links||[]; var thumb = links.find(function(l){return l.rel==='preview';});
        if(!thumb) return;
        var data = item.data && item.data[0];
        var el = document.createElement('div'); el.className = 'nasa-grid-item';
        el.innerHTML = '<img src="'+thumb.href+'" loading="lazy" alt=""><div class="nasa-grid-overlay"><div class="nasa-grid-title">'+(data?esc(data.title||''):'')+'</div></div>';
        el.addEventListener('click', function(){
          var html = (data?'<div style="font-family:var(--font-d);font-size:8px;color:var(--accent);letter-spacing:.15em;margin-bottom:8px">'+(data.date_created||'').slice(0,10)+'</div><div style="font-family:var(--font-d);font-size:16px;color:var(--text);margin-bottom:10px;line-height:1.2">'+esc(data.title||'')+'</div><div style="font-size:12px;color:var(--text2);line-height:1.7;font-weight:300">'+esc((data.description||'').slice(0,400))+'</div>':'');
          showDetail('<img src="'+thumb.href+'" style="width:100%;border-radius:8px;margin-bottom:16px;display:block">'+html);
        });
        grid.appendChild(el);
      });
      wrap.appendChild(grid);
      content.innerHTML = ''; content.appendChild(wrap);
    }catch(e){content.innerHTML='<div class="nasa-loading">ERROR</div>';}
  }

  // Mars
  async function loadMars(rover, cameraFilter){
    _marsRover = rover;
    try{
      var r = await fetch('https://api.nasa.gov/mars-photos/api/v1/rovers/'+rover+'/latest_photos?api_key='+API_KEY);
      var d = await r.json(); var photos = d.latest_photos||[];
      if(cameraFilter) photos = photos.filter(function(p){return p.camera.name.toLowerCase().includes(cameraFilter.toLowerCase());});
      photos = photos.slice(0,20);
      var wrap = document.createElement('div'); wrap.className = 'nasa-reveal';
      wrap.innerHTML = '<div style="padding:10px 16px 6px;font-family:var(--font-d);font-size:9px;color:var(--gold);letter-spacing:.1em">MARS · '+rover.toUpperCase()+'</div>'+
        '<div class="nasa-rover-tabs">'+
          ['curiosity','perseverance','opportunity'].map(function(r){return '<div class="nasa-rover-tab'+(r===rover?' active':'')+'" data-rover="'+r+'">'+r.toUpperCase()+'</div>';}).join('')+
        '</div>';
      var grid = document.createElement('div'); grid.className = 'nasa-grid';
      photos.forEach(function(p){
        var el = document.createElement('div'); el.className = 'nasa-grid-item';
        el.innerHTML = '<img src="'+p.img_src+'" loading="lazy" alt=""><div class="nasa-grid-overlay"><div class="nasa-grid-title">Sol '+p.sol+' · '+p.camera.name+'</div></div>';
        el.addEventListener('click', function(){
          showDetail('<img src="'+p.img_src+'" style="width:100%;border-radius:8px;margin-bottom:16px;display:block">'+
            '<div style="font-family:var(--font-d);font-size:8px;color:var(--gold);letter-spacing:.15em;margin-bottom:8px">SOL '+p.sol+' · '+p.earth_date+'</div>'+
            '<div style="font-family:var(--font-d);font-size:15px;color:var(--text);margin-bottom:8px">'+p.camera.full_name+'</div>'+
            '<div style="font-size:12px;color:var(--text3)">'+p.rover.name+' · Status: '+p.rover.status.toUpperCase()+'</div>');
        });
        grid.appendChild(el);
      });
      wrap.appendChild(grid);
      content.innerHTML = ''; content.appendChild(wrap);
      wrap.querySelectorAll('.nasa-rover-tab').forEach(function(tab){
        tab.addEventListener('click', function(){ loadMars(tab.dataset.rover); searchInput.value=''; });
      });
    }catch(e){content.innerHTML='<div class="nasa-loading">ERROR</div>';}
  }

  // Asteroids
  async function loadAsteroids(){
    try{
      var today = new Date().toISOString().slice(0,10);
      var r = await fetch('https://api.nasa.gov/neo/rest/v1/feed?start_date='+today+'&end_date='+today+'&api_key='+API_KEY);
      var d = await r.json(); var all = [];
      Object.values(d.near_earth_objects||{}).forEach(function(day){all=all.concat(day);});
      all.sort(function(a,b){
        var da=parseFloat((a.close_approach_data[0]||{miss_distance:{lunar:'999'}}).miss_distance.lunar)||999;
        var db=parseFloat((b.close_approach_data[0]||{miss_distance:{lunar:'999'}}).miss_distance.lunar)||999;
        return da-db;
      });
      var wrap = document.createElement('div'); wrap.className = 'nasa-reveal';
      wrap.innerHTML = '<div class="nasa-section-hd">NEAR EARTH · TODAY · '+all.length+' TRACKED</div>';
      all.slice(0,25).forEach(function(neo){
        var approach = neo.close_approach_data[0]||{};
        var lunar = parseFloat((approach.miss_distance||{}).lunar)||999;
        var isDanger = neo.is_potentially_hazardous_asteroid;
        var dot = isDanger?'danger':lunar<10?'watch':'safe';
        var diam = neo.estimated_diameter&&neo.estimated_diameter.meters;
        var d2 = diam?Math.round((diam.estimated_diameter_min+diam.estimated_diameter_max)/2):'?';
        var row = document.createElement('div'); row.className = 'nasa-asteroid-item';
        row.innerHTML = '<div class="nasa-asteroid-dot '+dot+'"></div>'+
          '<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:500;color:var(--text)">'+esc(neo.name.replace(/[()]/g,''))+'</div>'+
          '<div style="font-size:10px;color:var(--text3);margin-top:2px">Ø ~'+d2+'m · '+(isDanger?'⚠ Hazardous':'Safe')+'</div></div>'+
          '<div style="font-family:var(--font-d);font-size:11px;color:var(--accent);flex-shrink:0">'+lunar.toFixed(1)+' LD</div>';
        row.addEventListener('click', function(){
          var vel = parseFloat((approach.relative_velocity||{}).kilometers_per_hour||0).toFixed(0);
          showDetail('<div style="font-size:48px;text-align:center;margin-bottom:16px">'+(isDanger?'☄':'🪨')+'</div>'+
            '<div style="font-family:var(--font-d);font-size:20px;color:var(--text);text-align:center;margin-bottom:20px">'+esc(neo.name.replace(/[()]/g,''))+'</div>'+
            '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">'+
              nStat('Miss Distance',lunar.toFixed(2)+' LD')+
              nStat('Velocity',vel+' km/h')+
              nStat('Diameter',d2+'m')+
              nStat('Date',approach.close_approach_date||'?')+
            '</div>');
        });
        wrap.appendChild(row);
      });
      content.innerHTML = ''; content.appendChild(wrap);
    }catch(e){content.innerHTML='<div class="nasa-loading">ERROR</div>';}
  }

  function nStat(label,val){return '<div style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px"><div style="font-family:var(--font-d);font-size:8px;color:var(--text3);letter-spacing:.1em;margin-bottom:4px">'+label+'</div><div style="font-family:var(--font-d);font-size:13px;color:var(--accent)">'+val+'</div></div>';}
  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

  function showDetail(html){
    document.getElementById('nasa-detail-inner').innerHTML = html;
    document.getElementById('nasa-detail').style.display = 'flex';
    document.getElementById('nasa-detail').scrollTop = 0;
    window._themeNavBack = function(){ document.getElementById('nasa-detail').style.display='none'; window._themeNavBack=null; };
  }
  document.getElementById('nasa-detail-close').addEventListener('click', function(){
    document.getElementById('nasa-detail').style.display='none'; window._themeNavBack=null;
  });

  // Theme Nav
  setTimeout(function(){
    var RAW='https://raw.githubusercontent.com/theodoreyong9/YourMinedApp/main/';
    var _cur=localStorage.getItem('ym_theme_url')||''; var _cache=null;
    function e2(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
    document.getElementById('tnav-back').addEventListener('click',function(){var _pt=localStorage.getItem('ym_prev_theme')||'';if(window.YM)window.YM.setTheme(_pt||localStorage.getItem('ym_theme_url')||'');else{localStorage.setItem('ym_theme_url',_pt);location.reload();}});
    var prevBtn=document.getElementById('tnav-prev'); var _tnb=null;
    Object.defineProperty(window,'_themeNavBack',{set:function(fn){_tnb=fn;prevBtn.classList.toggle('tnav-disabled',!fn);},get:function(){return _tnb;},configurable:true});
    prevBtn.addEventListener('click',function(){if(window._themeNavBack)window._themeNavBack();});
    var picker=document.getElementById('tnav-picker');
    document.getElementById('tnav-center').addEventListener('click',function(){picker.style.display='flex';document.getElementById('tnav-picker-q').focus();loadThemeList();});
    document.getElementById('tnav-picker-close').addEventListener('click',function(){picker.style.display='none';});
    picker.addEventListener('click',function(e){if(e.target===picker)picker.style.display='none';});
    document.getElementById('tnav-picker-q').addEventListener('input',function(){var q=this.value.toLowerCase();document.querySelectorAll('.tnav-item').forEach(function(el){var t=(el.querySelector('.tnav-name')||{textContent:''}).textContent.toLowerCase();var d=(el.querySelector('.tnav-desc')||{textContent:''}).textContent.toLowerCase();el.style.display=(t.includes(q)||d.includes(q))?'flex':'none';});});
    async function loadThemeList(){
      if(_cache){renderThemeList(_cache);return;}
      try{var r=await fetch(RAW+'themes-files.json?t='+Date.now(),{cache:'no-store'});if(r.ok){_cache=await r.json();}else throw new Error();}
      catch(e){_cache=[{filename:'wikipedia.theme.html',name:'Wikipedia',icon:'📖',description:'Free encyclopedia'},{filename:'nasa.theme.html',name:'NASA',icon:'🚀',description:'Space data'},{filename:'met.theme.html',name:'The Met',icon:'🏛',description:'400k artworks'},{filename:'hackernews.theme.html',name:'Hacker News',icon:'🔶',description:'Tech news'},{filename:'github-trends.theme.html',name:'GitHub Trends',icon:'⭐',description:'Trending repos'}];}
      renderThemeList(_cache);
    }
    function renderThemeList(themes){
      var list=document.getElementById('tnav-picker-list');list.innerHTML='';
      themes.forEach(function(t){var url=t.codeUrl||(RAW+t.filename);var isCur=_cur&&_cur.includes(t.filename);var el=document.createElement('div');el.className='tnav-item'+(isCur?' tnav-current':'');el.innerHTML='<div class="tnav-icon">'+e2(t.icon||'⬡')+'</div><div class="tnav-info"><div class="tnav-name">'+e2(t.name)+'</div><div class="tnav-desc">'+e2(t.description||'')+'</div></div>'+(isCur?'<div class="tnav-badge">current</div>':'');el.addEventListener('click',function(){picker.style.display='none';if(window.YM)window.YM.setTheme(url,_cur);else{localStorage.setItem('ym_prev_theme',_cur);localStorage.setItem('ym_theme_url',url);location.reload();}});list.appendChild(el);});
    }
    document.getElementById('theme-custom-btn')&&document.getElementById('theme-custom-btn').addEventListener('click',function(){var inp=document.getElementById('theme-custom-input');var url=(inp?inp.value:'').trim();if(!url)return;var u=url.replace('https://github.com/','https://raw.githubusercontent.com/').replace('/blob/','/');localStorage.setItem('ym_prev_theme',_cur);localStorage.setItem('ym_theme_url',u);localStorage.removeItem('ym_theme_cache');location.reload();});
  },0);

  updateBottomBar();
  loadTab('apod');
  var obs=new MutationObserver(function(muts){muts.forEach(function(m){m.addedNodes.forEach(function(n){if(n.nodeType!==1)return;if((n.id||'').indexOf('widget')>=0)n.style.cssText='display:none!important';});});});
  obs.observe(document.body,{childList:true,subtree:false});
})();
</script>

<style>
:root{--bg:#020408;--surface:#070d14;--surface2:#0d1520;--surface3:#111c2a;--text:#c8e6ff;--text2:rgba(200,230,255,.55);--text3:rgba(200,230,255,.25);--accent:#4fc3f7;--gold:#f0a830;--red:#ff5252;--green:#69f0ae;--border:rgba(79,195,247,.1);--border2:rgba(79,195,247,.05);--font-d:'Orbitron',monospace;--font-b:'Space Grotesk',sans-serif;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font-b)}
#ym-wp,#ym-bg,#ym-loader,#desktop,#drag-ghost,#page-dots,#nav-bar,#panel-overlay,#panel-switcher,#ym-sign-dlg,#pwa-install-btn,#toasts,.ym-panel,.dlg,[id^="ym-"][id$="-widget"],.ym-widget,#ym-radio-widget,#desktop-slider .icon-wrap,.icon-wrap,.icon-body,.icon-label{display:none!important;visibility:hidden!important;opacity:0!important;pointer-events:none!important}
.ym-overlay,.ym-tabs,.ym-tab,.ym-input,.ym-btn,.ym-card,.ym-notice,.pill{display:none!important}
body::before{content:'';position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse at 20% 50%,rgba(79,195,247,.04) 0%,transparent 50%),radial-gradient(ellipse at 80% 20%,rgba(240,168,48,.03) 0%,transparent 40%)}
#nasa-root{position:fixed;inset:0;display:flex;flex-direction:column;z-index:10}
#nasa-header{flex-shrink:0;display:flex;align-items:center;gap:12px;padding:10px 16px;border-bottom:1px solid var(--border);background:rgba(7,13,20,.9);backdrop-filter:blur(20px)}
#nasa-logo{font-family:var(--font-d);font-size:16px;font-weight:900;color:var(--accent);letter-spacing:.1em;flex-shrink:0;cursor:pointer;text-shadow:0 0 20px rgba(79,195,247,.4)}
#nasa-logo span{color:var(--text3);font-size:10px;font-weight:400;margin-left:6px;letter-spacing:.05em}
#nasa-tabs{display:flex;gap:2px;flex:1;overflow-x:auto;scrollbar-width:none}
#nasa-tabs::-webkit-scrollbar{display:none}
.nasa-tab{font-family:var(--font-d);font-size:8px;letter-spacing:.1em;padding:6px 12px;border-radius:4px;cursor:pointer;color:var(--text3);transition:all .15s;white-space:nowrap;border:1px solid transparent}
.nasa-tab:hover{color:var(--text2)}
.nasa-tab.active{color:var(--accent);border-color:rgba(79,195,247,.2);background:rgba(79,195,247,.05)}
#nasa-content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
#nasa-content::-webkit-scrollbar{width:2px}
#nasa-content::-webkit-scrollbar-thumb{background:var(--border)}
#nasa-apod{padding:0 0 80px}
.nasa-apod-img{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;background:var(--surface2)}
.nasa-apod-body{padding:20px 20px 0}
.nasa-apod-date{font-family:var(--font-d);font-size:8px;color:var(--accent);letter-spacing:.2em;text-transform:uppercase;margin-bottom:8px}
.nasa-apod-title{font-family:var(--font-d);font-size:18px;font-weight:700;color:var(--text);line-height:1.2;margin-bottom:12px}
.nasa-apod-explain{font-size:13px;color:var(--text2);line-height:1.8;font-weight:300}
.nasa-apod-credit{font-size:10px;color:var(--text3);margin-top:8px;font-style:italic}
.nasa-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:2px;padding:2px}
.nasa-grid-item{position:relative;aspect-ratio:1;overflow:hidden;cursor:pointer;background:var(--surface2)}
.nasa-grid-item img{width:100%;height:100%;object-fit:cover;transition:transform .3s ease}
.nasa-grid-item:hover img{transform:scale(1.05)}
.nasa-grid-item .nasa-grid-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.8) 0%,transparent 50%);opacity:0;transition:opacity .2s;display:flex;align-items:flex-end;padding:10px}
.nasa-grid-item:hover .nasa-grid-overlay{opacity:1}
.nasa-grid-item .nasa-grid-title{font-size:11px;color:#fff;font-weight:500;line-height:1.3}
.nasa-mars-header{padding:20px;border-bottom:1px solid var(--border2)}
.nasa-mars-title{font-family:var(--font-d);font-size:14px;color:var(--gold);letter-spacing:.1em}
.nasa-mars-sub{font-size:11px;color:var(--text3);margin-top:4px}
.nasa-rover-tabs{display:flex;gap:6px;padding:12px 20px;border-bottom:1px solid var(--border2)}
.nasa-rover-tab{font-family:var(--font-d);font-size:8px;letter-spacing:.1em;padding:5px 12px;border:1px solid var(--border);border-radius:20px;cursor:pointer;color:var(--text3);transition:all .15s}
.nasa-rover-tab.active{color:var(--gold);border-color:rgba(240,168,48,.3);background:rgba(240,168,48,.06)}
.nasa-asteroid-item{padding:14px 20px;border-bottom:1px solid var(--border2);display:flex;align-items:center;gap:12px}
.nasa-asteroid-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.nasa-asteroid-dot.danger{background:#ff5252;box-shadow:0 0 8px rgba(255,82,82,.5)}
.nasa-asteroid-dot.watch{background:var(--gold);box-shadow:0 0 8px rgba(240,168,48,.4)}
.nasa-asteroid-dot.safe{background:var(--green)}
.nasa-asteroid-name{font-size:13px;font-weight:500;color:var(--text)}

#nasa-detail-inner{padding:20px 20px 80px;clear:both}
.nasa-loading{padding:40px;text-align:center;font-family:var(--font-d);font-size:10px;color:var(--text3);letter-spacing:.2em;animation:blink 1.5s step-end infinite}
@keyframes blink{0%,100%{opacity:.3}50%{opacity:1}}
.nasa-section-hd{padding:14px 20px;border-bottom:1px solid var(--border2);font-family:var(--font-d);font-size:9px;letter-spacing:.2em;color:var(--accent);text-transform:uppercase}

#tnav-picker-hd{flex-shrink:0;padding:14px 16px 10px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.06)}
#tnav-picker-title{font-size:10px;color:rgba(255,255,255,.3);letter-spacing:.15em;flex:1}
#tnav-picker-close{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.5);font-size:16px;width:32px;height:32px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center}
#tnav-picker-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:8px 8px 0}
#tnav-picker-search-wrap{flex-shrink:0;padding:10px 12px;border-top:1px solid rgba(255,255,255,.06);background:rgba(0,0,0,.4)}
#tnav-picker-q{width:100%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);color:#fff;font-size:14px;padding:12px 16px;border-radius:12px;outline:none}
#tnav-picker-q::placeholder{color:rgba(255,255,255,.2)}
.tnav-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:12px;cursor:pointer;transition:background .1s;margin-bottom:4px;border:1px solid transparent}
.tnav-item:hover{background:rgba(255,255,255,.06)}
.tnav-item.tnav-current{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.08)}
.tnav-icon{font-size:26px;flex-shrink:0;width:40px;text-align:center}
.tnav-info{flex:1;min-width:0}
.tnav-name{font-size:14px;font-weight:600;color:#fff;margin-bottom:2px}
.tnav-desc{font-size:11px;color:rgba(255,255,255,.35);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tnav-badge{font-size:9px;color:rgba(255,255,255,.25);flex-shrink:0;background:rgba(255,255,255,.06);padding:2px 8px;border-radius:20px}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.nasa-reveal{animation:fadeUp .3s ease forwards}
</style>

<script>
(function(){
  var API_KEY='DEMO_KEY';
  var _tab='apod';
  var content=document.getElementById('nasa-content');

  document.querySelectorAll('.nasa-tab').forEach(function(tab){
    tab.addEventListener('click',function(){
      document.querySelectorAll('.nasa-tab').forEach(function(t){t.classList.remove('active');});
      tab.classList.add('active');_tab=tab.dataset.tab;loadTab(_tab);
    });
  });

  function loadTab(tab){
    content.innerHTML='<div class="nasa-loading">LOADING…</div>';
    if(tab==='apod')loadAPOD();
    else if(tab==='gallery')loadGallery();
    else if(tab==='mars')loadMars('curiosity');
    else if(tab==='asteroids')loadAsteroids();
  }

  async function loadAPOD(date){
    try{
      var url=date
        ?'https://api.nasa.gov/planetary/apod?api_key='+API_KEY+'&date='+date
        :'https://api.nasa.gov/planetary/apod?api_key='+API_KEY+'&count=7';
      var r=await fetch(url);var items=await r.json();
      if(!Array.isArray(items))items=[items];
      var today=items[0];
      var wrap=document.createElement('div');wrap.id='nasa-apod';wrap.className='nasa-reveal';

      if(today.media_type==='image'){
        var img=document.createElement('img');img.className='nasa-apod-img';img.src=today.hdurl||today.url;wrap.appendChild(img);
      }else{
        var vid=document.createElement('div');vid.style.cssText='background:var(--surface2);aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;font-size:40px;color:var(--text3);cursor:pointer';
        vid.textContent='▶';vid.addEventListener('click',function(){window.open(today.url,'_blank');});wrap.appendChild(vid);
      }

      var body=document.createElement('div');body.className='nasa-apod-body';
      // Date controls
      var dateCtrl=document.createElement('div');
      dateCtrl.style.cssText='display:flex;gap:8px;align-items:center;margin-bottom:16px;flex-wrap:wrap';
      dateCtrl.innerHTML=
        '<input type="date" id="apod-date" style="background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:var(--font-d);font-size:10px;padding:6px 10px;border-radius:4px;flex:1;min-width:140px;outline:none" max="'+new Date().toISOString().slice(0,10)+'" min="1995-06-16" value="'+today.date+'">'+
        '<button id="apod-go" style="background:rgba(79,195,247,.1);border:1px solid rgba(79,195,247,.2);color:var(--accent);font-family:var(--font-d);font-size:9px;padding:6px 14px;border-radius:4px;cursor:pointer;letter-spacing:.1em">GO</button>'+
        '<button id="apod-rnd" style="background:none;border:1px solid var(--border);color:var(--text3);font-family:var(--font-d);font-size:9px;padding:6px 10px;border-radius:4px;cursor:pointer">⟳</button>';
      body.appendChild(dateCtrl);
      setTimeout(function(){
        document.getElementById('apod-go')&&document.getElementById('apod-go').addEventListener('click',function(){var d=document.getElementById('apod-date').value;if(d){content.innerHTML='<div class="nasa-loading">LOADING…</div>';loadAPOD(d);}});
        document.getElementById('apod-rnd')&&document.getElementById('apod-rnd').addEventListener('click',function(){var start=new Date('1995-06-16').getTime();var rnd=new Date(start+Math.random()*(Date.now()-start));content.innerHTML='<div class="nasa-loading">LOADING…</div>';loadAPOD(rnd.toISOString().slice(0,10));});
      },0);
      body.innerHTML+='<div class="nasa-apod-date">'+today.date+' · Astronomy Picture of the Day</div>'+
        '<div class="nasa-apod-title">'+today.title+'</div>'+
        '<div class="nasa-apod-explain">'+today.explanation+'</div>'+
        (today.copyright?'<div class="nasa-apod-credit">© '+today.copyright+'</div>':'')+
        '<div style="height:1px;background:var(--border);margin:24px 0"></div>'+
        '<div style="font-family:var(--font-d);font-size:9px;color:var(--text3);letter-spacing:.15em;margin-bottom:12px">MORE THIS WEEK</div>';
      wrap.appendChild(body);

      var grid=document.createElement('div');grid.className='nasa-grid';
      items.slice(1).forEach(function(item){
        if(item.media_type!=='image')return;
        var el=document.createElement('div');el.className='nasa-grid-item';
        el.innerHTML='<img src="'+item.url+'" loading="lazy" alt=""><div class="nasa-grid-overlay"><div class="nasa-grid-title">'+item.title+'</div></div>';
        el.addEventListener('click',function(){showAPODDetail(item);});
        grid.appendChild(el);
      });
      body.appendChild(grid);
      content.innerHTML='';content.appendChild(wrap);
    }catch(e){content.innerHTML='<div class="nasa-loading">ERROR — CHECK CONNECTION</div>';}
  }

  function showAPODDetail(item){
    var inner=document.getElementById('nasa-detail-inner');
    inner.innerHTML=(item.media_type==='image'?'<img src="'+(item.hdurl||item.url)+'" style="width:100%;border-radius:8px;margin-bottom:16px;display:block">':'')+
      '<div style="font-family:var(--font-d);font-size:8px;color:var(--accent);letter-spacing:.2em;margin-bottom:8px">'+item.date+'</div>'+
      '<div style="font-family:var(--font-d);font-size:18px;color:var(--text);margin-bottom:12px;line-height:1.2">'+item.title+'</div>'+
      '<div style="font-size:13px;color:var(--text2);line-height:1.8;font-weight:300">'+item.explanation+'</div>';
    document.getElementById('nasa-detail').style.display='block';
    document.getElementById('nasa-detail').scrollTop=0;
  }

  async function loadGallery(){
    var queries=['nebula','galaxy','earth from space','supernova','aurora','mars','saturn rings','astronaut','moon landing','black hole'];
    var q=queries[Math.floor(Math.random()*queries.length)];
    try{
      var r=await fetch('https://images-api.nasa.gov/search?q='+encodeURIComponent(q)+'&media_type=image&page_size=20');
      var d=await r.json();var items=(d.collection&&d.collection.items)||[];
      var wrap=document.createElement('div');wrap.className='nasa-reveal';
      wrap.innerHTML='<div class="nasa-section-hd">'+q.toUpperCase()+' — NASA IMAGE LIBRARY</div>';
      var grid=document.createElement('div');grid.className='nasa-grid';
      items.forEach(function(item){
        var links=item.links||[];var thumb=links.find(function(l){return l.rel==='preview';});
        if(!thumb)return;
        var data=item.data&&item.data[0];
        var el=document.createElement('div');el.className='nasa-grid-item';
        el.innerHTML='<img src="'+thumb.href+'" loading="lazy" alt=""><div class="nasa-grid-overlay"><div class="nasa-grid-title">'+(data?data.title||'':'')+'</div></div>';
        el.addEventListener('click',function(){showGalleryDetail(item);});
        grid.appendChild(el);
      });
      wrap.appendChild(grid);content.innerHTML='';content.appendChild(wrap);
    }catch(e){content.innerHTML='<div class="nasa-loading">ERROR</div>';}
  }

  function showGalleryDetail(item){
    var data=item.data&&item.data[0];var links=item.links||[];var img=links.find(function(l){return l.rel==='preview';});
    var inner=document.getElementById('nasa-detail-inner');
    inner.innerHTML=(img?'<img src="'+img.href+'" style="width:100%;border-radius:8px;margin-bottom:16px;display:block">':'')+
      (data?'<div style="font-family:var(--font-d);font-size:8px;color:var(--accent);letter-spacing:.2em;margin-bottom:8px">'+(data.date_created||'').slice(0,10)+'</div>'+
      '<div style="font-family:var(--font-d);font-size:16px;color:var(--text);margin-bottom:12px;line-height:1.2">'+data.title+'</div>'+
      '<div style="font-size:12px;color:var(--text2);line-height:1.7;font-weight:300">'+((data.description||'').slice(0,600))+'</div>':'');
    document.getElementById('nasa-detail').style.display='block';document.getElementById('nasa-detail').scrollTop=0;
  }

  async function loadMars(rover){
    try{
      var r=await fetch('https://api.nasa.gov/mars-photos/api/v1/rovers/'+rover+'/latest_photos?api_key='+API_KEY+'&page=1');
      var d=await r.json();var photos=(d.latest_photos||[]).slice(0,20);
      var wrap=document.createElement('div');wrap.className='nasa-reveal';
      wrap.innerHTML='<div class="nasa-mars-header"><div class="nasa-mars-title">MARS SURFACE</div><div class="nasa-mars-sub">Latest photos from '+rover.charAt(0).toUpperCase()+rover.slice(1)+'</div></div>'+
        '<div class="nasa-rover-tabs">'+['curiosity','perseverance','opportunity'].map(function(r){return '<div class="nasa-rover-tab'+(r===rover?' active':'')+'" data-rover="'+r+'">'+r.toUpperCase()+'</div>';}).join('')+'</div>';
      var grid=document.createElement('div');grid.className='nasa-grid';
      photos.forEach(function(p){
        var el=document.createElement('div');el.className='nasa-grid-item';
        el.innerHTML='<img src="'+p.img_src+'" loading="lazy" alt=""><div class="nasa-grid-overlay"><div class="nasa-grid-title">Sol '+p.sol+' · '+p.camera.name+'</div></div>';
        el.addEventListener('click',function(){showMarsDetail(p);});
        grid.appendChild(el);
      });
      wrap.appendChild(grid);content.innerHTML='';content.appendChild(wrap);
      wrap.querySelectorAll('.nasa-rover-tab').forEach(function(tab){
        tab.addEventListener('click',function(){content.innerHTML='<div class="nasa-loading">LOADING…</div>';loadMars(tab.dataset.rover);});
      });
    }catch(e){content.innerHTML='<div class="nasa-loading">ERROR</div>';}
  }

  function showMarsDetail(p){
    var inner=document.getElementById('nasa-detail-inner');
    inner.innerHTML='<img src="'+p.img_src+'" style="width:100%;border-radius:8px;margin-bottom:16px;display:block">'+
      '<div style="font-family:var(--font-d);font-size:8px;color:var(--gold);letter-spacing:.2em;margin-bottom:8px">SOL '+p.sol+' · '+p.earth_date+'</div>'+
      '<div style="font-family:var(--font-d);font-size:16px;color:var(--text);margin-bottom:8px">'+p.camera.full_name+'</div>'+
      '<div style="font-size:12px;color:var(--text3)">Rover: '+p.rover.name+' · Status: '+p.rover.status.toUpperCase()+'</div>';
    document.getElementById('nasa-detail').style.display='block';document.getElementById('nasa-detail').scrollTop=0;
  }

  async function loadAsteroids(){
    try{
      var today=new Date().toISOString().slice(0,10);
      var r=await fetch('https://api.nasa.gov/neo/rest/v1/feed?start_date='+today+'&end_date='+today+'&api_key='+API_KEY);
      var d=await r.json();var all=[];
      Object.values(d.near_earth_objects||{}).forEach(function(day){all=all.concat(day);});
      all.sort(function(a,b){var da=a.close_approach_data[0]&&parseFloat(a.close_approach_data[0].miss_distance.lunar)||999;var db=b.close_approach_data[0]&&parseFloat(b.close_approach_data[0].miss_distance.lunar)||999;return da-db;});
      var wrap=document.createElement('div');wrap.className='nasa-reveal';
      wrap.innerHTML='<div class="nasa-section-hd">NEAR EARTH OBJECTS · TODAY · '+all.length+' TRACKED</div>';
      all.slice(0,20).forEach(function(neo){
        var approach=neo.close_approach_data[0]||{};
        var lunar=parseFloat(approach.miss_distance&&approach.miss_distance.lunar)||999;
        var isDanger=neo.is_potentially_hazardous_asteroid;
        var dotClass=isDanger?'danger':lunar<10?'watch':'safe';
        var diameter=neo.estimated_diameter&&neo.estimated_diameter.meters;
        var diam=diameter?Math.round((diameter.estimated_diameter_min+diameter.estimated_diameter_max)/2):'?';
        var row=document.createElement('div');row.className='nasa-asteroid-item';row.style.cursor='pointer';
        row.innerHTML='<div class="nasa-asteroid-dot '+dotClass+'"></div>'+
          '<div style="flex:1;min-width:0"><div class="nasa-asteroid-name">'+neo.name.replace(/[()]/g,'')+'</div>'+
          '<div class="nasa-asteroid-sub">Ø ~'+diam+'m · '+(isDanger?'⚠ Potentially hazardous':'Safe')+'</div></div>'+
          '<div class="nasa-asteroid-dist">'+lunar.toFixed(1)+' LD</div>';
        row.addEventListener('click',function(){showNEODetail(neo);});
        wrap.appendChild(row);
      });
      content.innerHTML='';content.appendChild(wrap);
    }catch(e){content.innerHTML='<div class="nasa-loading">ERROR</div>';}
  }

  function showNEODetail(neo){
    var approach=neo.close_approach_data[0]||{};
    var isDanger=neo.is_potentially_hazardous_asteroid;
    var d=neo.estimated_diameter&&neo.estimated_diameter.meters;
    var inner=document.getElementById('nasa-detail-inner');
    inner.innerHTML='<div style="font-size:48px;text-align:center;margin-bottom:16px">'+(isDanger?'☄':'🪨')+'</div>'+
      '<div style="font-family:var(--font-d);font-size:8px;color:'+(isDanger?'var(--red)':'var(--green)')+';letter-spacing:.2em;text-align:center;margin-bottom:8px">'+(isDanger?'POTENTIALLY HAZARDOUS':'SAFE')+'</div>'+
      '<div style="font-family:var(--font-d);font-size:20px;color:var(--text);text-align:center;margin-bottom:20px">'+neo.name.replace(/[()]/g,'')+'</div>'+
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">'+
        neoStat('Miss Distance',parseFloat(approach.miss_distance&&approach.miss_distance.lunar||0).toFixed(2)+' LD')+
        neoStat('Velocity',parseFloat(approach.relative_velocity&&approach.relative_velocity.kilometers_per_hour||0).toFixed(0)+' km/h')+
        neoStat('Diameter',d?Math.round((d.estimated_diameter_min+d.estimated_diameter_max)/2)+'m':'?')+
        neoStat('Close approach',approach.close_approach_date||'?')+'</div>';
    document.getElementById('nasa-detail').style.display='block';document.getElementById('nasa-detail').scrollTop=0;
  }

  function neoStat(label,val){return '<div style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px"><div style="font-family:var(--font-d);font-size:8px;color:var(--text3);letter-spacing:.1em;margin-bottom:4px">'+label+'</div><div style="font-family:var(--font-d);font-size:14px;color:var(--accent)">'+val+'</div></div>';}

  document.getElementById('nasa-detail-close').addEventListener('click',function(){document.getElementById('nasa-detail').style.display='none';});
  document.getElementById('nasa-detail').addEventListener('click',function(e){if(e.target===this)this.style.display='none';});

  // Theme Nav
  setTimeout(function(){
    var RAW='https://raw.githubusercontent.com/theodoreyong9/YourMinedApp/main/';
    var _cur=localStorage.getItem('ym_theme_url')||'';var _cache=null;
    function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
    document.getElementById('tnav-back').addEventListener('click',function(){localStorage.setItem('ym_theme_url',localStorage.getItem('ym_prev_theme')||'');localStorage.removeItem('ym_theme_cache');location.reload();});
    var prevBtn=document.getElementById('tnav-prev');var _tnb=null;
    Object.defineProperty(window,'_themeNavBack',{set:function(fn){_tnb=fn;prevBtn.classList.toggle('tnav-disabled',!fn);},get:function(){return _tnb;},configurable:true});
    prevBtn.addEventListener('click',function(){if(window._themeNavBack)window._themeNavBack();});
    var picker=document.getElementById('tnav-picker');
    document.getElementById('tnav-center').addEventListener('click',function(){picker.style.display='flex';document.getElementById('tnav-picker-q').focus();loadThemeList();});
    document.getElementById('tnav-picker-close').addEventListener('click',function(){picker.style.display='none';});
    picker.addEventListener('click',function(e){if(e.target===picker)picker.style.display='none';});
    document.getElementById('tnav-picker-q').addEventListener('input',function(){var q=this.value.toLowerCase();document.querySelectorAll('.tnav-item').forEach(function(el){var t=(el.querySelector('.tnav-name')||{textContent:''}).textContent.toLowerCase();var d=(el.querySelector('.tnav-desc')||{textContent:''}).textContent.toLowerCase();el.style.display=(t.includes(q)||d.includes(q))?'flex':'none';});});
    async function loadThemeList(){
      if(_cache){renderThemeList(_cache);return;}
      try{var r=await fetch(RAW+'themes-files.json?t='+Date.now(),{cache:'no-store'});if(r.ok){_cache=await r.json();}else throw new Error();}
      catch(e){_cache=[{filename:'wikipedia.theme.html',name:'Wikipedia',icon:'📖',description:'Free encyclopedia'},{filename:'nasa.theme.html',name:'NASA',icon:'🚀',description:'Space images and data'},{filename:'met.theme.html',name:'The Met',icon:'🏛',description:'400k artworks'},{filename:'hackernews.theme.html',name:'Hacker News',icon:'🔶',description:'Tech news'},{filename:'github-trends.theme.html',name:'GitHub Trends',icon:'⭐',description:'Trending repos'}];}
      renderThemeList(_cache);
    }
    function renderThemeList(themes){
      var list=document.getElementById('tnav-picker-list');list.innerHTML='';
      themes.forEach(function(t){
        var url=t.codeUrl||(RAW+t.filename);var isCur=_cur&&_cur.includes(t.filename);
        var el=document.createElement('div');el.className='tnav-item'+(isCur?' tnav-current':'');
        el.innerHTML='<div class="tnav-icon">'+esc(t.icon||'⬡')+'</div><div class="tnav-info"><div class="tnav-name">'+esc(t.name||t.filename)+'</div><div class="tnav-desc">'+esc(t.description||'')+'</div></div>'+(isCur?'<div class="tnav-badge">current</div>':'');
        el.addEventListener('click',function(){localStorage.setItem('ym_prev_theme',_cur);localStorage.setItem('ym_theme_url',url);localStorage.removeItem('ym_theme_cache');picker.style.display='none';location.reload();});
        list.appendChild(el);
      });
    }
    document.getElementById('theme-custom-btn')&&document.getElementById('theme-custom-btn').addEventListener('click',function(){var inp=document.getElementById('theme-custom-input');var url=(inp?inp.value:'').trim();if(!url)return;var u=url.replace('https://github.com/','https://raw.githubusercontent.com/').replace('/blob/','/');localStorage.setItem('ym_prev_theme',_cur);localStorage.setItem('ym_theme_url',u);localStorage.removeItem('ym_theme_cache');location.reload();});
  },0);

  loadTab('apod');
  var obs=new MutationObserver(function(muts){muts.forEach(function(m){m.addedNodes.forEach(function(n){if(n.nodeType!==1)return;if((n.id||'').indexOf('widget')>=0)n.style.cssText='display:none!important';});});});
  obs.observe(document.body,{childList:true,subtree:false});
})();
</script>

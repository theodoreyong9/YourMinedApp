<style>

/* ── Masque anti-clignotement au retour d'arrière-plan ─────────────────
   Simple aplat de la même couleur que le fond, invisible tant qu'il ne
   s'affiche pas. On ne cherche pas à empêcher/accélérer le recompositing
   du navigateur (impossible à garantir), on le masque simplement le
   temps qu'il se termine, avec un timing qu'on contrôle nous-mêmes. */
#ym-resume-mask{position:fixed;inset:0;background:#06060e;display:none;pointer-events:none}
</style>
</head>
<body>

<div id="ym-boot">
  <div class="ldr-logo">YOURMINE</div>
  <div class="ldr-bar"><div class="ldr-fill"></div></div>
  <div class="ldr-sub">LOADING MESH</div>
  <div id="boot-err"></div>
</div>

<div id="ym-resume-mask" aria-hidden="true"></div>

<script>
/* ── Capture beforeinstallprompt IMMÉDIATEMENT, avant tout chargement ──
   C'est le seul endroit fiable : l'event peut se déclencher très tôt,
   avant même que app.js soit chargé. On le stocke sur window._pwaPrompt
   et app.js le récupère au moment d'initialiser le bouton.
──────────────────────────────────────────────────────────────────────── */
window._pwaPrompt = null;
window.addEventListener('beforeinstallprompt', function(e) {
  e.preventDefault();
  window._pwaPrompt = e;
  // Si app.js est déjà chargé et a enregistré un callback, on l'appelle
  if (typeof window._pwaPromptReady === 'function') window._pwaPromptReady(e);
});

/* ── Anti-clignotement au retour d'arrière-plan ──────────────────────────
   Sur iOS Safari (et parfois Android Chrome) en PWA standalone, quand
   l'app revient au premier plan, le navigateur affiche d'abord un
   snapshot figé puis doit recompositer toutes les couches GPU
   (position:fixed, backdrop-filter, canvas…) purgées en arrière-plan.
   On ne force rien sur le layout de la page (ça créait sa propre
   micro-saccade) — on affiche à la place un cache plein écran de la
   même couleur que le fond, dès que l'app redevient visible, et on ne
   le retire qu'après avoir laissé au compositeur le temps de finir
   (2 frames + petite marge), pour ne jamais exposer la frame brute.
   Le masque est placé en top layer (API Popover) pour être garanti
   au-dessus de tout thème injecté, quel que soit son z-index. */
(function initResumeMask(){
  var mask = document.getElementById('ym-resume-mask');
  if (!mask) return;
  var supportsPopover = typeof HTMLElement !== 'undefined' &&
    'popover' in HTMLElement.prototype;
  if (supportsPopover) {
    mask.setAttribute('popover', 'manual');
    try { mask.showPopover(); } catch(e){}
  } else {
    mask.style.zIndex = '2147483647';
  }
  var hideTimer = null;
  document.addEventListener('visibilitychange', function(){
    if (document.visibilityState === 'visible') {
      clearTimeout(hideTimer);
      mask.style.display = 'block';
      requestAnimationFrame(function(){
        requestAnimationFrame(function(){
          hideTimer = setTimeout(function(){ mask.style.display = 'none'; }, 50);
        });
      });
    }
  });
})();

/* ── Helpers globaux ──────────────────────────────────────────────────── */
window.YM_toast = function(msg, type, dur){
  type = type||'info'; dur = dur||3000;
  var c = document.getElementById('toasts'); if(!c) return;
  var el = document.createElement('div');
  el.className = 'toast '+type; el.innerHTML = msg;
  c.appendChild(el); setTimeout(function(){ el.remove(); }, dur);
};
window.YM_escHtml = function(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;')
                      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
};

function showErr(msg){
  var el = document.getElementById('boot-err');
  if(el){ el.textContent = msg; el.style.display = 'block'; }
}

function fetchRaw(url){
  var u = url + (url.indexOf('?')>=0?'&':'?') + '_=' + Date.now();
  return fetch(u).then(function(r){
    if(!r.ok) throw new Error('HTTP '+r.status);
    return r.text();
  });
}

function execScript(code){
  return new Promise(function(res, rej){
    var blob = new Blob([code], {type:'text/javascript'});
    var bUrl = URL.createObjectURL(blob);
    var s = document.createElement('script');
    s.src = bUrl;
    s.onload  = function(){ URL.revokeObjectURL(bUrl); res(); };
    s.onerror = function(){ URL.revokeObjectURL(bUrl); rej(new Error('exec failed')); };
    document.head.appendChild(s);
  });
}

function injectTheme(html){
  var doc = new DOMParser().parseFromString(
    '<html><head></head><body>'+html+'</body></html>', 'text/html'
  );
  doc.querySelectorAll('link,style').forEach(function(n){
    document.head.appendChild(document.adoptNode(n));
  });
  Array.from(doc.body.childNodes).forEach(function(n){
    if(n.nodeName==='LINK'||n.nodeName==='STYLE') return;
    if(n.nodeName==='SCRIPT'){
      var s = document.createElement('script');
      if(n.src) s.src = n.src;
      else s.textContent = n.textContent;
      document.body.appendChild(s);
    } else {
      document.body.appendChild(document.adoptNode(n));
    }
  });
}

var THEME_KEY   = 'ym_theme_url';
var THEME_CACHE = 'ym_theme_cache';
var GH_RAW      = 'https://raw.githubusercontent.com/theodoreyong9/YourMinedApp/main/src/';
var DEF_THEME   = GH_RAW + 'themes/default.html';
// Exposé globalement pour que app.js puisse l'utiliser dans checkURLRoute
window._YM_GH_RAW = GH_RAW;

/* ── Injecte le bouton retour bord gauche AVANT le thème
   Aucun thème ne peut le supprimer car il est dans index.html.
   Mobile  : swipe depuis le tout bord de l'écran (<16px)
   Desktop : zone de survol sur le bord gauche → bouton visible

   ── Garantie anti-recouvrement (bouton uniquement) ──────────────────
   Seul le BOUTON lui-même (l'élément réellement cliquable, celui qui
   doit toujours rester accessible) est placé dans le "top layer" via
   l'API Popover — peint après tout l'arbre de stacking du document,
   donc jamais recouvrable par un z-index de thème injecté, quel qu'il
   soit. La zone de détection tactile et l'indicateur visuel restent en
   z-index classique : la zone n'a pas besoin d'être en top layer (elle
   capte déjà les gestes via des écouteurs `document` en phase capture,
   indépendants de tout ce qui est peint par-dessus), et y placer aussi
   une bande tactile de 32px de haut en 100% de hauteur d'écran en top
   layer entrait en conflit avec le geste natif "retour" du navigateur
   sur le bord d'écran, rendant le tout difficile à déclencher.
──────────────────────────────────────────────────────────────────── */
(function injectEdgeBack(){
  var supportsPopover = typeof HTMLElement !== 'undefined' &&
    'popover' in HTMLElement.prototype;

  // Seuil strict : le geste doit démarrer VRAIMENT depuis le bord de
  // l'écran, pas depuis une large bande. Purement une valeur de
  // détection JS — n'affecte pas la largeur visuelle de la zone CSS
  // (qui elle sert au hover desktop et peut rester plus généreuse).
  var EDGE_PX = 16;

  var style = document.createElement('style');
  style.textContent =
    // Zone trigger (invisible, intercepte les events) — z-index classique
    '#_ym_edge{position:fixed;top:0;left:0;bottom:0;width:32px;margin:0;' +
    'right:auto;z-index:9999;' +
    'background:transparent;border:none;padding:0;overflow:visible;' +
    '-webkit-tap-highlight-color:transparent;}' +

    // Bouton retour principal — top layer via popover
    '#_ym_edge_btn{' +
      'position:fixed;top:50%;left:0;right:auto;bottom:auto;margin:0;' +
      'transform:translateY(-50%) translateX(-100%);' +
      (supportsPopover ? 'z-index:auto;' : 'z-index:10000;') +
      'background:rgba(6,6,18,.92);' +
      'border:1.5px solid rgba(240,168,48,.5);border-left:none;' +
      'color:#f0a830;font-size:22px;line-height:1;' +
      'padding:16px 14px 16px 10px;' +
      'border-radius:0 14px 14px 0;' +
      'cursor:pointer;' +
      'overflow:visible;' +
      'transition:transform .2s cubic-bezier(.32,.72,0,1);' +
      'user-select:none;-webkit-user-select:none;' +
      'backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);' +
      'touch-action:manipulation;' +
      'pointer-events:auto;' +
      '-webkit-tap-highlight-color:transparent;' +
    '}' +

    // Mobile : petit indicateur visible permanent sur le bord — z-index classique
    '#_ym_edge_indicator{' +
      'position:fixed;top:50%;left:0;right:auto;bottom:auto;margin:0;' +
      'border:none;padding:0;overflow:visible;' +
      'transform:translateY(-50%);' +
      'z-index:9998;' +
      'width:1.5px;height:28px;' +
      'background:rgba(240,168,48,.5);' +
      'border-radius:0 1px 1px 0;' +
      'box-shadow:0 0 6px 1px rgba(240,168,48,.35);' +
      'pointer-events:none;' +
    '}' +

    // Desktop hover: boutons glissent depuis la gauche
    '@media(hover:hover) and (pointer:fine){' +
      '#_ym_edge:hover ~ #_ym_edge_btn,' +
      '#_ym_edge_btn:hover{transform:translateY(-50%) translateX(0)!important;pointer-events:all!important}' +
      '#_ym_edge_indicator{display:none}' +
    '}' +

    // Mobile: bouton visible quand body a la classe _edge_open
    '@media(hover:none),(pointer:coarse){' +
      '#_ym_edge_btn{pointer-events:all}' +
      '._edge_open #_ym_edge_btn{transform:translateY(-50%) translateX(0)!important}' +
    '}';

  document.head.appendChild(style);

  // DOM elements
  var zone  = document.createElement('div');  zone.id  = '_ym_edge';
  var btn   = document.createElement('button'); btn.id  = '_ym_edge_btn';
  btn.textContent = '‹'; btn.setAttribute('aria-label','Back');
  var indic = document.createElement('div');  indic.id = '_ym_edge_indicator';

  if (supportsPopover) {
    // popover="manual" = pas de fermeture automatique au clic ailleurs
    // (contrairement à "auto") — on gère nous-mêmes l'ouverture/
    // fermeture visuelle via la classe _edge_open et les transform.
    // Seul le bouton en a besoin (voir commentaire plus haut).
    btn.setAttribute('popover', 'manual');
  }

  document.body.appendChild(zone);
  document.body.appendChild(btn);
  document.body.appendChild(indic);

  if (supportsPopover) {
    // Place réellement le bouton dans le top layer. Il reste "ouvert"
    // en permanence — c'est notre propre CSS (transform, classe
    // _edge_open) qui gère son apparence visible/cachée.
    try { btn.showPopover(); } catch(e){}
  }

  var _hideTimer = null;

  function doBack(){
    document.body.classList.remove('_edge_open');
    clearTimeout(_hideTimer);
    location.reload();
  }
  function goDefault(){
    document.body.classList.remove('_edge_open');
    clearTimeout(_hideTimer);
    localStorage.setItem('ym_theme_url', DEF_THEME);
    localStorage.removeItem('ym_theme_cache');
    location.reload();
  }
  function show(){
    document.body.classList.add('_edge_open');
    clearTimeout(_hideTimer);
    _hideTimer = setTimeout(hide, 5000);
  }
  function hide(){
    document.body.classList.remove('_edge_open');
  }

  // Bouton jaune : ouvre le thème default
  btn.addEventListener('click', function(e){ e.stopPropagation(); goDefault(); });
  btn.addEventListener('touchend', function(e){
    e.preventDefault(); e.stopPropagation();
    goDefault();
  },{passive:false});

  // Zone edge : gère tap (mobile → show/hide) et swipe (action directe).
  // Le geste ne se déclenche QUE s'il démarre à moins de EDGE_PX du
  // tout bord de l'écran — pas une large bande de tolérance.
  var _gsx=0, _gsy=0, _gdown=false, _gstarted=false;

  // Listener GLOBAL sur document en capture pour attraper tous les swipes.
  // Comme ces listeners sont sur `document` en phase capture, ils se
  // déclenchent AVANT tout gestionnaire de thème injecté, quel que soit
  // ce qui est visuellement au-dessus — le geste reste donc toujours
  // détecté même sans top layer sur la zone.
  document.addEventListener('touchstart', function(e){
    if(e.touches.length!==1) return;
    _gsx=e.touches[0].clientX; _gsy=e.touches[0].clientY;
    // N'active le suivi que si le touch COMMENCE vraiment sur le bord
    _gdown=(_gsx<EDGE_PX); _gstarted=false;
  },{passive:true,capture:true});

  document.addEventListener('touchmove', function(e){
    if(!_gdown) return;
    var dx=e.touches[0].clientX-_gsx;
    var dy=Math.abs(e.touches[0].clientY-_gsy);
    if(!_gstarted && Math.abs(dx)>8 && dy<Math.abs(dx)){_gstarted=true;}
  },{passive:true,capture:true});

  document.addEventListener('touchend', function(e){
    if(!_gdown) return; _gdown=false;
    var ex=e.changedTouches[0].clientX;
    var ey=e.changedTouches[0].clientY;
    var dx=ex-_gsx, dy=Math.abs(ey-_gsy);
    if(dy>100) return;
    if(_gstarted && dx>40){ doBack(); return; }
    if(_gstarted && dx<-30 && ex<EDGE_PX){ if(document.body.classList.contains('_edge_open')) hide(); else show(); return; }
    if(!_gstarted && Math.abs(dx)<20 && _gsx<EDGE_PX){ if(document.body.classList.contains('_edge_open')) hide(); else show(); }
  },{passive:true,capture:true});

  // Conserver aussi les listeners sur la zone pour le tap direct
  zone.addEventListener('touchstart',function(e){e.stopPropagation();},{passive:true,capture:false});

  // Clic ailleurs → cache
  document.addEventListener('click', function(e){
    if(!document.body.classList.contains('_edge_open')) return;
    if(e.target===zone||e.target===btn||e.target===indic) return;
    hide();
  });
})();

async function boot(){
  // Si l'URL contient un segment .theme, l'appliquer AVANT la logique first-launch
  // Si l'URL contient un segment .theme, résoudre l'URL AVANT de charger
  await (async function checkThemeFromURL(){
    var parts=location.pathname.replace(/^\//,'').split('/').filter(Boolean);
    var seg=null;
    for(var i=0;i<parts.length;i++){
      var m=parts[i].match(/^([\w-]+)\.theme$/i);
      if(m){seg=m[1];break;}
    }
    if(!seg)return;
    var found=null;
    // 1. Cherche dans themes-files.json (registry utilisateur à la racine du repo)
    var THEMES_FILES=GH_RAW.replace('/src/','/')+'themes-files.json';
    try{
      var r=await fetch(THEMES_FILES+'?t='+Date.now(),{cache:'no-store'});
      if(r.ok){
        var list=await r.json();
        var entry=list.find(function(t){
          return (t.filename||'').replace(/\.theme\.html$/i,'').toLowerCase()===seg.toLowerCase()||
                 (t.name||'').toLowerCase().replace(/\s+/g,'-')===seg.toLowerCase();
        });
        if(entry&&entry.codeUrl)found=entry.codeUrl;
      }
    }catch(e){}
    // 2. Essaie src/themes/nom.theme.html
    if(!found){
      var u1=GH_RAW+'themes/'+seg+'.theme.html';
      try{var c1=await fetch(u1+'?t='+Date.now(),{method:'HEAD',cache:'no-store'});if(c1.ok)found=u1;}catch(e){}
    }
    // 3. Essaie src/themes/nom.html (thèmes système anciens)
    if(!found){
      var u2=GH_RAW+'themes/'+seg+'.html';
      try{var c2=await fetch(u2+'?t='+Date.now(),{method:'HEAD',cache:'no-store'});if(c2.ok)found=u2;}catch(e){}
    }
    if(found){
      localStorage.setItem(THEME_KEY,found);
      localStorage.removeItem(THEME_CACHE);
      localStorage.setItem('ym_not_first','1');
    }
    // Si rien trouvé, boot continue avec le thème actuel
  })();

  // Premier lancement : si aucun thème sauvegardé, utilise hello
  var isFirstLaunch = !localStorage.getItem(THEME_KEY) && !localStorage.getItem('ym_not_first');
  if(isFirstLaunch){
    localStorage.setItem(THEME_KEY, GH_RAW + 'themes/hello.html');
    localStorage.setItem('ym_not_first','1');
  }
  var themeUrl = localStorage.getItem(THEME_KEY) || DEF_THEME;
  // Corrige les anciennes URLs .theme.html → .html pour les thèmes système
  if(themeUrl.includes('/src/themes/')&&themeUrl.endsWith('.theme.html')){
    var fixed=themeUrl.replace('.theme.html','.html');
    // On essaiera fixed en fallback si themeUrl 404
  }
  var html;
  try {
    html = await fetchRaw(themeUrl);
    try { localStorage.setItem(THEME_CACHE, html); } catch(e){}
  } catch(e) {
    // Si l'URL contient .theme.html, essaie .html (thèmes système)
    if(!html && themeUrl.includes('.theme.html')){
      var fallbackUrl=themeUrl.replace('.theme.html','.html');
      try{
        html=await fetchRaw(fallbackUrl);
        localStorage.setItem(THEME_KEY,fallbackUrl);
        localStorage.removeItem(THEME_CACHE);
        try{localStorage.setItem(THEME_CACHE,html);}catch(e2){}
      }catch(e2){}
    }
    if(!html) html = localStorage.getItem(THEME_CACHE);
    if(!html){
      var _def=GH_RAW+'themes/default.html';
      if(themeUrl !== _def){
        localStorage.removeItem(THEME_KEY);
        try { html = await fetchRaw(_def); }
        catch(e2){ showErr('Cannot load theme. Check your connection.'); return; }
      } else {
        showErr('Cannot load theme. Check your connection.'); return;
      }
    }
  }

  injectTheme(html);

  var bootEl = document.getElementById('ym-boot');
  if(bootEl) bootEl.classList.add('hidden');

  try {
    await execScript(await fetchRaw(GH_RAW+'desk.js'));
  } catch(e) { showErr('desk.js: '+e.message); return; }

  try {
    await execScript(await fetchRaw(GH_RAW+'app.js'));
  } catch(e) { showErr('app.js: '+e.message); }
}

boot();
</script>
</body>

<style>
:root{--bg:#0c0a08;--surface:#141210;--surface2:#1a1714;--text:#f0ebe4;--text2:rgba(240,235,228,.55);--text3:rgba(240,235,228,.28);--accent:#c8a96e;--border:rgba(200,169,110,.1);--border2:rgba(200,169,110,.05);--font-serif:'Cormorant Garamond',Georgia,serif;--font-display:'Cinzel',serif;--font-sans:'Inter',sans-serif;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font-serif)}
#ym-wp,#ym-bg,#ym-loader,#desktop,#drag-ghost,#page-dots,#nav-bar,#panel-overlay,#panel-switcher,#ym-sign-dlg,#pwa-install-btn,#toasts,.ym-panel,.dlg,[id^="ym-"][id$="-widget"],.ym-widget,#ym-radio-widget,#desktop-slider .icon-wrap,.icon-wrap,.icon-body,.icon-label{display:none!important;visibility:hidden!important;opacity:0!important;pointer-events:none!important}
.ym-overlay,.ym-tabs,.ym-tab,.ym-input,.ym-btn,.ym-card,.ym-notice,.pill{display:none!important}
#met-root{position:fixed;inset:0;display:flex;flex-direction:column;z-index:10}
#met-content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;min-height:0}
#met-content::-webkit-scrollbar{width:2px}
#met-content::-webkit-scrollbar-thumb{background:var(--border)}
.met-grid{display:grid;gap:1px;padding:1px;grid-template-columns:repeat(2,1fr)}
.met-card{background:var(--surface);cursor:pointer;overflow:hidden;transition:opacity .15s}
.met-card:hover{opacity:.85}
.met-card-img{width:100%;aspect-ratio:1;object-fit:cover;display:block;background:var(--surface2)}
.met-card-body{padding:8px 10px 10px}
.met-card-title{font-family:var(--font-serif);font-size:12px;font-weight:600;color:var(--text);line-height:1.3;margin-bottom:2px}
.met-card-meta{font-size:10px;color:var(--text3);font-family:var(--font-sans)}
.met-hero{position:relative;cursor:pointer;overflow:hidden;border-bottom:1px solid var(--border)}
.met-hero-img{width:100%;height:50vw;max-height:300px;object-fit:cover;display:block;background:var(--surface2)}
.met-hero-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(12,10,8,.95) 0%,rgba(12,10,8,.2) 60%,transparent 100%);display:flex;flex-direction:column;justify-content:flex-end;padding:18px}
.met-hero-dept{font-family:var(--font-sans);font-size:9px;color:var(--accent);letter-spacing:.15em;text-transform:uppercase;margin-bottom:5px}
.met-hero-title{font-family:var(--font-serif);font-size:20px;font-weight:600;color:var(--text);line-height:1.2;margin-bottom:3px}
.met-hero-artist{font-size:12px;color:var(--text2);font-style:italic}
.met-loading{padding:60px 20px;text-align:center;font-family:var(--font-display);font-size:11px;color:var(--text3);letter-spacing:.2em}
/* Detail */
#met-detail{position:fixed;inset:0;z-index:600;background:var(--bg);overflow-y:auto;-webkit-overflow-scrolling:touch;display:none;flex-direction:column}
#met-detail-inner{flex:1;overflow-y:auto}
.met-detail-img{width:100%;display:block;background:var(--surface2);max-height:80vw;object-fit:contain}
.met-detail-body{padding:18px}
.met-detail-dept{font-family:var(--font-sans);font-size:9px;color:var(--accent);letter-spacing:.15em;text-transform:uppercase;margin-bottom:7px}
.met-detail-title{font-family:var(--font-serif);font-size:22px;font-weight:600;color:var(--text);line-height:1.2;margin-bottom:5px}
.met-detail-artist{font-size:15px;color:var(--text2);font-style:italic;margin-bottom:14px}
.met-detail-sep{height:1px;background:linear-gradient(90deg,var(--accent),transparent);opacity:.3;margin:14px 0}
.met-detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.met-detail-stat{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:9px 11px}
.met-detail-stat-label{font-family:var(--font-sans);font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:2px}
.met-detail-stat-val{font-size:12px;color:var(--text2);font-family:var(--font-serif)}
#met-detail-close-wrap{flex-shrink:0;padding:12px;display:flex;justify-content:center;border-top:1px solid var(--border)}
#met-detail-close{background:rgba(200,169,110,.08);border:1px solid rgba(200,169,110,.2);color:var(--text2);font-size:18px;width:48px;height:48px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center}
/* Bottom bar */
#met-bottom{flex-shrink:0;display:flex;flex-direction:column;gap:6px;padding:8px 12px calc(8px + env(safe-area-inset-bottom,0px));border-top:1px solid var(--border);background:rgba(12,10,8,.95);backdrop-filter:blur(16px)}
#met-depts{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none}
#met-depts::-webkit-scrollbar{display:none}
.met-dept{font-family:var(--font-sans);font-size:10px;padding:5px 12px;border:1px solid var(--border);border-radius:20px;cursor:pointer;color:var(--text3);white-space:nowrap;transition:all .15s;flex-shrink:0}
.met-dept.active{color:var(--accent);border-color:rgba(200,169,110,.3);background:rgba(200,169,110,.06)}
#met-search-wrap{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:0 12px;position:relative}
#met-search-wrap:focus-within{border-color:rgba(200,169,110,.3)}
#met-search{flex:1;background:none;border:none;color:var(--text);font-family:var(--font-serif);font-size:13px;padding:8px 0;outline:none}
#met-search::placeholder{color:var(--text3)}
#met-suggest{position:absolute;bottom:calc(100%+4px);left:0;right:0;background:var(--surface2);border:1px solid var(--border);border-radius:8px;z-index:100;overflow:hidden;display:none;box-shadow:0 -8px 24px rgba(0,0,0,.6);max-height:200px;overflow-y:auto}
.met-suggest-item{padding:9px 14px;cursor:pointer;border-bottom:1px solid var(--border2);font-size:12px;color:var(--text2);transition:background .1s}
.met-suggest-item:hover{background:rgba(200,169,110,.06);color:var(--accent)}
/* Theme Nav */
#theme-nav{flex-shrink:0;display:flex;align-items:center;height:48px;background:rgba(0,0,0,.75);backdrop-filter:blur(24px);border-top:1px solid rgba(255,255,255,.06);z-index:50}
.tnav-btn{width:56px;height:100%;background:none;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.35);font-size:20px;transition:color .15s;flex-shrink:0}
.tnav-btn:hover,.tnav-btn:active{color:rgba(255,255,255,.85)}
.tnav-btn.tnav-disabled{opacity:.2;pointer-events:none}
#tnav-center{flex:1;height:100%;display:flex;align-items:center;justify-content:center;cursor:pointer;gap:6px;color:rgba(255,255,255,.3);transition:color .15s}
#tnav-center:hover{color:rgba(255,255,255,.7)}
#tnav-center-lbl{font-size:10px;letter-spacing:.08em}
#tnav-picker{position:fixed;inset:0;z-index:900;background:rgba(0,0,0,.92);backdrop-filter:blur(24px);display:none;flex-direction:column}
#tnav-picker-hd{flex-shrink:0;padding:14px 16px 10px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.06)}
#tnav-picker-title{font-size:10px;color:rgba(255,255,255,.3);letter-spacing:.15em;flex:1}
#tnav-picker-list{flex:1;overflow-y:auto;padding:8px 8px 0}
#tnav-picker-search-wrap{flex-shrink:0;padding:10px 12px;border-top:1px solid rgba(255,255,255,.06);background:rgba(0,0,0,.4)}
#tnav-picker-q{width:100%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);color:#fff;font-size:14px;padding:12px 16px;border-radius:12px;outline:none}
#tnav-picker-q::placeholder{color:rgba(255,255,255,.2)}
.tnav-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:12px;cursor:pointer;transition:background .1s;margin-bottom:4px;border:1px solid transparent}
.tnav-item:hover{background:rgba(255,255,255,.06)}
.tnav-item.tnav-current{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.08)}
.tnav-icon{font-size:24px;flex-shrink:0;width:36px;text-align:center}
.tnav-info{flex:1;min-width:0}
.tnav-name{font-size:14px;font-weight:600;color:#fff;margin-bottom:2px}
.tnav-desc{font-size:11px;color:rgba(255,255,255,.35);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tnav-badge{font-size:9px;color:rgba(255,255,255,.25);flex-shrink:0;background:rgba(255,255,255,.06);padding:2px 8px;border-radius:20px}
#tnav-picker-close-wrap{flex-shrink:0;padding:10px 12px;border-top:1px solid rgba(255,255,255,.06);display:flex;justify-content:center}
#tnav-picker-close{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.6);font-size:18px;width:48px;height:48px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.met-reveal{animation:fadeUp .35s ease forwards}
</style>

<script>
(function(){
  var API='https://collectionapi.metmuseum.org/public/collection/v1';
  var content=document.getElementById('met-content');
  var _dept=0,_deptName='Highlights',_searchTimer=null;
  var DEPT_QUERIES={0:['portrait','landscape painting','sculpture marble','illuminated manuscript','ancient vessel'],11:['portrait oil painting','baroque landscape','renaissance madonna'],9:['etching print','watercolor drawing'],6:['chinese jade','japanese scroll','buddhist sculpture'],10:['Egyptian mummy','pharaoh statue'],13:['greek vase','roman bust','marble relief'],21:['modern abstract','impressionism','cubism'],3:['mesopotamia','cuneiform tablet']};

  document.querySelectorAll('.met-dept').forEach(function(d){
    d.addEventListener('click',function(){
      document.querySelectorAll('.met-dept').forEach(function(x){x.classList.remove('active');});
      d.classList.add('active');_dept=parseInt(d.dataset.dept);_deptName=d.dataset.name;loadCollection();
    });
  });

  var searchInput=document.getElementById('met-search');
  var suggest=document.getElementById('met-suggest');
  searchInput.addEventListener('input',function(){
    var q=searchInput.value.trim();
    if(!q){suggest.style.display='none';return;}
    clearTimeout(_searchTimer);_searchTimer=setTimeout(function(){searchArtworks(q);},350);
  });
  searchInput.addEventListener('keydown',function(e){if(e.key==='Enter'){suggest.style.display='none';var q=searchInput.value.trim();if(q)loadSearch(q);}});
  document.addEventListener('click',function(e){if(!e.target.closest('#met-search-wrap'))suggest.style.display='none';});

  async function searchArtworks(q){
    try{
      var r=await fetch(API+'/search?q='+encodeURIComponent(q)+'&hasImages=true&isPublicDomain=true&fields=objectID,title,artistDisplayName');
      var d=await r.json();var ids=(d.objectIDs||[]).slice(0,5);
      var objs=await Promise.all(ids.map(function(id){return fetch(API+'/objects/'+id).then(function(r){return r.json();}).catch(function(){return null;});}));
      suggest.innerHTML='';
      objs.filter(Boolean).forEach(function(obj){if(!obj.title)return;var el=document.createElement('div');el.className='met-suggest-item';el.textContent=obj.title+(obj.artistDisplayName?' — '+obj.artistDisplayName:'');el.addEventListener('click',function(){suggest.style.display='none';searchInput.value=obj.title;showDetail(obj);});suggest.appendChild(el);});
      suggest.style.display='block';
    }catch(e){suggest.style.display='none';}
  }

  async function loadSearch(q){
    content.innerHTML='<div class="met-loading">SEARCHING…</div>';
    try{var r=await fetch(API+'/search?q='+encodeURIComponent(q)+'&hasImages=true&isPublicDomain=true');var d=await r.json();loadGrid((d.objectIDs||[]).slice(0,20),'"'+q+'"');}
    catch(e){content.innerHTML='<div class="met-loading">ERROR</div>';}
  }

  async function loadCollection(){
    content.innerHTML='<div class="met-loading">LOADING…</div>';
    try{
      var queries=DEPT_QUERIES[_dept]||DEPT_QUERIES[0];
      var q=queries[Math.floor(Math.random()*queries.length)];
      var url=_dept===0?API+'/search?hasImages=true&isPublicDomain=true&isHighlight=true&q='+encodeURIComponent(q):API+'/search?hasImages=true&isPublicDomain=true&departmentId='+_dept+'&q='+encodeURIComponent(q);
      var r=await fetch(url);var d=await r.json();
      if(!d.objectIDs||!d.objectIDs.length)throw new Error('No results');
      loadGrid(shuffle(d.objectIDs).slice(0,24),_deptName);
    }catch(e){content.innerHTML='<div class="met-loading">'+esc(e.message)+'</div>';}
  }

  async function loadGrid(ids,title){
    var objs=await Promise.all(ids.map(function(id){return fetch(API+'/objects/'+id).then(function(r){return r.json();}).catch(function(){return null;});}));
    objs=objs.filter(function(o){return o&&o.primaryImageSmall;});
    if(!objs.length){content.innerHTML='<div class="met-loading">NO RESULTS WITH IMAGES</div>';return;}
    var wrap=document.createElement('div');wrap.className='met-reveal';
    // Hero
    var hero=objs[0];var heroEl=document.createElement('div');heroEl.className='met-hero';
    heroEl.innerHTML='<img class="met-hero-img" src="'+hero.primaryImageSmall+'" alt="" loading="lazy"><div class="met-hero-overlay"><div class="met-hero-dept">'+esc(title)+'</div><div class="met-hero-title">'+esc(hero.title||'Untitled')+'</div><div class="met-hero-artist">'+esc(hero.artistDisplayName||'Unknown')+'</div></div>';
    heroEl.addEventListener('click',function(){showDetail(hero);});
    wrap.appendChild(heroEl);
    var grid=document.createElement('div');grid.className='met-grid';
    objs.slice(1).forEach(function(obj){var card=document.createElement('div');card.className='met-card';card.innerHTML='<img class="met-card-img" src="'+obj.primaryImageSmall+'" loading="lazy" alt=""><div class="met-card-body"><div class="met-card-title">'+esc(obj.title||'Untitled')+'</div><div class="met-card-meta">'+esc(obj.artistDisplayName||'Unknown')+(obj.objectDate?' · '+obj.objectDate:'')+'</div></div>';card.addEventListener('click',function(){showDetail(obj);});grid.appendChild(card);});
    wrap.appendChild(grid);content.innerHTML='';content.appendChild(wrap);
  }

  function showDetail(obj){
    var inner=document.getElementById('met-detail-inner');
    inner.innerHTML='<img class="met-detail-img" src="'+(obj.primaryImage||obj.primaryImageSmall||'')+'" alt="" loading="lazy">'+
      '<div class="met-detail-body"><div class="met-detail-dept">'+esc(obj.department||'')+'</div>'+
      '<div class="met-detail-title">'+esc(obj.title||'Untitled')+'</div>'+
      '<div class="met-detail-artist">'+esc(obj.artistDisplayName||'Unknown')+(obj.artistNationality?' ('+esc(obj.artistNationality)+')':'')+'</div>'+
      '<div class="met-detail-sep"></div>'+
      '<div class="met-detail-grid">'+mStat('Date',obj.objectDate||'—')+mStat('Medium',(obj.medium||'—').slice(0,40))+mStat('Dimensions',(obj.dimensions||'—').slice(0,30))+mStat('Accession',obj.accessionNumber||'—')+'</div>'+
      (obj.creditLine?'<div style="font-size:11px;color:var(--text3);font-style:italic;margin-bottom:14px">'+esc(obj.creditLine)+'</div>':'')+
      '<a href="'+(obj.objectURL||'')+'" target="_blank" rel="noopener" style="font-size:11px;color:var(--accent);text-decoration:none;font-family:var(--font-sans)">↗ View on metmuseum.org</a></div>';
    document.getElementById('met-detail').style.display='flex';
    document.getElementById('met-detail').scrollTop=0;
    window._themeNavBack=function(){document.getElementById('met-detail').style.display='none';window._themeNavBack=null;};
  }
  document.getElementById('met-detail-close').addEventListener('click',function(){document.getElementById('met-detail').style.display='none';window._themeNavBack=null;});

  function mStat(l,v){return '<div class="met-detail-stat"><div class="met-detail-stat-label">'+l+'</div><div class="met-detail-stat-val">'+esc(v)+'</div></div>';}
  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  function shuffle(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t;}return b;}

  // Theme Nav
  setTimeout(function(){
    var RAW='https://raw.githubusercontent.com/theodoreyong9/YourMinedApp/main/';
    var _cur=localStorage.getItem('ym_theme_url')||'';var _cache=null;
    function e2(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
    document.getElementById('tnav-back').addEventListener('click',function(){localStorage.setItem('ym_theme_url',localStorage.getItem('ym_prev_theme')||'');localStorage.removeItem('ym_theme_cache');location.reload();});
    var prevBtn=document.getElementById('tnav-prev');var _tnb=null;
    Object.defineProperty(window,'_themeNavBack',{set:function(fn){_tnb=fn;prevBtn.classList.toggle('tnav-disabled',!fn);},get:function(){return _tnb;},configurable:true});
    prevBtn.addEventListener('click',function(){if(window._themeNavBack)window._themeNavBack();});
    var picker=document.getElementById('tnav-picker');
    document.getElementById('tnav-center').addEventListener('click',function(){picker.style.display='flex';document.getElementById('tnav-picker-q').focus();loadThemeList();});
    document.getElementById('tnav-picker-close').addEventListener('click',function(){picker.style.display='none';});
    picker.addEventListener('click',function(e){if(e.target===picker)picker.style.display='none';});
    document.getElementById('tnav-picker-q').addEventListener('input',function(){var q=this.value.toLowerCase();document.querySelectorAll('.tnav-item').forEach(function(el){var t=(el.querySelector('.tnav-name')||{textContent:''}).textContent.toLowerCase();var d=(el.querySelector('.tnav-desc')||{textContent:''}).textContent.toLowerCase();el.style.display=(t.includes(q)||d.includes(q))?'flex':'none';});});
    async function loadThemeList(){
      if(_cache){renderThemeList(_cache);return;}
      try{var r=await fetch(RAW+'themes-files.json?t='+Date.now(),{cache:'no-store'});if(r.ok){_cache=await r.json();}else throw new Error();}
      catch(e){_cache=[{filename:'wikipedia.theme.html',name:'Wikipedia',icon:'📖',description:'Free encyclopedia'},{filename:'nasa.theme.html',name:'NASA',icon:'🚀',description:'Space data'},{filename:'met.theme.html',name:'The Met',icon:'🏛',description:'400k artworks'},{filename:'hackernews.theme.html',name:'Hacker News',icon:'🔶',description:'Tech news'},{filename:'github-trends.theme.html',name:'GitHub Trends',icon:'⭐',description:'Trending repos'}];}
      renderThemeList(_cache);
    }
    function renderThemeList(themes){var list=document.getElementById('tnav-picker-list');list.innerHTML='';themes.forEach(function(t){var url=t.codeUrl||(RAW+t.filename);var isCur=_cur&&_cur.includes(t.filename);var el=document.createElement('div');el.className='tnav-item'+(isCur?' tnav-current':'');el.innerHTML='<div class="tnav-icon">'+e2(t.icon||'⬡')+'</div><div class="tnav-info"><div class="tnav-name">'+e2(t.name)+'</div><div class="tnav-desc">'+e2(t.description||'')+'</div></div>'+(isCur?'<div class="tnav-badge">current</div>':'');el.addEventListener('click',function(){localStorage.setItem('ym_prev_theme',_cur);localStorage.setItem('ym_theme_url',url);localStorage.removeItem('ym_theme_cache');picker.style.display='none';location.reload();});list.appendChild(el);});}
    document.getElementById('theme-custom-btn')&&document.getElementById('theme-custom-btn').addEventListener('click',function(){var inp=document.getElementById('theme-custom-input');var url=(inp?inp.value:'').trim();if(!url)return;var u=url.replace('https://github.com/','https://raw.githubusercontent.com/').replace('/blob/','/');localStorage.setItem('ym_prev_theme',_cur);localStorage.setItem('ym_theme_url',u);localStorage.removeItem('ym_theme_cache');location.reload();});
  },0);

  loadCollection();
  var obs=new MutationObserver(function(muts){muts.forEach(function(m){m.addedNodes.forEach(function(n){if(n.nodeType!==1)return;if((n.id||'').indexOf('widget')>=0)n.style.cssText='display:none!important';});});});
  obs.observe(document.body,{childList:true,subtree:false});
})();
</script>

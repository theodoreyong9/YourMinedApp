<script>
(function(){
  try{
    var cv=document.getElementById('ym-canvas'),ctx=cv?cv.getContext('2d'):null;
    if(!cv||!ctx)return;
    var W,H,DPR,OW,OH,oc,ox,id,b32,raf,lT=0,tA=0;
    function res(){DPR=Math.min(window.devicePixelRatio||1,2);W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';}
    var P=new Uint8Array(512);
    (function(){var p=new Uint8Array(256),i,j,t;for(i=0;i<256;i++)p[i]=i;for(i=255;i>0;i--){j=Math.floor(Math.random()*(i+1));t=p[i];p[i]=p[j];p[j]=t;}for(i=0;i<512;i++)P[i]=p[i&255];})();
    function fd(t){return t*t*t*(t*(t*6-15)+10);}
    function lp(a,b,t){return a+(b-a)*t;}
    function gr(h,x,y){var hh=h&3,u=hh<2?x:y,v=hh<2?y:x;return((hh&1)?-u:u)+((hh&2)?-v:v);}
    function ns(x,y){var xi=~~x&255,yi=~~y&255,xf=x-~~x,yf=y-~~y,u=fd(xf),v=fd(yf),aa=P[P[xi]+yi],ab=P[P[xi]+yi+1],ba=P[P[xi+1]+yi],bb=P[P[xi+1]+yi+1];return lp(lp(gr(aa,xf,yf),gr(ba,xf-1,yf),u),lp(gr(ab,xf,yf-1),gr(bb,xf-1,yf-1),u),v);}
    function fbm(x,y){return ns(x,y)*.5+ns(x*2.1,y*2.1)*.3+ns(x*4.3,y*4.3)*.2;}
    function mo(){OW=Math.ceil(W/3);OH=Math.ceil(H/3);oc=document.createElement('canvas');oc.width=OW;oc.height=OH;ox=oc.getContext('2d');}
    function mi(){id=ox.createImageData(OW,OH);b32=new Uint32Array(id.data.buffer);}
    function dr(ts){
      raf=requestAnimationFrame(dr);tA+=Math.min(ts-lT,50);lT=ts;
      var t=tA*.00018,i=0,r,g,b,tt;
      for(var py=0;py<OH;py++){var fy=py*.0052+t*.6;for(var px=0;px<OW;px++){
        var fx=px*.0048+t*.4,n=fbm(fx,fy),n2=fbm(fx+t*.3,fy+.7),v=(n*.6+n2*.4)*.5+.5,hv=fbm(fx*.5+1.3,fy*.5+t*.2)*.5+.5;
        if(hv<.5){tt=hv*2;r=(240*(1-tt)+34*tt)|0;g=(168*(1-tt)+211*tt)|0;b=(48*(1-tt)+238*tt)|0;}
        else{tt=(hv-.5)*2;r=(34*(1-tt)+167*tt)|0;g=(211*(1-tt)+139*tt)|0;b=(238*(1-tt)+250*tt)|0;}
        b32[i++]=((Math.min(.42,v*v*.42)*255|0)<<24)|(b<<16)|(g<<8)|r;
      }}
      ox.putImageData(id,0,0);ctx.clearRect(0,0,W,H);ctx.drawImage(oc,0,0,W,H);
    }
    res();mo();mi();raf=requestAnimationFrame(dr);
    window.addEventListener('resize',function(){res();mo();mi();},{passive:true});
    document.addEventListener('visibilitychange',function(){if(document.hidden)cancelAnimationFrame(raf);else{lT=0;raf=requestAnimationFrame(dr);}});
  }catch(e){}
})();
</script>

<script>
(function(){
  var K='ym_theme_url',C='ym_theme_cache';
  var D='https://raw.githubusercontent.com/theodoreyong9/YourMinedApp/main/src/themes/default.html';
  function go(){localStorage.setItem(K,D);localStorage.removeItem(C);location.reload();}
  ['s1','s2'].forEach(function(id){var b=document.getElementById(id);if(b)b.addEventListener('click',go);});
  function bd(){if(window.YM_Desk){window.YM_Desk.addIcon=function(){};window.YM_Desk.renderDesk=function(){};}}
  bd();window.addEventListener('ym:sphere-activated',bd);
  new MutationObserver(function(mm){mm.forEach(function(m){m.addedNodes.forEach(function(n){if(n.nodeType===1&&(n.id||'').indexOf('widget')>=0)n.style.cssText='display:none!important';});});}).observe(document.body,{childList:true});
  var bgd=document.getElementById('bg-dlg');
  if(bgd)bgd.addEventListener('click',function(e){if(e.target===bgd)bgd.classList.remove('open');});
  var thb=document.getElementById('theme-custom-btn');
  if(thb)thb.addEventListener('click',function(){
    var i=document.getElementById('theme-custom-input'),u=(i?i.value:'').trim();
    if(!u)return;
    u=u.replace('https://github.com/','https://raw.githubusercontent.com/').replace('/blob/','/');
    localStorage.setItem(K,u);
    if(window.YM&&window.YM.setTheme){window.YM.setTheme(u);return;}
    location.reload();
  });
})();
</script>

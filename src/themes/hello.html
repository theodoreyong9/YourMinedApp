<!-- YourMine — Landing Theme -->
<script>window.YM_THEME_META={"name":"Hello","icon":"✦","description":"YourMine landing"};</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Outfit:wght@200;300&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#06060e;color:#e8eaf2;font-family:'Outfit',sans-serif;-webkit-font-smoothing:antialiased}

#ym-wp,#ym-bg,#ym-loader,#desktop,#drag-ghost,#page-dots,#nav-bar,#panel-overlay,#panel-switcher,#ym-sign-dlg,#pwa-install-btn,#toasts,.ym-panel,.dlg,[id^="ym-"][id$="-widget"],.ym-widget,#desktop-slider .icon-wrap{display:none!important}
.ym-overlay,.ym-tabs,.ym-tab,.ym-input,.ym-btn,.ym-card,.ym-notice,.ym-separator,.pill,#ym-edge-back,#ym-edge-back-btn{display:none!important}

#ym-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.4}
#land{position:fixed;inset:0;overflow-x:hidden;overflow-y:scroll;-webkit-overflow-scrolling:touch;z-index:10;scroll-snap-type:y mandatory;scroll-behavior:smooth}

/* ── layout ── */
#land .block{
  min-height:100dvh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:60px 32px;
  scroll-snap-align:start;
  scroll-snap-stop:always;
}

@keyframes gradPan{0%,100%{background-position:0%}50%{background-position:100%}}
@keyframes up{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:none}}

/* ── TITLE ── */
#land .ym-title{
  font-family:'Syne',sans-serif;
  font-size: clamp(56px, 7vw, 120px);
  font-weight:800;
  line-height:1;
  background:linear-gradient(90deg,#f0a830,#fff 44%,#08e0f8);
  background-size:200%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  text-align:center;
  margin-bottom:10px;
  animation:up .9s .1s cubic-bezier(.16,1,.3,1) both, gradPan 7s 1s ease-in-out infinite;
}

/* ── SUBTITLE (FIX VISIBILITY) ── */
#land .ym-subtitle{
  font-size: clamp(18px, 2.2vw, 34px);
  font-weight:300;
  color: rgba(232,234,242,.75);
  margin-bottom:52px;
  text-align:center;
  line-height:1.3;

  /* IMPORTANT FIX */
  opacity:1 !important;
  display:block;
}

/* ── BODY ── */
#land .body{
  font-size:clamp(24px,4vw,48px) !important;
  font-weight:200;
  line-height:1.65;
  letter-spacing:-.01em;
  color:rgba(232,234,242,.45);
}
#land .body strong{color:#e8eaf2;font-weight:300}

/* ── BUTTON ── */
#land .btn{
  font-family:'Outfit',sans-serif;
  font-size:14px;
  font-weight:300;
  padding:12px 36px;
  border-radius:100px;
  border:none;
  cursor:pointer;
  background:#e8eaf2;
  color:#06060e;
  animation:up .7s .5s cubic-bezier(.16,1,.3,1) both;
}

/* ── ICON BLOCK ── */
#land .icon-block{
  min-height:100dvh;
  display:flex;
  align-items:center;
  justify-content:center;
  scroll-snap-align:start;
  scroll-snap-stop:always;
}
</style>

<canvas id="ym-canvas"></canvas>

<div id="land">

  <!-- 1. HERO -->
  <div class="block">
    <div class="ym-title">YOURMINE</div>

    <!-- SUBTITLE CORRECT -->
    <div class="ym-subtitle">
      Execution Layer for Asynchronous Civilizations
    </div>

    <button class="btn" id="s1">Start ›</button>
  </div>

  <!-- 2 -->
  <div class="block icon-block">
    <div class="body">Your web.<br>Your rules.</div>
  </div>

  <!-- 3 -->
  <div class="block">
    <div class="body">
      One click to run it.<br>
      One prompt to shape it.
    </div>
  </div>

  <!-- 4 -->
  <div class="block">
    <div class="body">
      Web 1 gave access.<br>
      Web 2 gave interaction.<br>
      Web 3 gave ownership.
    </div>
  </div>

  <!-- 5 -->
  <div class="block">
    <div class="body">
      <strong>YourMine gives liberation.</strong><br>
      From anywhere.
    </div>
  </div>

  <!-- 6 -->
  <div class="block">
    <div class="ym-title" style="font-size:64px">Welcome to Soulnet</div>
    <button class="btn" id="s2">Start ›</button>
  </div>

</div>

<script>
(function(){
  var land=document.getElementById('land');
  var blocks=document.querySelectorAll('#land .block, #land .icon-block');

  blocks.forEach(b=>{
    b.style.opacity='0';
    b.style.transition='opacity .6s ease';
  });

  var observer=new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(e.isIntersecting){
        e.target.style.opacity='1';
      }else{
        e.target.style.opacity='0';
      }
    });
  },{threshold:0.6});

  blocks.forEach(b=>observer.observe(b));
})();
</script>

</body>
</html>

  var _readProgress = {};
  var _lightMode = localStorage.getItem('book_mode') === 'light';
  var _fontSize = parseInt(localStorage.getItem('book_fontsize') || '17');
  var _lineHeight = localStorage.getItem('book_lh') || '1.9';
  var _readWidth = localStorage.getItem('book_width') || '66ch';
  var _searchTimer = null;
  var _allText = null; // lazy loaded for search

  var root = document.getElementById('book-root');
  var reader = document.getElementById('book-reader');
  var content = document.getElementById('book-content');
  var loading = document.getElementById('book-loading');
  var progressFill = document.getElementById('book-progress-fill');
  var chapterTitle = document.getElementById('book-chapter-title');
  var posEl = document.getElementById('book-pos');

  // Apply saved settings
  function applySettings(){
    document.documentElement.style.setProperty('--read-size', _fontSize+'px');
    document.documentElement.style.setProperty('--read-lh', _lineHeight);
    document.documentElement.style.setProperty('--read-width', _readWidth);
    if(_lightMode) root.classList.add('light-mode');
    else root.classList.remove('light-mode');
  }
  applySettings();

  // Read progress
  function saveProgress(chIdx, scrollTop){
    _readProgress[chIdx] = scrollTop;
    try{ localStorage.setItem('book_progress', JSON.stringify({ch:chIdx, pos:_readProgress})); }catch(e){}
  }
  function loadProgress(){
    try{
      var p = JSON.parse(localStorage.getItem('book_progress')||'{}');
      _curChapter = p.ch || 0;
      _readProgress = p.pos || {};
    }catch(e){}
  }

  // Scroll progress bar
  content.addEventListener('scroll', function(){
    var max = content.scrollHeight - content.clientHeight;
    if(max > 0) progressFill.style.width = (content.scrollTop/max*100)+'%';
    var words = _chapters[_curChapter] ? _chapters[_curChapter].word_count : 0;
    var pct = max > 0 ? Math.round(content.scrollTop/max*100) : 0;
    posEl.textContent = 'ch. '+(_curChapter+1)+'/'+_chapters.length+' · '+pct+'%';
    saveProgress(_curChapter, content.scrollTop);
  }, {passive:true});

  // Load single book.json — all chapters in one fetch
  async function loadIndex(){
    try{
      var book = window.YM_BOOK_CONFIG.books[window.YM_BOOK_CONFIG.activeBook];
      var url = book.index + '?t=' + Date.now();
      var r = await fetch(url, {mode:'cors'});
      if(!r.ok) throw new Error('HTTP '+r.status);
      _chapters = await r.json();
    }catch(e){
      reader.innerHTML = '<p style="color:var(--text3);padding:24px;text-align:center">Impossible de charger le livre.<br><small>'+e.message+'</small></p>';
      loading.style.display = 'none';
      return;
    }
    buildTOC();
    loadProgress();
    loadChapter(_curChapter, true);
  }

  // Load chapter
  async function loadChapter(idx, restoreScroll){
    if(idx < 0 || idx >= _chapters.length) return;
    _curChapter = idx;
    loading.style.display = 'flex';
    reader.innerHTML = '';
    content.scrollTop = 0;
    progressFill.style.width = '0%';
    chapterTitle.textContent = _chapters[idx].title;
    updateNavBtns();

    try{
      var data;
      if(_chapterCache[idx]){
        data = _chapterCache[idx];
      } else {
        var book = window.YM_BOOK_CONFIG.books[window.YM_BOOK_CONFIG.activeBook];
        var chId = _chapters[idx].id !== undefined ? _chapters[idx].id : idx;
        var chUrl = book.chapterBase + chId + '.json?t=' + Date.now();
        var cr = await fetch(chUrl, {mode:'cors'});
        if(!cr.ok) throw new Error('HTTP '+cr.status);
        data = await cr.json();
        _chapterCache[idx] = data;
      }
      loading.style.display = 'none';
      renderChapter(data);
      if(restoreScroll && _readProgress[idx]){
        setTimeout(function(){ content.scrollTop = _readProgress[idx]; }, 50);
      }
      // Preload adjacent chapters silently
      if(idx+1 < _chapters.length && !_chapterCache[idx+1]){
        // single file — all chapters already in cache
      }
    }catch(e){
      loading.style.display = 'none';
      reader.innerHTML = '<p style="color:var(--text3);padding:24px;text-align:center">Impossible de charger ce chapitre.<br><small>Vérifiez que les fichiers JSON sont sur le repo.</small></p>';
    }
    updateTOCActive();
  }

  function renderChapter(data){
    var html = '<div class="book-reveal">';
    html += '<h1>'+esc(data.title)+'</h1>';
    html += '<div class="chapter-meta"><span>'+esc(data.pages||'')+'</span><span>~'+Math.round(data.word_count/200)+' min de lecture</span></div>';
    html += '<div class="chapter-sep"></div>';
    // Split into paragraphs
    var paragraphs = data.text.split(/\n\s*\n/).filter(function(p){return p.trim().length > 20;});
    paragraphs.forEach(function(para){
      para = para.trim();
      if(!para) return;
      // Detect sub-headings (short lines ending without period)
      if(para.length < 80 && !para.endsWith('.') && !para.endsWith(',') && para.split('\n').length < 3){
        html += '<h2>'+esc(para)+'</h2>';
      } else {
        html += '<p>'+esc(para.replace(/\n/g,' '))+'</p>';
      }
    });
    html += '</div>';
    reader.innerHTML = html;
  }

  function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  // TOC
  window.switchBook = function(idx){
    if(idx === window.YM_BOOK_CONFIG.activeBook) return;
    window.YM_BOOK_CONFIG.activeBook = idx;
    _chapters = [];
    _chapterCache = {};
    _curChapter = 0;
    _readProgress = {};
    var books = window.YM_BOOK_CONFIG.books;
    document.getElementById('book-toc-title').textContent = books[idx].label;
    // Update button styles
    books.forEach(function(b, i){
      var btn = document.getElementById('book-btn-'+i);
      if(!btn) return;
      if(i === idx){
        btn.style.border = '1px solid var(--accent)';
        btn.style.background = 'rgba(196,163,90,.15)';
        btn.style.color = 'var(--accent)';
      } else {
        btn.style.border = '1px solid var(--border)';
        btn.style.background = 'none';
        btn.style.color = 'var(--text3)';
      }
    });
    loadIndex();
  };

  function buildTOC(){
    var list = document.getElementById('book-toc-list');
    list.innerHTML = '';
    _chapters.forEach(function(ch, i){
      var el = document.createElement('div');
      el.className = 'book-toc-item';
      el.dataset.idx = i;
      var numText = i === 0 ? 'P' : String(i);
      el.innerHTML = '<div class="book-toc-num">'+numText+'</div>'+
        '<div style="flex:1;min-width:0">'+
          '<div class="book-toc-name">'+esc(ch.title)+'</div>'+
          '<div class="book-toc-meta">p. '+esc(ch.pages||'')+'  ·  '+Math.round(ch.word_count/200)+' min</div>'+
          '<div class="book-toc-progress"><div class="book-toc-progress-fill" id="toc-prog-'+i+'" style="width:0%"></div></div>'+
        '</div>';
      el.addEventListener('click', function(){
        closeTOC();
        loadChapter(i, true);
      });
      list.appendChild(el);
    });
  }

  function updateTOCActive(){
    document.querySelectorAll('.book-toc-item').forEach(function(el){
      el.classList.toggle('active', parseInt(el.dataset.idx) === _curChapter);
    });
  }

  function updateNavBtns(){
    document.getElementById('btn-prev-ch').style.opacity = _curChapter > 0 ? '1' : '0.3';
    document.getElementById('btn-next-ch').style.opacity = _curChapter < _chapters.length-1 ? '1' : '0.3';
    posEl.textContent = 'ch. '+(_curChapter+1)+'/'+_chapters.length;
  }

  // Open/close overlays
  document.getElementById('book-menu-btn').addEventListener('click', function(){
    document.getElementById('book-toc').style.display = 'flex';
    window._themeNavBack = closeTOC;
  });
  function closeTOC(){ document.getElementById('book-toc').style.display = 'none'; window._themeNavBack = null; }
  document.getElementById('book-toc-close').addEventListener('click', closeTOC);

  // Search
  document.getElementById('btn-search').addEventListener('click', openSearch);
  document.getElementById('book-search-close').addEventListener('click', closeSearch);
  function openSearch(){
    document.getElementById('book-search').style.display = 'flex';
    document.getElementById('book-search-input').focus();
    window._themeNavBack = closeSearch;
    // Pre-load all chapters for search
    if(!_allText) preloadAllForSearch();
  }
  function closeSearch(){ document.getElementById('book-search').style.display = 'none'; window._themeNavBack = null; }

  async function preloadAllForSearch(){
    var all = [];
    for(var i=0; i<_chapters.length; i++){
      try{
        var data;
        if(_chapterCache[i]){ data = _chapterCache[i]; }
        else { continue; } // single file — skip if not cached
        all.push({idx:i, title:data.title, text:data.text});
      }catch(e){}
    }
    _allText = all;
  }

  document.getElementById('book-search-input').addEventListener('input', function(){
    clearTimeout(_searchTimer);
    var q = this.value.trim();
    if(!q){ document.getElementById('book-search-results').innerHTML=''; document.getElementById('book-search-count').textContent=''; return; }
    _searchTimer = setTimeout(function(){ doSearch(q); }, 300);
  });

  function doSearch(q){
    if(!_allText){ document.getElementById('book-search-count').textContent = 'Chargement…'; return; }
    var results = [];
    var qLow = q.toLowerCase();
    _allText.forEach(function(ch){
      var text = ch.text;
      var idx = 0;
      while((idx = text.toLowerCase().indexOf(qLow, idx)) !== -1 && results.length < 50){
        var start = Math.max(0, idx-80);
        var end = Math.min(text.length, idx+q.length+80);
        var snippet = text.slice(start, end);
        results.push({chIdx:ch.idx, chTitle:ch.title, snippet:snippet, matchIdx:idx-start, matchLen:q.length});
        idx += q.length;
      }
    });
    var count = document.getElementById('book-search-count');
    count.textContent = results.length + ' résultat' + (results.length!==1?'s':'') + ' pour "'+q+'"';
    var list = document.getElementById('book-search-results');
    list.innerHTML = '';
    results.forEach(function(res){
      var el = document.createElement('div');
      el.className = 'book-search-result';
      var before = esc(res.snippet.slice(0, res.matchIdx));
      var match = esc(res.snippet.slice(res.matchIdx, res.matchIdx+res.matchLen));
      var after = esc(res.snippet.slice(res.matchIdx+res.matchLen));
      el.innerHTML = '<div class="book-search-result-chapter">'+esc(res.chTitle)+'</div>'+
        '<div class="book-search-result-text">…'+before+'<mark>'+match+'</mark>'+after+'…</div>';
      el.addEventListener('click', function(){
        closeSearch();
        loadChapter(res.chIdx, false).then(function(){
          // Highlight and scroll to match
          setTimeout(function(){
            var text = reader.innerHTML;
            reader.innerHTML = text.replace(new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<span class="highlight">$1</span>');
            var hl = reader.querySelector('.highlight');
            if(hl) hl.scrollIntoView({behavior:'smooth',block:'center'});
          }, 200);
        });
      });
      list.appendChild(el);
    });
  }

  // Mode nuit/jour
  document.getElementById('btn-mode').addEventListener('click', function(){
    _lightMode = !_lightMode;
    localStorage.setItem('book_mode', _lightMode?'light':'dark');
    applySettings();
    this.classList.toggle('active', _lightMode);
  });

  // Settings
  var settingsEl = document.getElementById('book-settings');
  var settingsOpen = false;
  document.getElementById('btn-settings').addEventListener('click', function(){
    settingsOpen = !settingsOpen;
    settingsEl.style.display = settingsOpen ? 'flex' : 'none';
    this.classList.toggle('active', settingsOpen);
  });
  document.getElementById('font-smaller').addEventListener('click', function(){
    _fontSize = Math.max(13, _fontSize-1);
    localStorage.setItem('book_fontsize', _fontSize);
    document.documentElement.style.setProperty('--read-size', _fontSize+'px');
  });
  document.getElementById('font-larger').addEventListener('click', function(){
    _fontSize = Math.min(24, _fontSize+1);
    localStorage.setItem('book_fontsize', _fontSize);
    document.documentElement.style.setProperty('--read-size', _fontSize+'px');
  });
  [['lh-tight','1.5'],['lh-normal','1.9'],['lh-wide','2.3']].forEach(function(pair){
    document.getElementById(pair[0]).addEventListener('click', function(){
      _lineHeight = pair[1];
      localStorage.setItem('book_lh', _lineHeight);
      document.documentElement.style.setProperty('--read-lh', _lineHeight);
    });
  });
  [['width-narrow','52ch'],['width-medium','66ch'],['width-wide','80ch']].forEach(function(pair){
    document.getElementById(pair[0]).addEventListener('click', function(){
      _readWidth = pair[1];
      localStorage.setItem('book_width', _readWidth);
      document.documentElement.style.setProperty('--read-width', _readWidth);
    });
  });

  // Navigation
  document.getElementById('btn-prev-ch').addEventListener('click', function(){
    if(_curChapter > 0) loadChapter(_curChapter-1, false);
  });
  document.getElementById('btn-next-ch').addEventListener('click', function(){
    if(_curChapter < _chapters.length-1) loadChapter(_curChapter+1, false);
  });

  // Theme Nav
  setTimeout(function(){
    var RAW2='https://raw.githubusercontent.com/theodoreyong9/YourMinedApp/main/';
    var _cur=localStorage.getItem('ym_theme_url')||''; var _cache=null;
    function e2(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
    document.getElementById('tnav-back').addEventListener('click',function(){localStorage.setItem('ym_theme_url',localStorage.getItem('ym_prev_theme')||'');location.reload();});
    var prevBtn=document.getElementById('tnav-prev');var _tnb=null;
    Object.defineProperty(window,'_themeNavBack',{set:function(fn){_tnb=fn;prevBtn.classList.toggle('tnav-disabled',!fn);},get:function(){return _tnb;},configurable:true});
    prevBtn.addEventListener('click',function(){if(window._themeNavBack)window._themeNavBack();});
    var picker=document.getElementById('tnav-picker');
    document.getElementById('tnav-center').addEventListener('click',function(){picker.style.display='flex';document.getElementById('tnav-picker-q').focus();loadThemeList();});
    document.getElementById('tnav-picker-close').addEventListener('click',function(){picker.style.display='none';});
    picker.addEventListener('click',function(e){if(e.target===picker)picker.style.display='none';});
    document.getElementById('tnav-picker-q').addEventListener('input',function(){var q=this.value.toLowerCase();document.querySelectorAll('.tnav-item').forEach(function(el){var t=(el.querySelector('.tnav-name')||{textContent:''}).textContent.toLowerCase();var d=(el.querySelector('.tnav-desc')||{textContent:''}).textContent.toLowerCase();el.style.display=(t.includes(q)||d.includes(q))?'flex':'none';});});
    async function loadThemeList(){
      if(_cache){renderThemeList(_cache);return;}
      try{var r=await fetch(RAW2+'themes-files.json?t='+Date.now(),{cache:'no-store'});if(r.ok){_cache=await r.json();}else throw new Error();}
      catch(e){_cache=[{filename:'wikipedia.theme.html',name:'Wikipedia',icon:'📖',description:'Free encyclopedia'},{filename:'nasa.theme.html',name:'NASA',icon:'🚀',description:'Space data'},{filename:'met.theme.html',name:'The Met',icon:'🏛',description:'400k artworks'},{filename:'hackernews.theme.html',name:'Hacker News',icon:'🔶',description:'Tech news'},{filename:'github-trends.theme.html',name:'GitHub Trends',icon:'⭐',description:'Trending repos'},{filename:'book.theme.html',name:"L'Œil et la Main",icon:'📖',description:'JdC'}];}
      renderThemeList(_cache);
    }
    function renderThemeList(themes){var list=document.getElementById('tnav-picker-list');list.innerHTML='';themes.forEach(function(t){var url=t.codeUrl||(RAW2+t.filename);var isCur=_cur&&_cur.includes(t.filename);var el=document.createElement('div');el.className='tnav-item'+(isCur?' tnav-current':'');el.innerHTML='<div class="tnav-icon">'+e2(t.icon||'⬡')+'</div><div class="tnav-info"><div class="tnav-name">'+e2(t.name)+'</div><div class="tnav-desc">'+e2(t.description||'')+'</div></div>'+(isCur?'<div class="tnav-badge">current</div>':'');el.addEventListener('click',function(){if(window.YM&&window.YM.setTheme){window.YM.setTheme(url,_cur);}else{localStorage.setItem('ym_prev_theme',_cur);localStorage.setItem('ym_theme_url',url);location.reload();}picker.style.display='none';});list.appendChild(el);});}
    document.getElementById('theme-custom-btn')&&document.getElementById('theme-custom-btn').addEventListener('click',function(){var inp=document.getElementById('theme-custom-input');var url=(inp?inp.value:'').trim();if(!url)return;var u=url.replace('https://github.com/','https://raw.githubusercontent.com/').replace('/blob/','/');if(window.YM&&window.YM.setTheme){window.YM.setTheme(u,_cur);}else{localStorage.setItem('ym_theme_url',u);location.reload();}});
  },0);

  // Init — small delay to ensure DOM elements are ready after theme injection
  setTimeout(function(){ loadIndex(); }, 50);
  var obs=new MutationObserver(function(muts){muts.forEach(function(m){m.addedNodes.forEach(function(n){if(n.nodeType!==1)return;if((n.id||'').indexOf('widget')>=0)n.style.cssText='display:none!important';});});});
  obs.observe(document.body,{childList:true,subtree:false});
})();
</script>

<style>
:root{
  color-scheme:dark;
  --bg:#090c16;
  --text:#cbd5f0;--text2:rgba(203,213,240,.48);--text3:rgba(203,213,240,.22);
  --accent:#5b78f5;--accent2:#1ed9b4;--red:#f05272;--green:#1ed9b4;--gold:#f5a623;--cyan:#4cc9f0;
  --safe-b:env(safe-area-inset-bottom,0px);
  --dock-h:68px;
  --font-b:'Inter',sans-serif;--font-m:'JetBrains Mono',monospace;--font-d:'Inter',sans-serif;
  --cols:4;--rows:6;
  --glass:rgba(9,12,22,.9);
  --blur:blur(48px) saturate(160%);
  --blur-mid:blur(24px);
  --accent-dim:rgba(91,120,245,.3);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%;overflow:hidden;overscroll-behavior:none;background:#090c16}
body{height:100%;overflow:hidden;overscroll-behavior:none;background:var(--bg);color:var(--text);font-family:var(--font-b);padding-top:env(safe-area-inset-top,0px)}
body::before{content:"";position:fixed;top:0;left:0;width:100%;height:env(safe-area-inset-top,0px);background:#090c16;z-index:9999;pointer-events:none}
body *{scrollbar-width:thin;scrollbar-color:rgba(91,120,245,.15) transparent}
::-webkit-scrollbar{width:2px}::-webkit-scrollbar-thumb{background:rgba(91,120,245,.2);border-radius:1px}

#ym-wp{position:fixed;inset:0;z-index:0;background-size:cover;background-position:center}
#ym-bg{position:fixed;inset:0;z-index:1;pointer-events:none;background:var(--bg)}
#ym-bg::before{content:'';position:absolute;width:70%;height:50%;top:0;left:15%;background:radial-gradient(ellipse at 50% 0%,rgba(91,120,245,.07),transparent 80%)}
#ym-bg::after{content:'';position:absolute;width:40%;height:35%;bottom:10%;right:-5%;background:radial-gradient(ellipse at 100% 100%,rgba(30,217,180,.05),transparent 70%)}
body.has-wallpaper #ym-bg{background:transparent}
body.has-wallpaper #ym-bg::before,body.has-wallpaper #ym-bg::after{opacity:.28}

#desktop{position:fixed;top:0;left:0;right:0;bottom:calc(var(--dock-h) + var(--safe-b));z-index:10;overflow:hidden;touch-action:none}
#desktop-slider{display:flex;height:100%;overflow:hidden;transition:transform .38s cubic-bezier(.4,0,.2,1);will-change:transform}
.desktop-page{flex:0 0 100vw;width:100vw;height:calc(100dvh - var(--dock-h) - var(--safe-b));display:grid;grid-template-columns:repeat(var(--cols),1fr);grid-template-rows:repeat(var(--rows),1fr);padding:8px 12px 12px;gap:4px;overflow:hidden;position:relative}
@media(hover:hover) and (pointer:fine){.desktop-page{flex:0 0 calc(100vw - 64px);width:calc(100vw - 64px)}}
.cell-hl{position:absolute;border-radius:50%;pointer-events:none;z-index:3;background:radial-gradient(circle,rgba(91,120,245,.12),rgba(91,120,245,.02));transition:all .1s}

.icon-body{width:58px;height:58px;border-radius:14px;background:rgba(91,120,245,.07);border:1px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;position:relative;box-shadow:0 2px 12px rgba(0,0,0,.3);transition:transform .18s cubic-bezier(.34,1.56,.64,1),box-shadow .2s,border-color .2s;will-change:transform;backdrop-filter:var(--blur-mid);-webkit-backdrop-filter:var(--blur-mid)}
.icon-body img{width:34px;height:34px;object-fit:contain;border-radius:8px;display:block}
.icon-label--below{order:1!important}
.icon-label{font-size:9px;font-weight:500;color:rgba(255,255,255,.85);text-align:center;max-width:72px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:var(--font-b);order:-1;text-shadow:0 1px 4px rgba(0,0,0,.8)}
.icon-notif{position:absolute;top:-5px;right:-5px;min-width:18px;height:18px;border-radius:9px;background:var(--accent);color:#fff;font-size:9px;display:flex;align-items:center;justify-content:center;padding:0 4px;font-weight:600;border:2px solid var(--bg);z-index:2;font-family:var(--font-m)}
.icon-del{position:absolute;top:-8px;left:-8px;width:22px;height:22px;border-radius:50%;background:var(--red);color:#fff;font-size:12px;font-weight:700;display:none;align-items:center;justify-content:center;z-index:10;cursor:pointer;border:2px solid var(--bg);pointer-events:all}
body.edit-mode .icon-del{display:flex}
body.edit-mode .folder-body>.icon-del{display:none!important}
.icon-del-hidden{display:none!important}
body.edit-mode .icon-body{animation:wob .42s ease-in-out infinite}
@keyframes wob{0%{transform:rotate(-2.5deg) scale(.97)}50%{transform:rotate(2.5deg) scale(.97)}100%{transform:rotate(-2.5deg) scale(.97)}}
.icon-wrap:active .icon-body{transform:scale(.84);transition-duration:.08s}
.icon-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;cursor:pointer;padding:4px;border-radius:12px;position:relative;touch-action:none;-webkit-user-select:none;user-select:none;width:fit-content;height:fit-content;place-self:center}
@media(hover:hover) and (pointer:fine){.icon-body:hover{transform:translateY(-3px) scale(1.04);border-color:rgba(91,120,245,.28);box-shadow:0 8px 24px rgba(91,120,245,.14)}}

.folder-body{background:rgba(91,120,245,.06);border-radius:14px}
.folder-grid{position:absolute;inset:10px;display:grid;grid-template-columns:repeat(2,1fr);grid-template-rows:repeat(2,1fr);gap:2px;overflow:hidden;border-radius:8px}
.folder-grid .fi{font-size:12px;display:flex;align-items:center;justify-content:center}
.folder-grid .fi .fi__img{width:14px;height:14px;object-fit:contain;border-radius:2px}
#drag-ghost{position:fixed;pointer-events:none;z-index:9800;opacity:.7;transform:scale(1.12) rotate(3deg);display:none}
.drag-ghost__body{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center}

#nav-bar{position:fixed;bottom:0;left:0;right:0;height:calc(var(--dock-h) + var(--safe-b));padding-bottom:var(--safe-b);z-index:400;display:flex;flex-direction:column;background:rgba(9,12,22,.75);backdrop-filter:blur(32px) saturate(150%);-webkit-backdrop-filter:blur(32px) saturate(150%);border-top:1px solid rgba(255,255,255,.05)}
#nav-bar::after{content:'';position:absolute;bottom:calc(-1 * var(--safe-b));left:0;right:0;height:var(--safe-b);background:rgba(9,12,22,.9)}

#page-dots{position:fixed;bottom:calc(var(--dock-h) + var(--safe-b) + 8px);left:0;right:0;display:flex;gap:4px;align-items:center;justify-content:center;pointer-events:none;z-index:205}
.pdot{width:3px;height:3px;border-radius:2px;background:rgba(255,255,255,.16);transition:all .3s cubic-bezier(.4,0,.2,1)}
.pdot.active{width:18px;height:3px;background:var(--accent);box-shadow:0 0 6px rgba(91,120,245,.5)}
#dock{display:flex;flex-direction:row;align-items:center;justify-content:space-around;flex:1;padding:0 8px}
.dbtn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;cursor:pointer;padding:8px 10px;border-radius:12px;transition:color .15s,transform .18s;color:rgba(203,213,240,.28);font-size:9px;font-family:var(--font-b);font-weight:500;letter-spacing:.3px;text-transform:uppercase;position:relative;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;touch-action:manipulation;min-width:52px}
.dbtn svg{display:block;margin:0 auto}
@media(hover:none) and (pointer:coarse){.dbtn:hover,.dbtn:focus{color:rgba(203,213,240,.28)!important;transform:none!important}}
@media(hover:hover) and (pointer:fine){.dbtn:hover{color:rgba(203,213,240,.65);transform:translateY(-2px)}}
.dbtn:active{transform:scale(.88)}
.dbtn.active{color:var(--accent)}
.dbtn.active::after{content:'';position:absolute;bottom:-2px;left:50%;transform:translateX(-50%);width:14px;height:2px;border-radius:1px;background:var(--accent);box-shadow:0 0 6px rgba(91,120,245,.55)}

@media(hover:hover) and (pointer:fine){
  :root{--cols:8;--rows:5;--dock-h:0px}
  #desktop{right:64px;bottom:0!important}
  #nav-bar{left:auto;right:0;top:0;bottom:0;height:auto;width:64px;flex-direction:column;border-top:none;border-left:1px solid rgba(255,255,255,.05);padding-bottom:0;background:rgba(9,12,22,.6);backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px)}
  #nav-bar::after{display:none}
  #page-dots{bottom:16px;left:0;right:64px}
  #dock{flex-direction:column;padding:10px 0;justify-content:center;gap:4px;flex:1}

}

#pwa-install-btn{position:fixed;bottom:calc(var(--dock-h) + var(--safe-b) + 24px);left:50%;transform:translateX(-50%);z-index:450;display:none;align-items:center;gap:8px;background:var(--glass);border:1px solid rgba(91,120,245,.28);color:var(--accent);font-family:var(--font-b);font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;padding:10px 18px;border-radius:12px;cursor:pointer;backdrop-filter:var(--blur-mid);-webkit-backdrop-filter:var(--blur-mid);transition:all .2s;white-space:nowrap;pointer-events:all}

.ym-overlay{position:fixed;top:0;left:0;right:0;bottom:calc(var(--dock-h) + var(--safe-b));background:transparent;z-index:300;opacity:0;pointer-events:none;transition:opacity .3s}
.ym-overlay.open{opacity:1;pointer-events:all}
@media(hover:hover) and (pointer:fine){.ym-overlay{right:64px;bottom:0}}

.ym-panel{position:fixed;left:0;right:0;bottom:calc(var(--dock-h) + var(--safe-b));max-height:calc(100dvh - var(--dock-h) - var(--safe-b));background:var(--glass);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:none;z-index:301;transform:translateY(calc(100% + 20px));transition:transform .38s cubic-bezier(.32,.72,0,1),visibility 0s .38s;visibility:hidden;display:flex;flex-direction:column;border-radius:24px 24px 0 0;overflow:hidden}

.ym-panel::before{content:'';position:absolute;top:0;left:12%;right:12%;height:1px;z-index:2;pointer-events:none;background:linear-gradient(90deg,transparent,rgba(91,120,245,.28) 30%,rgba(30,217,180,.18) 70%,transparent)}
@media(hover:hover) and (pointer:fine){
  .ym-panel{left:auto;right:64px;bottom:0;top:0;width:min(520px,calc(100vw - 64px));max-height:none;border-radius:0;transform:translateX(calc(100% + 64px))}
  .ym-panel.open{transform:translateX(0)}
  .ym-panel::before{top:0;left:0;right:auto;bottom:0;width:1px;height:auto;background:linear-gradient(180deg,transparent,rgba(91,120,245,.28) 30%,rgba(30,217,180,.18) 70%,transparent)}
}

#ym-edge-back{position:fixed;top:0;left:0;bottom:0;width:8px;z-index:500;cursor:pointer;display:none}
#ym-edge-back-btn{position:fixed;top:50%;left:0;transform:translateY(-50%) translateX(-100%);z-index:501;background:var(--glass);border:1px solid rgba(91,120,245,.3);border-left:none;color:var(--accent);font-size:16px;padding:14px 8px;border-radius:0 10px 10px 0;cursor:pointer;transition:transform .22s cubic-bezier(.32,.72,0,1);backdrop-filter:var(--blur-mid);-webkit-backdrop-filter:var(--blur-mid);pointer-events:none;user-select:none}

@media(hover:hover) and (pointer:fine){
  .panel-body>*,#panel-spheres-body>*,#panel-profile-body>*,#panel-build-body>*,#panel-sphere-body>*,#panel-profile-view-body>*,#panel-mine-wallet>*,#panel-mine-build>*,#panel-mine-formula>*,#panel-mine-liste>*{max-width:640px;width:100%;margin-left:auto;margin-right:auto}

body.has-wallpaper #ym-wp{animation:wpPan 120s linear infinite alternate}
@keyframes wpPan{0%{background-position:0% center}100%{background-position:100% center}}

#panel-switcher{position:fixed;left:0;right:0;bottom:calc(var(--dock-h) + var(--safe-b));max-height:calc(80dvh - var(--dock-h) - var(--safe-b));background:var(--glass);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);z-index:298;transform:translateY(calc(100% + 20px));transition:transform .38s cubic-bezier(.32,.72,0,1);display:flex;flex-direction:column;border-radius:24px 24px 0 0;overflow:hidden}
#panel-switcher::before{content:'';position:absolute;top:0;left:12%;right:12%;height:1px;z-index:2;background:linear-gradient(90deg,transparent,rgba(91,120,245,.25) 30%,rgba(30,217,180,.15) 70%,transparent)}
#panel-switcher.open{transform:translateY(0);z-index:303}
@media(hover:hover) and (pointer:fine){#panel-switcher{right:64px;bottom:0;max-height:80dvh}}
#switcher-grid{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:8px;display:grid;grid-template-columns:1fr 1fr;grid-auto-rows:min-content;gap:6px;align-content:start}
.sw-card{height:150px;border-radius:12px;background:rgba(9,12,22,.98);border:1px solid rgba(255,255,255,.08);cursor:pointer;overflow:hidden;position:relative;touch-action:pan-y;box-shadow:0 2px 8px rgba(0,0,0,.4)}
@media(hover:hover) and (pointer:fine){.sw-card{height:120px}.sw-card:hover{border-color:rgba(91,120,245,.22)}}
.sw-preview{position:absolute;top:0;left:0;right:0;bottom:28px;overflow:hidden;border-radius:13px 13px 0 0;background:rgba(9,12,22,.9);pointer-events:none}
.sw-preview::after{content:'';position:absolute;bottom:0;left:0;right:0;height:36px;background:linear-gradient(transparent,rgba(9,12,22,.95));z-index:3}
.sw-clone-wrap{position:absolute;top:0;left:0;transform-origin:top left;pointer-events:none;overflow:hidden}
.sw-label{position:absolute;bottom:0;left:0;right:0;height:28px;display:flex;align-items:center;padding:0 10px;background:rgba(6,9,18,.98);font-family:var(--font-b);font-size:9px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:rgba(91,120,245,.75);border-top:1px solid rgba(255,255,255,.05)}

.dlg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;display:none;align-items:center;justify-content:center;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);user-select:none}
.dlg.open{display:flex}
.dlg-box{background:var(--glass);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid rgba(255,255,255,.09);border-top:1px solid rgba(91,120,245,.18);border-radius:22px;padding:24px;width:min(320px,92vw);display:flex;flex-direction:column;gap:12px}
.dlg-title{font-family:var(--font-b);font-size:10px;font-weight:600;letter-spacing:3px;color:var(--accent);text-align:center;text-transform:uppercase}

#toasts{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:700;display:flex;flex-direction:column;gap:5px;min-width:220px;max-width:340px;pointer-events:none}
.toast{background:var(--glass);backdrop-filter:var(--blur-mid);-webkit-backdrop-filter:var(--blur-mid);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:10px 14px;font-size:13px;font-family:var(--font-b);animation:tin .22s cubic-bezier(.34,1.56,.64,1);display:flex;align-items:center;gap:8px}
.toast.success{border-color:rgba(30,217,180,.25);color:var(--green)}
.toast.error{border-color:rgba(240,82,114,.25);color:var(--red)}
.toast.info{border-color:rgba(91,120,245,.25);color:var(--accent)}
.toast.warn{border-color:rgba(245,166,35,.25);color:var(--gold)}
@keyframes tin{from{opacity:0;transform:translateY(-10px) scale(.95)}to{opacity:1;transform:none}}

#ym-sign-dlg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:9000;display:none;align-items:center;justify-content:center;backdrop-filter:blur(12px)}
#ym-sign-dlg.open{display:flex}
#ym-sign-box{background:var(--glass);border:1px solid rgba(240,82,114,.28);border-top:1px solid rgba(240,82,114,.5);border-radius:20px;padding:22px;width:min(320px,92vw);display:flex;flex-direction:column;gap:12px}

#ym-loader{position:fixed;inset:0;background:var(--bg);z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;transition:opacity .45s,visibility 0s .45s}
#ym-loader.hidden{opacity:0;pointer-events:none;visibility:hidden}
.ldr-logo{font-family:var(--font-b);font-size:18px;font-weight:700;letter-spacing:8px;color:var(--accent);text-transform:uppercase}

.ldr-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));animation:ldr 1.3s ease infinite}
@keyframes ldr{0%{width:0;margin-left:0}50%{width:65%;margin-left:18%}100%{width:0;margin-left:100%}}
.ldr-sub{font-family:var(--font-m);font-size:8px;color:var(--text3);letter-spacing:3px}

<!-- Theme switcher script — uses window.YM.setTheme if available -->
<script>
(function(){
  var TK='ym_theme_url',TC='ym_theme_cache';
  var RAW='https://raw.githubusercontent.com/theodoreyong9/YourMinedApp/main/src/';
  var IDX=RAW+'themes/index.json';
  function active(){return localStorage.getItem(TK)||RAW+'themes/default.theme.html';}
  function lbl(n){return n.replace(/\.html$/i,'').replace(/[-_]/g,' ').replace(/\b\w/g,function(c){return c.toUpperCase();});}
  function apply(url,label){
    if(!url||url===active())return;
    window.YM_toast&&window.YM_toast('\u2746 '+label+'\u2026','success',600);
    if(window.YM&&window.YM.setTheme){window.YM.setTheme(url);return;}
    // Fallback if app.js not yet loaded
    localStorage.setItem(TK,url);
    fetch(url).then(function(r){return r.ok?r.text():null;}).then(function(html){
      if(html)try{localStorage.setItem(TC,html);}catch(e){}
      setTimeout(function(){location.reload();},100);
    }).catch(function(){setTimeout(function(){location.reload();},100);});
  }
  function buildList(files){
    var c=document.getElementById('theme-list');if(!c)return;
    c.innerHTML='';var cur=active();var cf=cur.split('/').pop();
    var all=files.slice();if(all.indexOf(cf)===-1)all.unshift(cf);
    all.forEach(function(f){
      var url=f.startsWith('http')?f:(RAW+'themes/'+f);
      var label=lbl(f.split('/').pop());var on=(f===cf)||(url===cur);
      var row=document.createElement('div');
      row.style.cssText='display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;cursor:pointer;transition:background .14s;'+(on?'background:rgba(91,120,245,.1);border:1px solid rgba(91,120,245,.22)':'background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05)');
      var dot=document.createElement('div');
      dot.style.cssText='width:6px;height:6px;border-radius:50%;flex-shrink:0;'+(on?'background:var(--accent)':'background:rgba(255,255,255,.1)');
      var nm=document.createElement('span');
      nm.style.cssText='flex:1;font-size:12px;font-family:var(--font-b);'+(on?'color:var(--accent);font-weight:600':'color:var(--text2)');
      nm.textContent=label;
      row.appendChild(dot);row.appendChild(nm);
      row.addEventListener('click',function(){apply(url,label);});
      row.addEventListener('mouseenter',function(){if(url!==active())this.style.background='rgba(255,255,255,.05)';});
      row.addEventListener('mouseleave',function(){this.style.background=on?'rgba(91,120,245,.1)':'rgba(255,255,255,.03)';});
      c.appendChild(row);
    });
  }
  fetch(IDX).then(function(r){return r.ok?r.json():['default.theme.html'];}).then(buildList).catch(function(){buildList(['default.theme.html']);});
  document.getElementById('theme-custom-btn').addEventListener('click',function(){
    var inp=document.getElementById('theme-custom-input');var url=(inp?inp.value:'').trim();
    if(!url){window.YM_toast&&window.YM_toast('Enter a URL','warn');return;}
    url=url.replace('https://github.com/','https://raw.githubusercontent.com/').replace('/blob/','/');
    apply(url,lbl(url.split('/').pop()));if(inp)inp.value='';
  });
  document.getElementById('theme-custom-input').addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('theme-custom-btn').click();});
})();
</script>

<script>
(function(){
  // Zone nav overrides — must run AFTER app.js wires btn-figure
  // btn-figure (Zone ★) → intercept app.js and open panel-spheres instead
  // btn-wallet (Wallet) → open panel-mine on wallet tab
  (function(){
    function waitFor(fn, interval, timeout){
      var iv = setInterval(function(){ if(fn()){ clearInterval(iv); } }, interval);
      setTimeout(function(){ clearInterval(iv); }, timeout);
    }

    // Override btn-figure: app.js will wire it to open liste, we intercept
    waitFor(function(){
      if(!window.YM) return false;
      var figBtn = document.getElementById('btn-figure');
      if(!figBtn) return false;
      // Clone to remove app.js listener, then re-add our own
      var clone = figBtn.cloneNode(true);
      figBtn.parentNode.replaceChild(clone, figBtn);
      clone.addEventListener('click', function(){
        if(window.YM.openPanel){
          // Close panel-mine if open, open panel-spheres
          var mine = document.getElementById('panel-mine');
          if(mine && mine.classList.contains('open')){
            mine.classList.remove('open');
            document.getElementById('panel-overlay')&&document.getElementById('panel-overlay').classList.remove('open');
            return;
          }
          window.YM.openPanel('panel-spheres');
          if(window.YM_Liste) window.YM_Liste.render();
          else waitFor(function(){ if(window.YM_Liste){window.YM_Liste.render();return true;}},80,3000);
        }
      });
      return true;
    }, 100, 5000);

    // btn-wallet → panel-mine on wallet tab
    waitFor(function(){
      if(!window.YM) return false;
      var walletBtn = document.getElementById('btn-wallet');
      if(!walletBtn) return false;
      walletBtn.addEventListener('click', function(){
        var mine = document.getElementById('panel-mine');
        var overlay = document.getElementById('panel-overlay');
        var isOpen = mine && mine.classList.contains('open');
        // Close any open panel first
        document.querySelectorAll('.ym-panel').forEach(function(p){
          p.classList.remove('open'); p.style.zIndex='';
        });
        overlay && overlay.classList.remove('open');
        if(!isOpen){
          mine && mine.classList.add('open');
          overlay && overlay.classList.add('open');
          // Force wallet tab
          if(window.app_switchMineTab) window.app_switchMineTab('wallet');
          else if(window.YM_Mine && mine) window.YM_Mine.render(document.getElementById('panel-mine-wallet'));
        }
      });
      return true;
    }, 100, 5000);
  })();
})();
</script>

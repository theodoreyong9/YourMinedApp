<!--
  YourMine — Cyberpunk Theme
  Style: Neon violet / purple / magenta cyberpunk
-->

<!-- ── Fonts ─────────────────────────────────────────────────── -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Share+Tech+Mono&family=Rajdhani:wght@300;400;500;600;700&display=block" rel="stylesheet">

<!-- ── Styles ────────────────────────────────────────────────── -->
<style>
:root{
  color-scheme:dark;
  --bg:#07020f;
  --text:#e8d5ff;--text2:rgba(232,213,255,.52);--text3:rgba(232,213,255,.28);
  --gold:#c724ff;--cyan:#7b2fff;--red:#ff2d6b;--green:#00ffb3;
  --accent:#c724ff;--accent2:#7b2fff;--magenta:#ff00aa;
  --safe-b:env(safe-area-inset-bottom,0px);
  --dock-h:76px;
  --font-d:'Orbitron',sans-serif;--font-b:'Rajdhani',sans-serif;--font-m:'Share Tech Mono',monospace;
  --cols:4;--rows:6;
  --glass-heavy:rgba(7,2,15,.88);
  --blur-heavy:blur(56px) saturate(220%) brightness(.85);
  --blur-mid:blur(32px) saturate(180%);
  --neon-glow:0 0 8px rgba(199,36,255,.6),0 0 24px rgba(199,36,255,.25);
  --neon-glow2:0 0 8px rgba(123,47,255,.6),0 0 24px rgba(123,47,255,.25);
  --border-cyber:1px solid rgba(199,36,255,.25);
  --border-cyber2:1px solid rgba(123,47,255,.2);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%;overflow:hidden;background:#07020f}
body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font-b);padding-top:env(safe-area-inset-top,0px)}
body::before{content:"";position:fixed;top:0;left:0;width:100%;height:env(safe-area-inset-top,0px);background:#07020f;z-index:9999;pointer-events:none}
*{scrollbar-width:thin;scrollbar-color:rgba(199,36,255,.3) transparent}
::-webkit-scrollbar{width:2px}::-webkit-scrollbar-thumb{background:rgba(199,36,255,.3);border-radius:1px}

/* ── Scanlines overlay ──────────────────────────────────────── */
body::after{content:"";position:fixed;inset:0;z-index:2;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.06) 2px,rgba(0,0,0,.06) 4px);animation:scanmove 8s linear infinite}
@keyframes scanmove{0%{background-position:0 0}100%{background-position:0 -100px}}

/* ── Background ─────────────────────────────────────────────── */
#ym-wp{position:fixed;inset:0;z-index:0;background-size:cover;background-position:center;background-repeat:no-repeat}
#ym-bg{position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden;background:var(--bg)}
#ym-bg::before{content:'';position:absolute;width:100vmax;height:100vmax;border-radius:50%;background:radial-gradient(circle,rgba(199,36,255,.14),transparent 65%);top:-35vmax;right:-25vmax;animation:pulse1 7s ease-in-out infinite alternate}
#ym-bg::after{content:'';position:absolute;width:80vmax;height:80vmax;border-radius:50%;background:radial-gradient(circle,rgba(123,47,255,.12),transparent 65%);bottom:-25vmax;left:-20vmax;animation:pulse2 9s ease-in-out infinite alternate}
@keyframes pulse1{0%{opacity:.7;transform:scale(1)}100%{opacity:1;transform:scale(1.08)}}
@keyframes pulse2{0%{opacity:.6;transform:scale(1)}100%{opacity:.9;transform:scale(1.12)}}

/* ── Grid lines ─────────────────────────────────────────────── */
#ym-bg .grid-lines{position:absolute;inset:0;background-image:linear-gradient(rgba(199,36,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(199,36,255,.04) 1px,transparent 1px);background-size:40px 40px;animation:gridshift 20s linear infinite}
@keyframes gridshift{0%{background-position:0 0}100%{background-position:40px 40px}}

body.has-wallpaper #ym-bg{background:transparent}
body.has-wallpaper #ym-bg::before,body.has-wallpaper #ym-bg::after{opacity:.3}

/* ── Desktop ─────────────────────────────────────────────────── */
#desktop{position:fixed;top:0;left:0;right:0;bottom:calc(var(--dock-h) + var(--safe-b));z-index:10;overflow:hidden;touch-action:pan-y}
#desktop-slider{display:flex;height:100%;transition:transform .35s cubic-bezier(.4,0,.2,1);will-change:transform}
.desktop-page{flex:0 0 100vw;width:100vw;height:calc(100dvh - var(--dock-h) - var(--safe-b));display:grid;grid-template-columns:repeat(var(--cols),1fr);grid-template-rows:repeat(var(--rows),1fr);padding:6px 12px 10px;gap:6px;overflow:hidden;position:relative}
@media(hover:hover) and (pointer:fine){.desktop-page{flex:0 0 calc(100vw - 72px);width:calc(100vw - 72px)}}
.cell-hl{position:absolute;border-radius:50%;pointer-events:none;z-index:3;background:radial-gradient(circle,rgba(199,36,255,.22),rgba(199,36,255,.04));transition:all .1s}

/* ── Icons ──────────────────────────────────────────────────── */
.icon-body{
  width:60px;height:60px;
  border-radius:6px 14px 6px 14px;
  background:linear-gradient(145deg,rgba(199,36,255,.12) 0%,rgba(7,2,15,.8) 50%,rgba(123,47,255,.1) 100%);
  border-top:1px solid rgba(199,36,255,.5);
  border-left:1px solid rgba(199,36,255,.3);
  border-right:1px solid rgba(123,47,255,.2);
  border-bottom:1px solid rgba(123,47,255,.4);
  display:flex;align-items:center;justify-content:center;font-size:27px;flex-shrink:0;
  position:relative;
  box-shadow:0 0 12px rgba(199,36,255,.15),0 4px 20px rgba(0,0,0,.6),inset 0 1px 0 rgba(199,36,255,.2);
  transition:transform .24s cubic-bezier(.34,1.56,.64,1),box-shadow .24s,border-color .2s;
  clip-path:polygon(8px 0%,100% 0%,100% calc(100% - 8px),calc(100% - 8px) 100%,0% 100%,0% 8px);
  will-change:transform;isolation:isolate
}
.icon-body::before{content:'';position:absolute;inset:0;backdrop-filter:var(--blur-mid);-webkit-backdrop-filter:var(--blur-mid);z-index:-1;pointer-events:none}
.icon-body::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,0,200,.6),rgba(199,36,255,.8),transparent);pointer-events:none}
@media(hover:hover) and (pointer:fine){
  .icon-body:hover{transform:translateY(-5px) scale(1.06);border-color:rgba(199,36,255,.7);box-shadow:var(--neon-glow),0 8px 32px rgba(0,0,0,.5),inset 0 1px 0 rgba(199,36,255,.4)}
}
.icon-wrap:active .icon-body{transform:scale(.82) translateY(2px);transition-duration:.08s}
.icon-body img{width:36px;height:36px;object-fit:contain;border-radius:4px;display:block;filter:drop-shadow(0 0 4px rgba(199,36,255,.4))}
.icon-label{font-size:9px;font-weight:600;color:rgba(232,213,255,.85);text-align:center;max-width:72px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:var(--font-m);order:-1;letter-spacing:1px;text-transform:uppercase;text-shadow:0 0 6px rgba(199,36,255,.6),0 1px 4px rgba(0,0,0,.9)}

.icon-notif{position:absolute;top:-6px;right:-6px;min-width:20px;height:20px;border-radius:0;background:var(--magenta);color:#fff;font-size:10px;display:flex;align-items:center;justify-content:center;padding:0 5px;font-weight:700;border:1px solid rgba(255,0,170,.5);z-index:2;font-family:var(--font-m);clip-path:polygon(4px 0%,100% 0%,100% calc(100% - 4px),calc(100% - 4px) 100%,0% 100%,0% 4px);box-shadow:0 0 8px rgba(255,0,170,.5)}
.icon-del{position:absolute;top:-8px;left:-8px;width:24px;height:24px;border-radius:0;background:var(--red);color:#fff;font-size:13px;font-weight:700;display:none;align-items:center;justify-content:center;z-index:10;cursor:pointer;border:1px solid rgba(255,45,107,.5);line-height:1;pointer-events:all;clip-path:polygon(4px 0%,100% 0%,100% calc(100% - 4px),calc(100% - 4px) 100%,0% 100%,0% 4px)}
body.edit-mode .icon-del{display:flex}
.icon-del-hidden{display:none!important}
body.edit-mode .icon-body{animation:wob .44s ease-in-out infinite}
@keyframes wob{0%{transform:rotate(-2.5deg) scale(.97)}50%{transform:rotate(2.5deg) scale(.97)}100%{transform:rotate(-2.5deg) scale(.97)}}

.folder-body{background:linear-gradient(145deg,rgba(199,36,255,.08),rgba(7,2,15,.7));clip-path:polygon(8px 0%,100% 0%,100% calc(100% - 8px),calc(100% - 8px) 100%,0% 100%,0% 8px)}
.folder-grid{position:absolute;inset:10px;display:grid;grid-template-columns:repeat(2,1fr);grid-template-rows:repeat(2,1fr);gap:2px;overflow:hidden}
.folder-grid .fi{font-size:13px;display:flex;align-items:center;justify-content:center}
.folder-grid .fi img{width:16px;height:16px;object-fit:contain;border-radius:2px}

#drag-ghost{position:fixed;pointer-events:none;z-index:9800;opacity:.7;transform:scale(1.15) rotate(4deg);display:none;filter:drop-shadow(0 0 10px rgba(199,36,255,.6))}

/* ── Nav bar ─────────────────────────────────────────────────── */
#nav-bar{
  position:fixed;bottom:0;left:0;right:0;
  height:calc(var(--dock-h) + var(--safe-b));
  padding-bottom:var(--safe-b);
  z-index:400;display:flex;flex-direction:column;align-items:stretch;
  background:rgba(7,2,15,.92);
  border-top:1px solid rgba(199,36,255,.3);
  backdrop-filter:var(--blur-heavy);-webkit-backdrop-filter:var(--blur-heavy)
}
#nav-bar::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(199,36,255,.7) 30%,rgba(255,0,200,.9) 50%,rgba(123,47,255,.7) 70%,transparent);box-shadow:0 0 10px rgba(199,36,255,.4)}
#nav-bar::after{content:'';position:absolute;bottom:calc(-1 * var(--safe-b));left:0;right:0;height:var(--safe-b);background:rgba(7,2,15,.92)}
body.has-wallpaper #nav-bar{background:rgba(0,0,0,.82)}
@media all and (display-mode:standalone){#nav-bar{background:var(--bg)!important;backdrop-filter:none!important;-webkit-backdrop-filter:none!important}#nav-bar::after{background:var(--bg)}}

/* ── Page dots ───────────────────────────────────────────────── */
#page-dots{position:fixed;bottom:calc(var(--dock-h) + var(--safe-b) + 10px);left:0;right:0;display:flex;gap:5px;align-items:center;justify-content:center;pointer-events:none;z-index:205}
.pdot{width:4px;height:4px;border-radius:0;background:rgba(199,36,255,.2);transition:all .35s cubic-bezier(.4,0,.2,1);clip-path:polygon(2px 0%,100% 0%,calc(100% - 2px) 100%,0% 100%)}
.pdot.active{width:24px;height:4px;background:linear-gradient(90deg,var(--accent),var(--magenta));box-shadow:var(--neon-glow);border-radius:0}

/* ── Dock ────────────────────────────────────────────────────── */
#dock{display:flex;flex-direction:row;align-items:center;justify-content:space-around;flex:1;padding:0 20px}
.dbtn{
  display:flex;align-items:center;justify-content:center;
  background:none;border:none;cursor:pointer;
  padding:12px 16px;
  border-radius:4px;
  transition:background .18s,transform .2s cubic-bezier(.34,1.56,.64,1),color .18s,box-shadow .18s;
  color:rgba(232,213,255,.3);
  min-width:54px;min-height:54px;font-size:24px;
  font-family:var(--font-m);position:relative;
  -webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;user-select:none;-webkit-user-select:none;touch-action:manipulation
}
@media(hover:none) and (pointer:coarse){.dbtn:hover,.dbtn:focus{color:rgba(232,213,255,.3)!important;background:none!important;transform:none!important}}
@media(hover:hover) and (pointer:fine){.dbtn:hover{color:rgba(232,213,255,.85);transform:translateY(-3px) scale(1.05);background:rgba(199,36,255,.08);box-shadow:var(--neon-glow2)}}
.dbtn:active{transform:scale(.84);background:rgba(199,36,255,.1)}
.dbtn.active{color:var(--accent)}
.dbtn.active::after{content:'';position:absolute;bottom:-2px;left:50%;transform:translateX(-50%);width:20px;height:2px;background:linear-gradient(90deg,var(--accent),var(--magenta));box-shadow:var(--neon-glow)}
#btn-back{font-size:34px;color:rgba(199,36,255,.55)}

@media(hover:hover) and (pointer:fine){
  :root{--cols:8;--rows:5;--dock-h:0px}
  #desktop{right:72px;bottom:0!important}
  #nav-bar{left:auto;right:0;top:0;bottom:0;height:auto;width:72px;flex-direction:column;border-top:none;border-left:1px solid rgba(199,36,255,.3);padding-bottom:0}
  #nav-bar::before{top:0;left:0;bottom:0;right:auto;width:1px;height:auto;background:linear-gradient(180deg,transparent,rgba(199,36,255,.7) 30%,rgba(255,0,200,.9) 50%,rgba(123,47,255,.7) 70%,transparent)}
  #nav-bar::after{display:none}
  #page-dots{bottom:20px;left:0;right:72px}
  #dock{flex-direction:column;padding:10px 0;justify-content:center;gap:6px;flex:1}
  .dbtn{font-size:20px;min-width:56px;min-height:46px;padding:10px 0;flex-direction:column;border-radius:4px}
}

/* ── PWA install ─────────────────────────────────────────────── */
#pwa-install-btn{position:fixed;bottom:calc(var(--dock-h) + var(--safe-b) + 28px);left:50%;transform:translateX(-50%);z-index:206;display:none;align-items:center;gap:8px;background:rgba(7,2,15,.9);border:1px solid rgba(199,36,255,.4);color:var(--accent);font-family:var(--font-d);font-size:8px;font-weight:700;letter-spacing:3px;text-transform:uppercase;padding:11px 18px;border-radius:0;cursor:pointer;backdrop-filter:var(--blur-mid);transition:all .22s;white-space:nowrap;clip-path:polygon(6px 0%,100% 0%,100% calc(100% - 6px),calc(100% - 6px) 100%,0% 100%,0% 6px);box-shadow:var(--neon-glow)}
@media all and (display-mode:standalone){#pwa-install-btn{display:none!important}}

/* ── Overlay ─────────────────────────────────────────────────── */
.ym-overlay{position:fixed;top:0;left:0;right:0;bottom:calc(var(--dock-h) + var(--safe-b));background:rgba(7,2,15,.65);z-index:300;opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px)}
.ym-overlay.open{opacity:1;pointer-events:all}
@media(hover:hover) and (pointer:fine){.ym-overlay{right:72px;bottom:0;backdrop-filter:none;-webkit-backdrop-filter:none}}

/* ── Panels ──────────────────────────────────────────────────── */
.ym-panel{
  position:fixed;top:0;left:0;right:0;bottom:calc(var(--dock-h) + var(--safe-b));
  background:rgba(7,2,15,.94);
  backdrop-filter:var(--blur-heavy);-webkit-backdrop-filter:var(--blur-heavy);
  border:none;z-index:301;
  transform:translateY(100%);
  transition:transform .4s cubic-bezier(.32,.72,0,1);
  display:flex;flex-direction:column;
  border-radius:0;
  overflow:hidden;
  border-top:1px solid rgba(199,36,255,.35)
}
.ym-panel.open{transform:translateY(0)}
.ym-panel::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;z-index:2;pointer-events:none;background:linear-gradient(90deg,transparent,rgba(199,36,255,.8) 25%,rgba(255,0,200,.9) 50%,rgba(123,47,255,.8) 75%,transparent);box-shadow:0 0 12px rgba(199,36,255,.4)}
.ym-panel::after{content:'';position:absolute;top:0;left:0;bottom:0;width:2px;background:linear-gradient(180deg,transparent,rgba(199,36,255,.6) 30%,rgba(255,0,200,.8) 50%,rgba(123,47,255,.6) 70%,transparent);pointer-events:none}
@media(hover:hover) and (pointer:fine){.ym-panel{right:72px;bottom:0}}

.panel-handle{width:40px;height:3px;border-radius:0;background:linear-gradient(90deg,var(--accent),var(--magenta));margin:14px auto 2px;flex-shrink:0;cursor:grab;position:relative;z-index:3;box-shadow:var(--neon-glow)}
.panel-head{display:flex;align-items:center;padding:8px 24px 14px;gap:12px;border-bottom:1px solid rgba(199,36,255,.15);flex-shrink:0;min-height:50px;background:rgba(199,36,255,.03);position:relative;z-index:2;cursor:pointer}
.panel-head h2{font-family:var(--font-d);font-size:8px;font-weight:700;letter-spacing:6px;text-transform:uppercase;background:linear-gradient(90deg,var(--accent) 0%,rgba(255,0,200,.9) 50%,var(--cyan) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;background-size:200% 100%;animation:titleshift 5s ease-in-out infinite;cursor:default}
@keyframes titleshift{0%,100%{background-position:0%}50%{background-position:100%}}
.panel-body{flex:1;overflow:hidden;display:flex;flex-direction:column;-webkit-overflow-scrolling:touch;min-height:0}
#panel-sphere-body{display:flex;flex-direction:column;padding:0}

/* ── Inputs ──────────────────────────────────────────────────── */
.ym-input{width:100%;background:rgba(199,36,255,.05);border:1px solid rgba(199,36,255,.2);border-radius:4px;padding:11px 14px;color:var(--text);font-family:var(--font-m);font-size:13px;outline:none;transition:border-color .2s,box-shadow .2s;clip-path:polygon(4px 0%,100% 0%,100% calc(100% - 4px),calc(100% - 4px) 100%,0% 100%,0% 4px)}
.ym-input:focus{background:rgba(199,36,255,.08);border-color:rgba(199,36,255,.6);box-shadow:0 0 0 3px rgba(199,36,255,.1),var(--neon-glow)}
.ym-input::placeholder{color:var(--text3)}
textarea.ym-input{resize:vertical;font-family:var(--font-m);font-size:12px}

/* ── Buttons ─────────────────────────────────────────────────── */
.ym-btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 18px;border-radius:0;font-family:var(--font-d);font-size:11px;font-weight:600;cursor:pointer;transition:all .2s;border:1px solid transparent;letter-spacing:1.5px;text-transform:uppercase;clip-path:polygon(6px 0%,100% 0%,100% calc(100% - 6px),calc(100% - 6px) 100%,0% 100%,0% 6px)}
.ym-btn-accent{background:linear-gradient(135deg,var(--accent),rgba(199,36,255,.75));color:#fff;font-weight:700;border-color:rgba(199,36,255,.5);box-shadow:var(--neon-glow)}
.ym-btn-accent:hover{box-shadow:0 0 16px rgba(199,36,255,.8),0 0 40px rgba(199,36,255,.3);transform:translateY(-1px)}
.ym-btn-ghost{background:rgba(199,36,255,.06);border-color:rgba(199,36,255,.2);color:var(--text2)}
.ym-btn-ghost:hover{border-color:rgba(199,36,255,.5);color:var(--accent);background:rgba(199,36,255,.1);box-shadow:var(--neon-glow2)}
.ym-btn-danger{background:transparent;border-color:rgba(255,45,107,.4);color:var(--red)}
.ym-btn-danger:hover{box-shadow:0 0 8px rgba(255,45,107,.4),0 0 20px rgba(255,45,107,.2)}
.ym-btn:disabled{opacity:.28;cursor:not-allowed}

/* ── Cards ───────────────────────────────────────────────────── */
.ym-card{background:rgba(199,36,255,.04);border:1px solid rgba(199,36,255,.12);border-top:1px solid rgba(199,36,255,.25);border-radius:0;padding:16px;margin-bottom:10px;clip-path:polygon(8px 0%,100% 0%,100% calc(100% - 8px),calc(100% - 8px) 100%,0% 100%,0% 8px)}
.ym-card-title{font-family:var(--font-d);font-size:8px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:rgba(199,36,255,.65);margin-bottom:12px}
.ym-stat-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(199,36,255,.07)}
.ym-stat-row:last-child{border-bottom:none}
.ym-stat-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1.2px;font-family:var(--font-m)}
.ym-stat-value{font-family:var(--font-m);font-size:13px;color:var(--text)}
.ym-stat-value.gold{color:var(--accent);text-shadow:0 0 8px rgba(199,36,255,.5)}
.ym-stat-value.cyan{color:#a78bfa;text-shadow:0 0 8px rgba(167,139,250,.5)}
.ym-stat-value.green{color:var(--green);text-shadow:0 0 8px rgba(0,255,179,.4)}

/* ── Notices ─────────────────────────────────────────────────── */
.ym-notice{padding:10px 14px;border-radius:0;font-size:12px;display:flex;align-items:flex-start;gap:8px;margin-bottom:8px;line-height:1.5;font-family:var(--font-m);clip-path:polygon(6px 0%,100% 0%,100% calc(100% - 6px),calc(100% - 6px) 100%,0% 100%,0% 6px)}
.ym-notice.info{background:rgba(167,139,250,.06);border:1px solid rgba(167,139,250,.25);color:#a78bfa}
.ym-notice.success{background:rgba(0,255,179,.05);border:1px solid rgba(0,255,179,.2);color:var(--green)}
.ym-notice.error{background:rgba(255,45,107,.06);border:1px solid rgba(255,45,107,.22);color:var(--red)}
.ym-notice.warn{background:rgba(199,36,255,.06);border:1px solid rgba(199,36,255,.22);color:var(--accent)}

.ym-separator{height:1px;background:linear-gradient(90deg,transparent,rgba(199,36,255,.35),rgba(255,0,200,.4),rgba(199,36,255,.35),transparent);margin:12px 0}

/* ── Tabs ────────────────────────────────────────────────────── */
.ym-tabs{display:flex;flex-shrink:0;background:rgba(7,2,15,.98);border-top:1px solid rgba(199,36,255,.18)}
.ym-tab{flex:1;padding:14px 4px 12px;text-align:center;font-size:9px;font-family:var(--font-d);letter-spacing:2px;text-transform:uppercase;color:rgba(232,213,255,.28);cursor:pointer;transition:color .18s,background .18s;position:relative;-webkit-tap-highlight-color:transparent;border-top:2px solid transparent}
.ym-tab.active{color:var(--accent);background:rgba(199,36,255,.06);border-top-color:var(--accent);text-shadow:0 0 8px rgba(199,36,255,.6)}
.ym-tab:hover:not(.active){color:rgba(232,213,255,.55)}

<script>
(function(){
  var THEME_KEY='ym_theme_url';
  var THEME_CACHE='ym_theme_cache';
  var GH_RAW='https://raw.githubusercontent.com/theodoreyong9/YourMinedApp/main/src/';
  var DEF_THEME=GH_RAW+'themes/default.html';
  var INDEX_URL=GH_RAW+'themes/index.json';
  function activeUrl(){return localStorage.getItem(THEME_KEY)||DEF_THEME}
  function fileToLabel(name){return name.replace(/\.html$/i,'').replace(/[-_]/g,' ').replace(/\b\w/g,function(c){return c.toUpperCase()})}
  function applyTheme(url){if(url===activeUrl()){window.YM_toast&&window.YM_toast('Already using this theme','info');return}localStorage.setItem(THEME_KEY,url);localStorage.removeItem(THEME_CACHE);window.YM_toast&&window.YM_toast('Theme changed — reloading…','success',1600);setTimeout(function(){location.reload()},1600)}
  function populateSelect(files){var sel=document.getElementById('theme-select');if(!sel)return;var current=activeUrl();sel.innerHTML='';files.forEach(function(f){var url=GH_RAW+'themes/'+f;var opt=document.createElement('option');opt.value=url;opt.textContent=fileToLabel(f);if(url===current)opt.selected=true;sel.appendChild(opt)});if(!sel.querySelector('option[selected]')&&current!==DEF_THEME){var opt=document.createElement('option');opt.value=current;opt.textContent='— Custom —';opt.selected=true;sel.insertBefore(opt,sel.firstChild)}}
  function loadThemeList(){var sel=document.getElementById('theme-select');fetch(INDEX_URL).then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.text()}).then(function(text){var files;try{files=JSON.parse(text)}catch(e){throw new Error('index.json invalid')}if(!Array.isArray(files)||!files.length)files=['default.html'];populateSelect(files)}).catch(function(e){console.error('[YM theme]',e.message);if(sel)sel.innerHTML='<option value="">⚠ '+e.message+'</option>';populateSelect(['default.html'])})}
  document.getElementById('theme-apply-btn').addEventListener('click',function(){var sel=document.getElementById('theme-select');if(sel&&sel.value)applyTheme(sel.value)});
  loadThemeList();
})();
</script>

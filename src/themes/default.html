<!--
  YourMine — Default Theme
  GitHub: theodoreyong9/YourMinedApp/src/themes/default.html

  Ce fichier est un fragment HTML (pas un document complet).
  Il est injecté dans le <body> par index.html au boot via fetch + DOMParser.

  Contient :
    • Les <link> Google Fonts
    • Le bloc <style> complet (variables CSS + tous les composants)
    • Tout le DOM applicatif (desktop, panels, dialogs, nav, loader…)

  Ne contient PAS :
    • <html>, <head>, <meta>, <title>  → restent dans index.html
    • Les <script> (helpers, desk.js, app.js) → restent dans index.html
-->

<!-- ── Styles ────────────────────────────────────────────────── -->
<style>
:root{
  color-scheme:dark;
  --bg:#06060e;
  --text:#e4e6f4;--text2:rgba(228,230,244,.52);--text3:rgba(228,230,244,.26);
  --gold:#f0a830;--cyan:#08e0f8;--red:#ff4560;--green:#22d98a;
  --safe-b:env(safe-area-inset-bottom,0px);
  --dock-h:76px;
  --font-d:'Syne',sans-serif;--font-b:'Space Grotesk',sans-serif;--font-m:'JetBrains Mono',monospace;
  --cols:4;--rows:6;
  --glass-heavy:rgba(6,6,18,.84);
  --blur-heavy:blur(56px) saturate(200%) brightness(.9);
  --blur-mid:blur(36px) saturate(180%);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%;overflow:hidden;background:#06060e}
body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font-b);padding-top:env(safe-area-inset-top,0px)}
body::before{content:"";position:fixed;top:0;left:0;width:100%;height:env(safe-area-inset-top,0px);background:#06060e;z-index:9999;pointer-events:none}
*{scrollbar-width:thin;scrollbar-color:rgba(240,168,48,.18) transparent}
::-webkit-scrollbar{width:2px}::-webkit-scrollbar-thumb{background:rgba(240,168,48,.18);border-radius:1px}
#ym-wp{position:fixed;inset:0;z-index:0;background-size:cover;background-position:center;background-repeat:no-repeat}
#ym-bg{position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden;background:var(--bg)}
#ym-bg::before{content:'';position:absolute;width:90vmax;height:90vmax;border-radius:50%;background:radial-gradient(circle,rgba(8,224,248,.11),transparent 68%);top:-28vmax;right:-18vmax}
#ym-bg::after{content:'';position:absolute;width:75vmax;height:75vmax;border-radius:50%;background:radial-gradient(circle,rgba(240,168,48,.09),transparent 68%);bottom:-20vmax;left:-14vmax}
body.has-wallpaper #ym-bg{background:transparent}
body.has-wallpaper #ym-bg::before,body.has-wallpaper #ym-bg::after{opacity:.35}
#desktop{position:fixed;top:0;left:0;right:0;bottom:calc(var(--dock-h) + var(--safe-b));z-index:10;overflow:hidden;touch-action:pan-y}
#desktop-slider{display:flex;height:100%;transition:transform .4s cubic-bezier(.4,0,.2,1);will-change:transform}
.desktop-page{flex:0 0 100vw;width:100vw;height:calc(100dvh - var(--dock-h) - var(--safe-b));display:grid;grid-template-columns:repeat(var(--cols),1fr);grid-template-rows:repeat(var(--rows),1fr);padding:6px 12px 10px;gap:6px;overflow:hidden;position:relative}
@media(hover:hover) and (pointer:fine){.desktop-page{flex:0 0 calc(100vw - 72px);width:calc(100vw - 72px)}}
.cell-hl{position:absolute;border-radius:50%;pointer-events:none;z-index:3;background:radial-gradient(circle,rgba(240,168,48,.18),rgba(240,168,48,.03));transition:all .1s}
.icon-body{width:60px;height:60px;border-radius:10px 14px 8px 12px;background:linear-gradient(160deg,rgba(240,168,48,.09) 0%,rgba(255,255,255,.06) 60%,rgba(240,168,48,.05) 100%);border:1px solid rgba(255,255,255,.12);border-bottom:1px solid rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center;font-size:27px;flex-shrink:0;position:relative;box-shadow:0 2px 8px rgba(0,0,0,.45),0 8px 28px rgba(0,0,0,.35),inset 0 -1px 0 rgba(0,0,0,.25);transition:transform .24s cubic-bezier(.34,1.56,.64,1),box-shadow .24s,border-color .2s;transform:skewX(-8deg);will-change:transform;isolation:isolate}
.icon-body::before{content:'';position:absolute;inset:0;border-radius:inherit;backdrop-filter:var(--blur-mid);-webkit-backdrop-filter:var(--blur-mid);z-index:-1;pointer-events:none}
.icon-body>*{transform:skewX(8deg)}
@media(hover:hover) and (pointer:fine){.icon-body:hover{transform:skewX(-8deg) translateY(-4px) scale(1.07);border-color:rgba(240,168,48,.35);box-shadow:0 4px 16px rgba(0,0,0,.5),0 16px 48px rgba(0,0,0,.4),0 0 0 1px rgba(240,168,48,.2)}}
.icon-wrap:active .icon-body{transform:skewX(-8deg) scale(.82) translateY(2px);transition-duration:.08s}
.icon-body img{width:36px;height:36px;object-fit:contain;border-radius:8px;display:block}
.icon-label{font-size:10px;font-weight:600;color:#fff;text-align:center;max-width:72px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:var(--font-b);order:-1;text-shadow:0 0 3px rgba(0,0,0,1),1px 1px 0 rgba(0,0,0,.9),-1px -1px 0 rgba(0,0,0,.9),1px -1px 0 rgba(0,0,0,.9),-1px 1px 0 rgba(0,0,0,.9),0 2px 8px rgba(0,0,0,.8)}
.icon-notif{position:absolute;top:-6px;right:-6px;min-width:20px;height:20px;border-radius:10px;background:var(--gold);color:#000;font-size:10px;display:flex;align-items:center;justify-content:center;padding:0 5px;font-weight:700;border:2px solid var(--bg);z-index:2;font-family:var(--font-m)}
.icon-del{position:absolute;top:-8px;left:-8px;width:24px;height:24px;border-radius:50%;background:var(--red);color:#fff;font-size:13px;font-weight:700;display:none;align-items:center;justify-content:center;z-index:10;cursor:pointer;border:2px solid var(--bg);line-height:1;pointer-events:all}
body.edit-mode .icon-del{display:flex}
.icon-del-hidden{display:none!important}
body.edit-mode .icon-body{animation:wob .44s ease-in-out infinite}
@keyframes wob{0%{transform:skewX(-8deg) rotate(-3.5deg) scale(.97)}50%{transform:skewX(-8deg) rotate(3.5deg) scale(.97)}100%{transform:skewX(-8deg) rotate(-3.5deg) scale(.97)}}
.folder-body{background:linear-gradient(145deg,rgba(240,168,48,.07),rgba(255,255,255,.04));border-radius:10px 14px 8px 12px;transform:skewX(-8deg)}
.folder-grid{position:absolute;inset:10px;display:grid;grid-template-columns:repeat(2,1fr);grid-template-rows:repeat(2,1fr);gap:2px;overflow:hidden;border-radius:8px}
.folder-grid .fi{font-size:13px;display:flex;align-items:center;justify-content:center}
.folder-grid .fi img{width:16px;height:16px;object-fit:contain;border-radius:3px}
#drag-ghost{position:fixed;pointer-events:none;z-index:9800;opacity:.68;transform:scale(1.18) rotate(5deg);display:none}
#nav-bar{position:fixed;bottom:0;left:0;right:0;height:calc(var(--dock-h) + var(--safe-b));padding-bottom:var(--safe-b);z-index:400;display:flex;flex-direction:column;align-items:stretch;background:var(--glass-heavy);backdrop-filter:var(--blur-heavy);-webkit-backdrop-filter:var(--blur-heavy)}
#nav-bar::after{content:'';position:absolute;bottom:calc(-1 * var(--safe-b));left:0;right:0;height:var(--safe-b);background:var(--glass-heavy)}
body.has-wallpaper #nav-bar{background:rgba(0,0,0,.75)}
@media all and (display-mode:standalone){#nav-bar{background:var(--bg)!important;backdrop-filter:none!important;-webkit-backdrop-filter:none!important}#nav-bar::after{background:var(--bg)}}
#page-dots{position:fixed;bottom:calc(var(--dock-h) + var(--safe-b) + 10px);left:0;right:0;display:flex;gap:5px;align-items:center;justify-content:center;pointer-events:none;z-index:205}
.pdot{width:4px;height:4px;border-radius:2px;background:rgba(255,255,255,.2);transition:all .35s cubic-bezier(.4,0,.2,1)}
.pdot.active{width:24px;height:4px;background:linear-gradient(90deg,var(--gold),var(--cyan));box-shadow:0 0 8px rgba(240,168,48,.4);border-radius:2px}
#dock{display:flex;flex-direction:row;align-items:center;justify-content:space-around;flex:1;padding:0 20px}
.dbtn{display:flex;align-items:center;justify-content:center;background:none;border:none;cursor:pointer;padding:12px 16px;border-radius:16px 12px 12px 16px;transition:background .18s,transform .2s cubic-bezier(.34,1.56,.64,1),color .18s;color:rgba(255,255,255,.38);min-width:54px;min-height:54px;font-size:26px;font-family:var(--font-m);position:relative;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;user-select:none;-webkit-user-select:none;touch-action:manipulation}
@media(hover:none) and (pointer:coarse){.dbtn:hover,.dbtn:focus{color:rgba(255,255,255,.38)!important;background:none!important;transform:none!important}}
@media(hover:hover) and (pointer:fine){.dbtn:hover{color:rgba(255,255,255,.82);transform:translateY(-3px) scale(1.05);background:rgba(255,255,255,.06)}}
.dbtn:active{transform:scale(.84);background:rgba(240,168,48,.08)}
.dbtn.active{color:var(--gold)}
.dbtn.active::after{content:'';position:absolute;bottom:-2px;left:50%;transform:translateX(-50%);width:20px;height:3px;border-radius:2px;background:linear-gradient(90deg,var(--gold),var(--cyan));box-shadow:0 0 8px rgba(240,168,48,.5)}
#btn-back{font-size:34px;color:rgba(240,168,48,.6)}
@media(hover:hover) and (pointer:fine){
  :root{--cols:8;--rows:5;--dock-h:0px}
  #desktop{right:72px;bottom:0!important}
  #nav-bar{left:auto;right:0;top:0;bottom:0;height:auto;width:72px;flex-direction:column;border-top:none;padding-bottom:0}
  #nav-bar::after{display:none}
  #page-dots{bottom:20px;left:0;right:72px}
  #dock{flex-direction:column;padding:10px 0;justify-content:center;gap:6px;flex:1}
  .dbtn{font-size:22px;min-width:56px;min-height:46px;padding:10px 0;flex-direction:column;border-radius:12px}
}
#pwa-install-btn{position:fixed;bottom:calc(var(--dock-h) + var(--safe-b) + 28px);left:50%;transform:translateX(-50%);z-index:206;display:none;align-items:center;gap:8px;background:var(--glass-heavy);border:1px solid rgba(240,168,48,.3);color:var(--gold);font-family:var(--font-d);font-size:9px;font-weight:700;letter-spacing:3px;text-transform:uppercase;padding:11px 18px;border-radius:14px;cursor:pointer;backdrop-filter:var(--blur-mid);transition:all .22s;white-space:nowrap}
@media all and (display-mode:standalone){#pwa-install-btn{display:none!important}}
.ym-overlay{position:fixed;top:0;left:0;right:0;bottom:calc(var(--dock-h) + var(--safe-b));background:rgba(0,0,0,.55);z-index:300;opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
.ym-overlay.open{opacity:1;pointer-events:all}
@media(hover:hover) and (pointer:fine){.ym-overlay{right:72px;bottom:0;backdrop-filter:none;-webkit-backdrop-filter:none}}
.ym-panel{position:fixed;top:0;left:0;right:0;bottom:calc(var(--dock-h) + var(--safe-b));background:var(--glass-heavy);backdrop-filter:var(--blur-heavy);-webkit-backdrop-filter:var(--blur-heavy);border:none;z-index:301;transform:translateY(100%);transition:transform .4s cubic-bezier(.32,.72,0,1);display:flex;flex-direction:column;border-radius:30px 30px 0 0;overflow:hidden}
.ym-panel.open{transform:translateY(0)}
.ym-panel::before{content:'';position:absolute;top:0;left:8%;right:8%;height:1px;z-index:2;pointer-events:none;background:linear-gradient(90deg,transparent,rgba(240,168,48,.4) 20%,rgba(255,255,255,.15) 50%,rgba(8,224,248,.35) 80%,transparent)}
@media(hover:hover) and (pointer:fine){.ym-panel{right:72px;bottom:0}}
.panel-handle{width:44px;height:4px;border-radius:2px;background:linear-gradient(90deg,rgba(240,168,48,.3),rgba(8,224,248,.22));margin:14px auto 2px;flex-shrink:0;cursor:grab;position:relative;z-index:3}
.panel-head{display:flex;align-items:center;padding:8px 24px 14px;gap:12px;border-bottom:1px solid rgba(255,255,255,.04);flex-shrink:0;min-height:50px;background:rgba(255,255,255,.016);position:relative;z-index:2;cursor:pointer}
.panel-head h2{font-family:var(--font-d);font-size:9px;font-weight:700;letter-spacing:6px;text-transform:uppercase;background:linear-gradient(90deg,var(--gold) 0%,rgba(255,255,255,.8) 50%,var(--cyan) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;background-size:200% 100%;animation:titleshift 6s ease-in-out infinite;cursor:default}
@keyframes titleshift{0%,100%{background-position:0%}50%{background-position:100%}}
.panel-body{flex:1;overflow:hidden;display:flex;flex-direction:column;-webkit-overflow-scrolling:touch;min-height:0}
#panel-sphere-body{display:flex;flex-direction:column;padding:0}
.ym-input{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:11px 14px;color:var(--text);font-family:var(--font-b);font-size:13px;outline:none;transition:border-color .2s,box-shadow .2s}
.ym-input:focus{background:rgba(255,255,255,.07);border-color:rgba(240,168,48,.5);box-shadow:0 0 0 3px rgba(240,168,48,.08)}
.ym-input::placeholder{color:var(--text3)}
textarea.ym-input{resize:vertical;font-family:var(--font-m);font-size:12px}
.ym-btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 18px;border-radius:10px;font-family:var(--font-b);font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;border:1px solid transparent}
.ym-btn-accent{background:linear-gradient(135deg,var(--gold),rgba(240,168,48,.85));color:#000;font-weight:700;box-shadow:0 4px 20px rgba(240,168,48,.28)}
.ym-btn-accent:hover{box-shadow:0 8px 32px rgba(240,168,48,.42);transform:translateY(-1px)}
.ym-btn-ghost{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.1);color:var(--text2)}

.ym-btn-danger{background:transparent;border-color:rgba(255,69,96,.35);color:var(--red)}

.ym-card{background:rgba(255,255,255,.034);border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:16px;margin-bottom:10px;box-shadow:inset 0 1px 0 rgba(255,255,255,.07)}

<!-- ── Script theme picker (s'auto-initialise au premier affichage du dialog) ── -->
<script>
(function(){
  var THEME_KEY     = 'ym_theme_url';
  var THEME_CACHE   = 'ym_theme_cache';
  var GH_RAW        = 'https://raw.githubusercontent.com/theodoreyong9/YourMinedApp/main/src/';
  var DEFAULT_THEME = GH_RAW + 'themes/default.html';

  // Thèmes built-in listés dans src/themes/
  var BUILT_IN = [
    { label: 'Default',  url: GH_RAW + 'themes/default.html'  },
    // Ajoute tes thèmes ici au fur et à mesure :
    // { label: 'Neon',  url: GH_RAW + 'themes/neon.html' },
    // { label: 'Light', url: GH_RAW + 'themes/light.html' },
  ];

  function activeUrl(){
    return localStorage.getItem(THEME_KEY) || DEFAULT_THEME;
  }

  function renderCurrent(){
    var el = document.getElementById('theme-current');
    if(!el) return;
    var url = activeUrl();
    var isDefault = url === DEFAULT_THEME;
    el.textContent = isDefault ? '✦ Default theme' : url;
  }

  function renderPresets(){
    var container = document.getElementById('theme-presets');
    if(!container || container.children.length) return; // déjà rendu
    var current = activeUrl();
    BUILT_IN.forEach(function(t){
      var btn = document.createElement('button');
      btn.className = 'ym-btn ym-btn-ghost';
      btn.style.cssText = 'font-size:10px;padding:5px 10px;' +
        (t.url === current ? 'color:var(--gold);border-color:rgba(240,168,48,.4)' : '');
      btn.textContent = t.label;
      btn.addEventListener('click', function(){ applyTheme(t.url, t.label); });
      container.appendChild(btn);
    });
  }

  function applyTheme(url, label){
    if(url === activeUrl()){ window.YM_toast && window.YM_toast('Already using this theme','info'); return; }
    localStorage.setItem(THEME_KEY, url);
    localStorage.removeItem(THEME_CACHE); // invalide le cache pour forcer le rechargement
    window.YM_toast && window.YM_toast('Theme changed — reloading…', 'success', 1800);
    setTimeout(function(){ location.reload(); }, 1800);
  }

  // Bouton Apply (URL custom)
  document.getElementById('theme-apply-btn').addEventListener('click', function(){
    var url = (document.getElementById('theme-url-input').value || '').trim();
    if(!url){ window.YM_toast && window.YM_toast('Enter a GitHub raw URL','warn'); return; }
    if(!url.startsWith('https://')){ window.YM_toast && window.YM_toast('URL must start with https://','warn'); return; }
    applyTheme(url, 'Custom theme');
  });

  // Enter dans l'input
  document.getElementById('theme-url-input').addEventListener('keydown', function(e){
    if(e.key === 'Enter') document.getElementById('theme-apply-btn').click();
  });

  // Reset
  document.getElementById('theme-reset-btn').addEventListener('click', function(){
    localStorage.removeItem(THEME_KEY);
    localStorage.removeItem(THEME_CACHE);
    window.YM_toast && window.YM_toast('Resetting to default theme…', 'info', 1800);
    setTimeout(function(){ location.reload(); }, 1800);
  });

  // Init au premier affichage du dialog background
  var dlg = document.getElementById('bg-dlg');
  if(dlg){
    var _themeInited = false;
    var obs = new MutationObserver(function(){
      if(dlg.classList.contains('open') && !_themeInited){
        _themeInited = true;
        renderCurrent();
        renderPresets();
        obs.disconnect();
      }
    });
    obs.observe(dlg, { attributes: true, attributeFilter: ['class'] });
  }
})();
</script>

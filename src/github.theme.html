<link href="https://fonts.googleapis.com/css2?family=Fragment+Mono:ital@0;1&family=Syne:wght@400;600;700;800&display=block" rel="stylesheet">
<style>
:root{--bg:#0a0c0f;--surface:#0f1117;--surface2:#161b22;--text:#e6edf3;--text2:rgba(230,237,243,.6);--text3:rgba(230,237,243,.3);--accent:#58a6ff;--green:#3fb950;--gold:#e3b341;--border:#30363d;--border2:rgba(48,54,61,.5);--font-m:'Fragment Mono',monospace;--font-d:'Syne',sans-serif;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font-d)}
#ym-wp,#ym-bg,#ym-loader,#desktop,#drag-ghost,#page-dots,#nav-bar,#panel-overlay,#panel-switcher,#ym-sign-dlg,#pwa-install-btn,#toasts,.ym-panel,.dlg,[id^="ym-"][id$="-widget"],.ym-widget,#ym-radio-widget,#desktop-slider .icon-wrap,.icon-wrap,.icon-body,.icon-label{display:none!important;visibility:hidden!important;opacity:0!important;pointer-events:none!important}
.ym-overlay,.ym-tabs,.ym-tab,.ym-input,.ym-btn,.ym-card,.ym-notice,.pill{display:none!important}
#gh-root{position:fixed;inset:0;display:flex;flex-direction:column;z-index:10}
#gh-content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;min-height:0}
#gh-content::-webkit-scrollbar{width:3px}
#gh-content::-webkit-scrollbar-thumb{background:var(--border)}
.gh-repo{padding:14px 14px;border-bottom:1px solid var(--border2);cursor:pointer;transition:background .1s;display:flex;flex-direction:column;gap:8px}
.gh-repo:hover{background:rgba(88,166,255,.03)}
.gh-repo-head{display:flex;align-items:flex-start;gap:8px}
.gh-repo-avatar{width:32px;height:32px;border-radius:6px;object-fit:cover;flex-shrink:0;background:var(--surface2)}
.gh-repo-name{font-family:var(--font-m);font-size:13px;color:var(--accent);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.gh-repo-name span{color:var(--text3)}
.gh-repo-stars-today{font-family:var(--font-m);font-size:10px;color:var(--gold);flex-shrink:0}
.gh-repo-desc{font-size:13px;color:var(--text2);line-height:1.5}
.gh-repo-meta{display:flex;gap:12px;flex-wrap:wrap}
.gh-repo-lang{display:flex;align-items:center;gap:4px;font-family:var(--font-m);font-size:10px;color:var(--text3)}
.gh-lang-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.gh-repo-stat{font-family:var(--font-m);font-size:10px;color:var(--text3)}
.gh-topics{display:flex;gap:4px;flex-wrap:wrap}
.gh-topic{font-family:var(--font-m);font-size:9px;padding:2px 8px;border-radius:20px;background:rgba(88,166,255,.1);color:var(--accent);border:1px solid rgba(88,166,255,.2)}
/* Detail overlay */
#gh-detail{position:fixed;inset:0;z-index:600;background:var(--bg);display:none;flex-direction:column}
#gh-detail-header{flex-shrink:0;background:var(--surface);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;gap:10px}
#gh-detail-repo-name{font-family:var(--font-m);font-size:12px;color:var(--accent);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#gh-detail-open{background:var(--green);border:none;color:#0a0c0f;font-family:var(--font-d);font-size:11px;font-weight:700;padding:6px 14px;border-radius:6px;cursor:pointer;flex-shrink:0}
#gh-detail-inner{flex:1;overflow-y:auto;padding:14px 14px 16px}
#gh-detail-close-wrap{flex-shrink:0;padding:10px;display:flex;justify-content:center;border-top:1px solid var(--border)}
#gh-detail-close{background:rgba(88,166,255,.08);border:1px solid rgba(88,166,255,.2);color:var(--text2);font-size:18px;width:48px;height:48px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center}
.gh-readme{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px;margin-top:12px}
.gh-readme-label{font-family:var(--font-m);font-size:9px;color:var(--text3);letter-spacing:.15em;text-transform:uppercase;margin-bottom:10px}
.gh-readme-content{font-size:13px;color:var(--text2);line-height:1.8}
.gh-readme-content h1,.gh-readme-content h2{font-family:var(--font-d);color:var(--text);font-size:15px;margin:1em 0 .4em;font-weight:700}
.gh-readme-content h3{font-family:var(--font-d);color:var(--text2);font-size:13px;margin:.8em 0 .3em;font-weight:600}
.gh-readme-content code{font-family:var(--font-m);font-size:11px;background:var(--surface2);padding:2px 6px;border-radius:4px;color:#bc8cff}
.gh-readme-content pre{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:10px;overflow-x:auto;margin:8px 0}
.gh-readme-content pre code{background:none;padding:0;color:var(--text2);font-size:11px}
.gh-readme-content a{color:var(--accent);text-decoration:none}
.gh-readme-content img{max-width:100%;border-radius:6px;margin:4px 0;display:block}
.gh-readme-content ul,.gh-readme-content ol{padding-left:1.4em;margin:6px 0}
.gh-readme-content li{margin-bottom:3px}
.gh-readme-content blockquote{border-left:3px solid var(--border);padding:6px 12px;color:var(--text3);font-style:italic;margin:8px 0}
.gh-stats-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.gh-stat{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 12px;text-align:center}
.gh-stat-val{font-family:var(--font-m);font-size:15px;color:var(--text)}
.gh-stat-lbl{font-family:var(--font-m);font-size:9px;color:var(--text3);margin-top:2px;letter-spacing:.1em}
.gh-loading{padding:40px;text-align:center;font-family:var(--font-m);font-size:11px;color:var(--text3);letter-spacing:.08em}
/* Bottom bar */
#gh-bottom{flex-shrink:0;display:flex;flex-direction:column;gap:6px;padding:8px 12px calc(8px + env(safe-area-inset-bottom,0px));border-top:1px solid var(--border);background:rgba(10,12,15,.95);backdrop-filter:blur(16px)}
#gh-filters{display:flex;gap:4px;overflow-x:auto;scrollbar-width:none}
#gh-filters::-webkit-scrollbar{display:none}
.gh-filter{font-family:var(--font-m);font-size:10px;padding:5px 10px;border:1px solid var(--border);border-radius:6px;cursor:pointer;color:var(--text3);white-space:nowrap;transition:all .15s;flex-shrink:0;background:none}
.gh-filter.active{color:var(--accent);border-color:rgba(88,166,255,.4);background:rgba(88,166,255,.06)}
#gh-period-filters{display:flex;gap:4px}
.gh-period{font-family:var(--font-m);font-size:10px;padding:5px 10px;border-radius:4px;cursor:pointer;color:var(--text3);transition:all .1s;flex:1;text-align:center;border:1px solid transparent}
.gh-period.active{background:rgba(88,166,255,.1);color:var(--accent);border-color:rgba(88,166,255,.2)}
/* Theme Nav */
#theme-nav{flex-shrink:0;display:flex;align-items:center;height:48px;background:rgba(0,0,0,.75);backdrop-filter:blur(24px);border-top:1px solid rgba(255,255,255,.06);z-index:50}
.tnav-btn{width:56px;height:100%;background:none;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.35);font-size:20px;transition:color .15s;flex-shrink:0}
.tnav-btn:hover,.tnav-btn:active{color:rgba(255,255,255,.85)}
.tnav-btn.tnav-disabled{opacity:.2;pointer-events:none}
#tnav-center{flex:1;height:100%;display:flex;align-items:center;justify-content:center;cursor:pointer;gap:6px;color:rgba(255,255,255,.3);transition:color .15s}
#tnav-center:hover{color:rgba(255,255,255,.7)}
#tnav-center-lbl{font-size:10px;letter-spacing:.08em}
#tnav-picker{position:fixed;inset:0;z-index:900;background:rgba(0,0,0,.92);backdrop-filter:blur(24px);display:none;flex-direction:column}
#tnav-picker-hd{flex-shrink:0;padding:14px 16px 10px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.06)}
#tnav-picker-title{font-size:10px;color:rgba(255,255,255,.3);letter-spacing:.15em;flex:1}
#tnav-picker-list{flex:1;overflow-y:auto;padding:8px 8px 0}
#tnav-picker-search-wrap{flex-shrink:0;padding:10px 12px;border-top:1px solid rgba(255,255,255,.06);background:rgba(0,0,0,.4)}
#tnav-picker-q{width:100%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);color:#fff;font-size:14px;padding:12px 16px;border-radius:12px;outline:none}
#tnav-picker-q::placeholder{color:rgba(255,255,255,.2)}
.tnav-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:12px;cursor:pointer;transition:background .1s;margin-bottom:4px;border:1px solid transparent}
.tnav-item:hover{background:rgba(255,255,255,.06)}
.tnav-item.tnav-current{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.08)}
.tnav-icon{font-size:24px;flex-shrink:0;width:36px;text-align:center}
.tnav-info{flex:1;min-width:0}
.tnav-name{font-size:14px;font-weight:600;color:#fff;margin-bottom:2px}
.tnav-desc{font-size:11px;color:rgba(255,255,255,.35);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tnav-badge{font-size:9px;color:rgba(255,255,255,.25);flex-shrink:0;background:rgba(255,255,255,.06);padding:2px 8px;border-radius:20px}
#tnav-picker-close-wrap{flex-shrink:0;padding:10px 12px;border-top:1px solid rgba(255,255,255,.06);display:flex;justify-content:center}
#tnav-picker-close{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.6);font-size:18px;width:48px;height:48px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.gh-reveal{animation:fadeUp .25s ease forwards}
</style>

<script>
(function(){
  var content=document.getElementById('gh-content');
  var _lang='',_period='daily';
  var PROXIES=['https://api.allorigins.win/raw?url=','https://corsproxy.io/?'];
  var LANG_COLORS={javascript:'#f1e05a',typescript:'#2b7489',python:'#3572A5',rust:'#dea584',go:'#00ADD8',java:'#b07219','c++':'#f34b7d',c:'#555555',ruby:'#701516',swift:'#ffac45',kotlin:'#A97BFF',shell:'#89e051',vue:'#41b883',html:'#e34c26',css:'#563d7c',php:'#4F5D95'};

  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  function fmtNum(n){if(!n)return'0';if(n>=1000)return(n/1000).toFixed(1)+'k';return String(n);}
  function langColor(lang){return LANG_COLORS[(lang||'').toLowerCase()]||'rgba(230,237,243,.3)';}

  document.querySelectorAll('.gh-filter').forEach(function(f){
    f.addEventListener('click',function(){
      document.querySelectorAll('.gh-filter').forEach(function(x){x.classList.remove('active');});
      f.classList.add('active');_lang=f.dataset.lang;loadTrending();
    });
  });
  document.querySelectorAll('.gh-period').forEach(function(p){
    p.addEventListener('click',function(){
      document.querySelectorAll('.gh-period').forEach(function(x){x.classList.remove('active');});
      p.classList.add('active');_period=p.dataset.period;loadTrending();
    });
  });

  async function fetchTrendingHTML(){
    var url='https://github.com/trending'+(_lang?'/'+encodeURIComponent(_lang):'')+'?since='+_period;
    for(var i=0;i<PROXIES.length;i++){
      try{
        var r=await fetch(PROXIES[i]+encodeURIComponent(url),{signal:AbortSignal.timeout(8000)});
        if(r.ok){var t=await r.text();if(t.length>1000)return t;}
      }catch(e){}
    }
    throw new Error('All proxies failed');
  }

  function parseTrendingHTML(html){
    var parser=new DOMParser();var doc=parser.parseFromString(html,'text/html');var repos=[];
    doc.querySelectorAll('article.Box-row').forEach(function(article){
      try{
        var nameEl=article.querySelector('h2 a');if(!nameEl)return;
        var fullName=nameEl.getAttribute('href').replace(/^\//,'');var parts=fullName.split('/');
        var desc=article.querySelector('p');var langEl=article.querySelector('[itemprop="programmingLanguage"]');
        var starsEl=article.querySelector('a[href*="/stargazers"]');var forksEl=article.querySelector('a[href*="/forks"]');
        var starsToday=article.querySelector('.float-sm-right');
        var topics=[];article.querySelectorAll('.topic-tag').forEach(function(t){topics.push(t.textContent.trim());});
        repos.push({
          full_name:fullName,owner:{login:parts[0],avatar_url:'https://github.com/'+parts[0]+'.png?size=64'},name:parts[1],
          description:desc?desc.textContent.trim():'',language:langEl?langEl.textContent.trim():'',
          stargazers_count:parseInt((starsEl?starsEl.textContent.trim().replace(/,/g,''):'0').replace(/[^0-9]/g,''))||0,
          forks_count:parseInt((forksEl?forksEl.textContent.trim().replace(/,/g,''):'0').replace(/[^0-9]/g,''))||0,
          html_url:'https://github.com/'+fullName,topics:topics,
          stars_today:starsToday?starsToday.textContent.trim():'',
          open_issues_count:0
        });
      }catch(e){}
    });
    return repos;
  }

  async function loadTrending(){
    content.innerHTML='<div class="gh-loading">loading trending repos…</div>';
    try{
      var html=await fetchTrendingHTML();var repos=parseTrendingHTML(html);
      if(!repos.length)throw new Error('No repos parsed — try again');
      var wrap=document.createElement('div');wrap.className='gh-reveal';
      repos.forEach(function(repo,i){wrap.appendChild(renderRepoCard(repo,i+1));});
      content.innerHTML='';content.appendChild(wrap);
    }catch(e){content.innerHTML='<div class="gh-loading">'+esc(e.message)+'<br><span style="font-size:9px;opacity:.5">try again in a moment</span></div>';}
  }

  function renderRepoCard(repo,rank){
    var el=document.createElement('div');el.className='gh-repo';
    var lang=repo.language||'';var topics=(repo.topics||[]).slice(0,4);
    el.innerHTML='<div class="gh-repo-head">'+
      '<img class="gh-repo-avatar" src="'+esc(repo.owner.avatar_url)+'" loading="lazy" alt="">'+
      '<div class="gh-repo-name"><span>'+esc(repo.owner.login)+' / </span>'+esc(repo.name)+'</div>'+
      '<div class="gh-repo-stars-today">⭐ '+(repo.stars_today||fmtNum(repo.stargazers_count))+'</div></div>'+
      (repo.description?'<div class="gh-repo-desc">'+esc(repo.description)+'</div>':'')+
      '<div class="gh-repo-meta">'+
        (lang?'<div class="gh-repo-lang"><div class="gh-lang-dot" style="background:'+langColor(lang)+'"></div>'+esc(lang)+'</div>':'')+
        '<div class="gh-repo-stat">🍴 '+fmtNum(repo.forks_count)+'</div>'+
      '</div>'+
      (topics.length?'<div class="gh-topics">'+topics.map(function(t){return'<span class="gh-topic">'+esc(t)+'</span>';}).join('')+'</div>':'');
    el.addEventListener('click',function(){loadRepoDetail(repo);});
    return el;
  }

  async function loadRepoDetail(repo){
    var detail=document.getElementById('gh-detail');
    var inner=document.getElementById('gh-detail-inner');
    document.getElementById('gh-detail-repo-name').textContent=repo.full_name;
    document.getElementById('gh-detail-open').onclick=function(){window.open(repo.html_url,'_blank','noopener');};
    inner.innerHTML='<div class="gh-loading">loading…</div>';
    detail.style.display='flex';detail.scrollTop=0;
    window._themeNavBack=function(){detail.style.display='none';window._themeNavBack=null;};
    try{
      var lang=repo.language||'';var topics=repo.topics||[];
      var statsHTML='<div class="gh-stats-bar">'+
        '<div class="gh-stat"><div class="gh-stat-val">'+fmtNum(repo.stargazers_count)+'</div><div class="gh-stat-lbl">STARS</div></div>'+
        '<div class="gh-stat"><div class="gh-stat-val">'+fmtNum(repo.forks_count)+'</div><div class="gh-stat-lbl">FORKS</div></div>'+
        '<div class="gh-stat"><div class="gh-stat-val">'+(repo.stars_today||'—')+'</div><div class="gh-stat-lbl">TODAY</div></div></div>';
      var metaHTML='<div style="display:flex;flex-direction:column;gap:6px;margin-bottom:12px">'+
        (repo.description?'<div style="font-size:13px;color:var(--text2);line-height:1.6">'+esc(repo.description)+'</div>':'')+
        '<div style="display:flex;gap:8px;flex-wrap:wrap;font-family:var(--font-m);font-size:10px;color:var(--text3)">'+
          (lang?'<span style="color:'+langColor(lang)+'">⬤ '+esc(lang)+'</span>':'')+
        '</div>'+
        (topics.length?'<div class="gh-topics">'+topics.map(function(t){return'<span class="gh-topic">'+esc(t)+'</span>';}).join('')+'</div>':'')+
      '</div>';
      inner.innerHTML=statsHTML+metaHTML+'<div class="gh-loading">loading README…</div>';
      var readmeR=await fetch('https://api.github.com/repos/'+repo.full_name+'/readme',{headers:{'Accept':'application/vnd.github.v3+json'}});
      if(!readmeR.ok)throw new Error('No README');
      var readmeD=await readmeR.json();
      var raw=await fetch(readmeD.download_url);var md=await raw.text();
      inner.innerHTML=statsHTML+metaHTML+'<div class="gh-readme"><div class="gh-readme-label">README.md</div><div class="gh-readme-content">'+mdToHTML(md,repo.full_name)+'</div></div>';
    }catch(e){
      var existing=inner.innerHTML.includes('gh-stats-bar')?inner.innerHTML.split('gh-loading')[0]:'';
      inner.innerHTML=existing+'<div style="padding:20px;font-family:var(--font-m);font-size:11px;color:var(--text3)">No README available</div>';
    }
  }

  function mdToHTML(md,repo){
    var base='https://raw.githubusercontent.com/'+repo+'/HEAD/';
    var lines=md.split('\n'),html='',inCode=false,codeBlock='';
    for(var i=0;i<lines.length;i++){
      var line=lines[i];
      if(line.startsWith('```')){if(!inCode){inCode=true;codeBlock='';}else{html+='<pre><code>'+esc(codeBlock.trim())+'</code></pre>';inCode=false;codeBlock='';}continue;}
      if(inCode){codeBlock+=line+'\n';continue;}
      if(line.startsWith('### ')){html+='<h3>'+inl(line.slice(4))+'</h3>';continue;}
      if(line.startsWith('## ')){html+='<h2>'+inl(line.slice(3))+'</h2>';continue;}
      if(line.startsWith('# ')){html+='<h1>'+inl(line.slice(2))+'</h1>';continue;}
      if(/^[-*]{3,}$/.test(line.trim())){html+='<hr style="border:none;border-top:1px solid var(--border);margin:10px 0">';continue;}
      if(line.startsWith('> ')){html+='<blockquote>'+inl(line.slice(2))+'</blockquote>';continue;}
      if(/^[-*+] /.test(line)){html+='<ul><li>'+inl(line.slice(2))+'</li></ul>';continue;}
      if(/^\d+\. /.test(line)){html+='<ol><li>'+inl(line.replace(/^\d+\. /,''))+'</li></ol>';continue;}
      if(!line.trim()){html+='<br>';continue;}
      html+='<p>'+inl(line)+'</p>';
    }
    return html.replace(/<\/ul><ul>/g,'').replace(/<\/ol><ol>/g,'');
    function inl(s){
      var r=esc(s);
      r=r.replace(/!\[([^\]]*)\]\(([^)]+)\)/g,function(m,alt,src){if(!src.startsWith('http'))src=base+src;return'<img src="'+src+'" alt="'+alt+'" loading="lazy">';});
      r=r.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
      r=r.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
      r=r.replace(/\*([^*]+)\*/g,'<em>$1</em>');
      r=r.replace(/`([^`]+)`/g,'<code>$1</code>');
      return r;
    }
  }

  document.getElementById('gh-detail-close').addEventListener('click',function(){
    document.getElementById('gh-detail').style.display='none';window._themeNavBack=null;
  });

  // Theme Nav
  setTimeout(function(){
    var RAW='https://raw.githubusercontent.com/theodoreyong9/YourMinedApp/main/';
    var _cur=localStorage.getItem('ym_theme_url')||'';var _cache=null;
    function e2(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
    document.getElementById('tnav-back').addEventListener('click',function(){localStorage.setItem('ym_theme_url',localStorage.getItem('ym_prev_theme')||'');localStorage.removeItem('ym_theme_cache');location.reload();});
    var prevBtn=document.getElementById('tnav-prev');var _tnb=null;
    Object.defineProperty(window,'_themeNavBack',{set:function(fn){_tnb=fn;prevBtn.classList.toggle('tnav-disabled',!fn);},get:function(){return _tnb;},configurable:true});
    prevBtn.addEventListener('click',function(){if(window._themeNavBack)window._themeNavBack();});
    var picker=document.getElementById('tnav-picker');
    document.getElementById('tnav-center').addEventListener('click',function(){picker.style.display='flex';document.getElementById('tnav-picker-q').focus();loadThemeList();});
    document.getElementById('tnav-picker-close').addEventListener('click',function(){picker.style.display='none';});
    picker.addEventListener('click',function(e){if(e.target===picker)picker.style.display='none';});
    document.getElementById('tnav-picker-q').addEventListener('input',function(){var q=this.value.toLowerCase();document.querySelectorAll('.tnav-item').forEach(function(el){var t=(el.querySelector('.tnav-name')||{textContent:''}).textContent.toLowerCase();var d=(el.querySelector('.tnav-desc')||{textContent:''}).textContent.toLowerCase();el.style.display=(t.includes(q)||d.includes(q))?'flex':'none';});});
    async function loadThemeList(){
      if(_cache){renderThemeList(_cache);return;}
      try{var r=await fetch(RAW+'themes-files.json?t='+Date.now(),{cache:'no-store'});if(r.ok){_cache=await r.json();}else throw new Error();}
      catch(e){_cache=[{filename:'wikipedia.theme.html',name:'Wikipedia',icon:'📖',description:'Free encyclopedia'},{filename:'nasa.theme.html',name:'NASA',icon:'🚀',description:'Space data'},{filename:'met.theme.html',name:'The Met',icon:'🏛',description:'400k artworks'},{filename:'hackernews.theme.html',name:'Hacker News',icon:'🔶',description:'Tech news'},{filename:'github-trends.theme.html',name:'GitHub Trends',icon:'⭐',description:'Trending repos'}];}
      renderThemeList(_cache);
    }
    function renderThemeList(themes){var list=document.getElementById('tnav-picker-list');list.innerHTML='';themes.forEach(function(t){var url=t.codeUrl||(RAW+t.filename);var isCur=_cur&&_cur.includes(t.filename);var el=document.createElement('div');el.className='tnav-item'+(isCur?' tnav-current':'');el.innerHTML='<div class="tnav-icon">'+e2(t.icon||'⬡')+'</div><div class="tnav-info"><div class="tnav-name">'+e2(t.name)+'</div><div class="tnav-desc">'+e2(t.description||'')+'</div></div>'+(isCur?'<div class="tnav-badge">current</div>':'');el.addEventListener('click',function(){localStorage.setItem('ym_prev_theme',_cur);localStorage.setItem('ym_theme_url',url);localStorage.removeItem('ym_theme_cache');picker.style.display='none';location.reload();});list.appendChild(el);});}
    document.getElementById('theme-custom-btn')&&document.getElementById('theme-custom-btn').addEventListener('click',function(){var inp=document.getElementById('theme-custom-input');var url=(inp?inp.value:'').trim();if(!url)return;var u=url.replace('https://github.com/','https://raw.githubusercontent.com/').replace('/blob/','/');localStorage.setItem('ym_prev_theme',_cur);localStorage.setItem('ym_theme_url',u);localStorage.removeItem('ym_theme_cache');location.reload();});
  },0);

  loadTrending();
  var obs=new MutationObserver(function(muts){muts.forEach(function(m){m.addedNodes.forEach(function(n){if(n.nodeType!==1)return;if((n.id||'').indexOf('widget')>=0)n.style.cssText='display:none!important';});});});
  obs.observe(document.body,{childList:true,subtree:false});
})();
</script>
